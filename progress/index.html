<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Your Progress | Coach4U</title>
<link rel="icon" href="../icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#234b78 100%);color:#fff;padding:28px 20px;text-align:center;}
.header img{width:48px;height:48px;border-radius:12px;background:#fff;padding:2px;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto;}
.header h1{font-family:'Quicksand',sans-serif;font-size:22px;font-weight:700;line-height:1.3;margin-bottom:4px;}
.header p{font-size:13px;color:rgba(255,255,255,.75);line-height:1.5;}
.container{max-width:560px;margin:0 auto;padding:20px 16px 60px;}
.section{background:#fff;border-radius:14px;border:1px solid #e2e8f0;margin-bottom:16px;overflow:hidden;}
.section-head{padding:16px 20px;border-bottom:1px solid #f1f5f9;}
.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:4px;}
.section-title{font-size:16px;font-weight:700;color:#1e3a5f;}
.current-card{padding:20px;background:linear-gradient(135deg,#003366 0%,#1a4d80 100%);color:#fff;}
.current-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.65);font-weight:700;margin-bottom:8px;}
.current-stage{font-family:'Quicksand',sans-serif;font-size:28px;font-weight:700;margin-bottom:4px;}
.current-score{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:10px;}
.current-desc{font-size:13px;color:rgba(255,255,255,.85);line-height:1.6;}
.stage-track{display:flex;gap:3px;padding:16px 20px;background:#f8fafc;border-bottom:1px solid #f1f5f9;}
.stage-pip{flex:1;height:6px;border-radius:3px;background:#e2e8f0;transition:background .3s;}
.stage-pip.active{background:#003366;}
.stage-pip.past{background:#4d80b3;}
.timeline-entry{padding:14px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;gap:14px;}
.timeline-entry:last-child{border-bottom:none;}
.tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px;}
.tl-body{flex:1;min-width:0;}
.tl-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.tl-stage{font-size:14px;font-weight:700;color:#1e3a5f;}
.tl-date{font-size:11px;color:#94a3b8;white-space:nowrap;margin-left:8px;}
.tl-score{font-size:20px;font-weight:800;color:#1e293b;line-height:1;}
.tl-score-sub{font-size:11px;color:#94a3b8;font-weight:400;}
.tl-trend{font-size:12px;font-weight:700;margin-top:4px;}
.tl-trend.up{color:#16a34a;}
.tl-trend.down{color:#dc2626;}
.tl-trend.same{color:#94a3b8;}
.rooms{display:flex;gap:6px;margin-top:8px;}
.room-pill{flex:1;background:#f8fafc;border-radius:7px;padding:6px 4px;text-align:center;border:1px solid #f1f5f9;}
.room-icon{font-size:13px;display:block;margin-bottom:2px;}
.room-score{font-size:13px;font-weight:700;color:#1e293b;}
.room-label{font-size:9px;color:#94a3b8;margin-top:1px;}
.pillar-row{padding:12px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px;}
.pillar-row:last-child{border-bottom:none;}
.pillar-letter{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;}
.pillar-body{flex:1;min-width:0;}
.pillar-name{font-size:12px;font-weight:700;color:#1e3a5f;margin-bottom:4px;}
.pillar-bar-wrap{background:#f1f5f9;border-radius:4px;height:8px;overflow:hidden;}
.pillar-bar{height:100%;border-radius:4px;transition:width .5s;}
.pillar-score{font-size:13px;font-weight:700;color:#1e293b;white-space:nowrap;min-width:36px;text-align:right;}
.safe-entry{padding:14px 20px;border-bottom:1px solid #f1f5f9;}
.safe-entry:last-child{border-bottom:none;}
.safe-entry-header{display:flex;justify-content:space-between;margin-bottom:10px;}
.safe-entry-label{font-size:13px;font-weight:700;color:#1e3a5f;}
.safe-entry-date{font-size:11px;color:#94a3b8;}
.empty{padding:32px 20px;text-align:center;color:#94a3b8;font-size:13px;}
.error-card{background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:24px;text-align:center;color:#dc2626;font-size:14px;margin-bottom:16px;}
.footer{text-align:center;font-size:11px;color:#94a3b8;padding:0 16px 32px;line-height:1.8;}
.loading{padding:40px;text-align:center;color:#94a3b8;font-size:13px;}
</style>
</head>
<body>

<div class="header">
  <img src="../C4U.png" alt="Coach4U">
  <h1 id="pageTitle">Your Progress</h1>
  <p id="pageSubtitle">Tracking your coaching journey with Coach4U</p>
</div>

<div class="container" id="mainContent">
  <div class="loading">Loading your results...</div>
</div>

<div class="footer">
  SARUBA PTY LTD t/a Coach4U &middot; ABN 50 678 462 178
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://uoixetfvboevjxlkfyqy.supabase.co';
const SB_KEY='sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ';
const supabase=window.supabase.createClient(SB_URL,SB_KEY);

const BRAIN_STAGES=[
  {name:'Overwhelmed',min:20,max:60,color:'#dc2626',bg:'#fef2f2',order:0},
  {name:'Unsettled',min:61,max:100,color:'#d97706',bg:'#fef3c7',order:1},
  {name:'Grounded',min:101,max:140,color:'#2563eb',bg:'#eff6ff',order:2},
  {name:'Resourced',min:141,max:170,color:'#0d9488',bg:'#f0fdfa',order:3},
  {name:'Empowered',min:171,max:200,color:'#16a34a',bg:'#f0fdf4',order:4}
];
const BRAIN_STAGE_DESC={
  Overwhelmed:'Your reserves are running very low. Life is asking more than your current capacity can hold. That\'s important information — not a judgement. Small steps and self-protection matter most right now.',
  Unsettled:'You have a floor to stand on, but it can shift. You\'re finding your footing, and the work you\'re doing is building something more stable.',
  Grounded:'You have solid ground beneath you. You can feel it. This is real progress — you\'re operating from a more stable base.',
  Resourced:'You have what you need to move forward. You\'re not just coping — you\'re starting to lead your own life with intention.',
  Empowered:'You are leading your own life. Your systems, your thinking, your responses — they\'re working for you. This is what it looks like when the work lands.'
};
const ROOMS=[
  {key:'capacity_total',icon:'🪟',label:'Capacity',color:'#1B3664'},
  {key:'wellbeing_total',icon:'🌱',label:'Wellbeing',color:'#1B3664'},
  {key:'strengths_total',icon:'🌟',label:'Strengths',color:'#1B3664'},
  {key:'ef_total',icon:'🏗',label:'Execution',color:'#1B3664'}
];
const PILLARS=[
  {key:'self_awareness',letter:'S',label:'Self Awareness',color:'#5c8a7a'},
  {key:'aim',letter:'A',label:'Aim',color:'#0891b2'},
  {key:'foundation',letter:'F',label:'Foundation',color:'#b87a90'},
  {key:'emotion',letter:'E',label:'Emotion',color:'#8c6e9f'}
];

function bpStageFor(score){
  return BRAIN_STAGES.find(s=>score>=s.min&&score<=s.max)||BRAIN_STAGES[0];
}

function fmtDate(iso){
  return new Date(iso).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
}

function trendArrow(curr,prev){
  if(prev==null) return '';
  const delta=curr-prev;
  if(delta>5) return `<div class="tl-trend up">&#8593; +${delta} from last check-in</div>`;
  if(delta<-5) return `<div class="tl-trend down">&#8595; ${delta} from last check-in</div>`;
  return `<div class="tl-trend same">&#8596; Similar to last check-in (${delta>=0?'+':''}${delta})</div>`;
}

function renderBrainSection(submissions){
  if(!submissions.length){
    return `<div class="section"><div class="section-head"><div class="section-label">Brain Pulse</div><div class="section-title">Your Capacity Journey</div></div><div class="empty">No Brain Pulse check-ins yet.</div></div>`;
  }
  const latest=submissions[0];
  const stage=bpStageFor(latest.grand_total);
  const stageIdx=stage.order||0;

  // Stage progress track (5 pips)
  const pips=BRAIN_STAGES.map((s,i)=>{
    let cls='stage-pip';
    if(i<stageIdx) cls+=' past';
    else if(i===stageIdx) cls+=' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  let html=`<div class="section">
    <div class="current-card">
      <div class="current-label">&#129504; Current Stage</div>
      <div class="current-stage">${stage.name}</div>
      <div class="current-score">${latest.grand_total} / 200 &middot; ${fmtDate(latest.created_at)}</div>
      <div class="current-desc">${BRAIN_STAGE_DESC[stage.name]||''}</div>
    </div>
    <div class="stage-track">${pips}</div>
    <div style="display:flex;justify-content:space-between;padding:4px 20px 12px;"><span style="font-size:10px;color:#94a3b8;">Overwhelmed</span><span style="font-size:10px;color:#94a3b8;">Empowered</span></div>`;

  if(submissions.length>1){
    html+=`<div class="section-head" style="border-top:1px solid #f1f5f9;"><div class="section-label">All Check-ins</div><div class="section-title">Your Journey Over Time</div></div>`;
    submissions.forEach((r,i)=>{
      const s=bpStageFor(r.grand_total);
      const prev=submissions[i+1]||null;
      const trend=prev?trendArrow(r.grand_total,prev.grand_total):'';
      const rooms=ROOMS.map(rm=>`<div class="room-pill"><span class="room-icon">${rm.icon}</span><div class="room-score">${r[rm.key]||0}</div><div class="room-label">${rm.label}</div></div>`).join('');
      const isLatest=i===0;
      html+=`<div class="timeline-entry">
        <div class="tl-dot" style="background:${s.color};">${i+1===submissions.length?'1':(submissions.length-i)}</div>
        <div class="tl-body">
          <div class="tl-header">
            <div>
              <div class="tl-stage">${s.name}${isLatest?' <span style="background:#1e3a5f;color:#fff;font-size:9px;padding:1px 6px;border-radius:4px;vertical-align:middle;margin-left:4px;">Latest</span>':''}</div>
              ${trend}
            </div>
            <div style="text-align:right;">
              <div class="tl-score">${r.grand_total}<span class="tl-score-sub">/200</span></div>
              <div class="tl-date">${fmtDate(r.created_at)}</div>
            </div>
          </div>
          <div class="rooms">${rooms}</div>
        </div>
      </div>`;
    });
  } else {
    html+=`<div style="padding:12px 20px 16px;font-size:13px;color:#64748b;border-top:1px solid #f1f5f9;">This is your first check-in — great start. Each check-in adds to your timeline here.</div>`;
  }
  html+=`</div>`;
  return html;
}

function renderSAFESection(results){
  if(!results.length) return '';

  const latest=results[0];
  let html=`<div class="section">
    <div class="section-head"><div class="section-label">SAFE Pulse</div><div class="section-title">Self, Aim, Foundation, Emotion</div></div>`;

  // Latest pillar bars
  html+=`<div style="padding:14px 20px 4px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;">Latest — ${fmtDate(latest.created_at)}</div>`;
  PILLARS.forEach(p=>{
    const score=latest[p.key]||0;
    const pct=Math.round((score/5)*100);
    html+=`<div class="pillar-row">
      <div class="pillar-letter" style="background:${p.color};">${p.letter}</div>
      <div class="pillar-body">
        <div class="pillar-name">${p.label}</div>
        <div class="pillar-bar-wrap"><div class="pillar-bar" style="width:${pct}%;background:${p.color};"></div></div>
      </div>
      <div class="pillar-score" style="color:${p.color};">${score}<span style="font-size:10px;color:#94a3b8;font-weight:400;">/5</span></div>
    </div>`;
  });

  if(results.length>1){
    html+=`<div class="section-head" style="border-top:1px solid #f1f5f9;margin-top:4px;"><div class="section-label">History</div></div>`;
    results.forEach((r,i)=>{
      const isLatest=i===0;
      const pillarsRow=PILLARS.map(p=>{
        const score=r[p.key]||0;
        return `<div style="flex:1;text-align:center;"><div style="font-size:10px;font-weight:700;color:${p.color};">${p.letter}</div><div style="font-size:14px;font-weight:700;color:#1e293b;">${score}</div></div>`;
      }).join('');
      html+=`<div class="safe-entry">
        <div class="safe-entry-header">
          <div class="safe-entry-label">${isLatest?'Latest check-in':'Check-in '+(results.length-i)}</div>
          <div class="safe-entry-date">${fmtDate(r.created_at)}</div>
        </div>
        <div style="display:flex;gap:8px;">${pillarsRow}</div>
      </div>`;
    });
  }
  html+=`</div>`;
  return html;
}

async function load(){
  const params=new URLSearchParams(window.location.search);
  const contactId=params.get('c');
  const content=document.getElementById('mainContent');

  if(!contactId){
    content.innerHTML=`<div class="error-card">No client ID found in the URL. This link may be incomplete.</div>`;
    return;
  }

  // Load contact, brain pulse, and SAFE pulse in parallel
  const [contactRes,brainRes,safeRes]=await Promise.all([
    supabase.from('contacts').select('first_name,last_name,preferred_name').eq('id',contactId).single(),
    supabase.from('brain_pulse_submissions').select('*').eq('contact_id',contactId).order('created_at',{ascending:false}),
    supabase.from('pulse_results').select('*').eq('contact_id',contactId).order('created_at',{ascending:false})
  ]);

  if(contactRes.error||!contactRes.data){
    content.innerHTML=`<div class="error-card">Results not found. Please check your link or contact the team.</div>`;
    return;
  }

  const c=contactRes.data;
  const displayName=c.preferred_name||c.first_name;
  document.getElementById('pageTitle').textContent=`${displayName}'s Progress`;
  document.getElementById('pageSubtitle').textContent=`Your coaching journey with Coach4U`;

  const brainSubs=brainRes.data||[];
  const safeResults=safeRes.data||[];

  if(!brainSubs.length&&!safeResults.length){
    content.innerHTML=`<div class="section"><div class="empty" style="padding:40px;">No check-ins recorded yet. Your results will appear here once you\'ve completed your first check-in.</div></div>`;
    return;
  }

  content.innerHTML=renderBrainSection(brainSubs)+renderSAFESection(safeResults);
}

window.addEventListener('load',load);
</script>
</body>
</html>
