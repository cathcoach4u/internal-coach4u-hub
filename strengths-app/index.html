<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Coach4U Strengths Hub</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15803d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Strengths Hub">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f0f6ff;color:#1e293b;min-height:100vh;letter-spacing:-0.01em;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:100%}
.header{background:linear-gradient(180deg,#15803d 0%,#16a34a 100%);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px;color:#fff;flex-wrap:wrap}
.header h1{font-family:'Quicksand','Inter',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.header h1 span.icon{font-size:22px}
.header-right{display:flex;align-items:center;gap:8px;font-size:11px}
.version{padding:3px 11px;border-radius:99px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-weight:600}
.refresh-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);padding:5px 8px;border-radius:4px;cursor:pointer;font-size:13px}
.refresh-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.tab-bar{display:flex;gap:2px;padding:0 16px;background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex-shrink:0;padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;color:#64748b;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap}
.tab:hover{color:#15803d}
.tab.active{color:#15803d;border-bottom-color:#15803d}
.content{padding:20px max(16px,env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));min-width:0;max-width:100%;overflow-x:clip}
.screen{display:none;min-width:0}
.screen.active{display:block;min-width:0}
.screen table{display:block;max-width:100%;overflow-x:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.toast.success{background:#15803d}
.toast.error{background:#dc2626}
.search-input{padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;width:100%;max-width:380px;background:#fff;font-family:inherit;outline:none}
.search-input:focus{border-color:#15803d}
.btn{display:inline-block;padding:8px 14px;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;border:none;font-family:inherit;text-decoration:none}
.btn-green{background:#15803d;color:#fff}
.btn-blue{background:#003366;color:#fff}
.btn-gray{background:#f0f4f8;color:#475569;border:1px solid #e2e8f0}
.btn-red{background:#dc2626;color:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-family:'Quicksand','Inter',sans-serif;font-size:18px;font-weight:700;color:#1e3a5f;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#1e3a5f;margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#15803d}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}

/* AI bot widget */
#aiChatBtn{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(21,128,61,.4);z-index:90;font-size:22px;display:flex;align-items:center;justify-content:center}
#aiChatPanel{display:none;position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));right:max(20px,env(safe-area-inset-right));width:340px;max-width:calc(100vw - 40px);height:min(440px,calc(100dvh - 140px - env(safe-area-inset-bottom) - env(safe-area-inset-top)));background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:90;flex-direction:column;overflow:hidden}

@media(max-width:640px){
  .header{padding:12px 16px}
  .header h1{font-size:16px}
}

@media print{
  *{print-color-adjust:exact !important;-webkit-print-color-adjust:exact !important}
  body{background:#fff}
  .header,.tab-bar,.refresh-btn,.version,#aiChatBtn,#aiChatPanel,.no-print{display:none !important}
  .content{padding:0}
  .screen{display:none}
  .screen.active{display:block}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span class="icon">&#127919;</span> Coach4U Strengths Hub</h1>
    <div class="header-right">
      <button class="refresh-btn" onclick="hardRefresh()" title="Hard refresh (bypass cache)">&#128260;</button>
      <span class="version">v0.3.1</span>

  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="content">
    <div class="screen" id="screen-dashboard"><div id="dashContent"></div></div>

<!-- Strengths Edit Modal -->
<div class="modal-overlay" id="strEditModal">
  <div class="modal">
    <h3 id="strEditTitle">Edit Strengths</h3>
    <div id="strEditSubtitle" style="font-size:12px;color:#64748b;margin-bottom:14px;"></div>
    <input type="hidden" id="strEditContactId">
    <div id="strEditWarning" style="display:none;background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:12px;color:#92400e;margin-bottom:12px;">Editing existing strengths. Make sure this is intentional.</div>
    <div class="form-group">
      <label>Paste 5-10 themes (comma or newline separated)</label>
      <textarea id="strEditPaste" rows="3" placeholder="Achiever, Strategic, Learner, ..."></textarea>
      <button type="button" onclick="strEditApplyPaste()" style="margin-top:6px;background:#f0f4f8;border:1px solid #e2e8f0;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600;">Apply paste</button>
    </div>
    <div class="form-group">
      <label>Top 10 themes (#1 = signature)</label>
      <div id="strEditDropdowns" style="display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-red" id="strEditClearBtn" onclick="strEditClear()" style="margin-right:auto;display:none;">Clear all</button>
      <button class="btn btn-gray" onclick="closeModal('strEditModal')">Cancel</button>
      <button class="btn btn-green" onclick="saveStrEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Gallup Code Request Modal -->

      <div class="form-group" style="margin:0;">
        <label>Discount code</label>

      </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea id="gallupReqNotes" rows="2"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-red" onclick="deleteGallupRequest()" id="gallupReqDeleteBtn" style="margin-right:auto;display:none;">Delete</button>
      <button class="btn btn-gray" onclick="closeModal('gallupReqModal')">Cancel</button>
      <button class="btn btn-green" onclick="saveGallupRequest()">Save</button>
    </div>
  </div>
</div>

<!-- AI Chat Bot -->
<button id="aiChatBtn" onclick="toggleAiChat()">&#129302;</button>
<div id="aiChatPanel">
  <div style="background:linear-gradient(135deg,#15803d,#16a34a);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;">
    <span style="color:#fff;font-weight:700;font-size:14px;">&#129302; Strengths Assistant</span>
    <button onclick="toggleAiChat()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;">&times;</button>
  </div>

      Paste your <strong>sk-ant-…</strong> Anthropic key as a message and I'll save it for the auto-extract feature.

  <div style="padding:10px 14px;border-top:1px solid #e2e8f0;display:flex;gap:8px;">

    <button onclick="sendAiChat()" style="background:#15803d;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;">Send</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── SUPABASE CLIENT (shared with main Coach4U CRM) ──
const SUPABASE_URL = 'https://uoixetfvboevjxlkfyqy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ';
const MAIN_CRM_URL = 'https://cathcoach4u.github.io/internal-coach4u-hub';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CLIFTONSTRENGTHS CONSTANTS ──
const CS34 = ['','Achiever','Activator','Adaptability','Analytical','Arranger','Belief','Command','Communication','Competition','Connectedness','Consistency','Context','Deliberative','Developer','Discipline','Empathy','Focus','Futuristic','Harmony','Ideation','Includer','Individualization','Input','Intellection','Learner','Maximizer','Positivity','Relator','Responsibility','Restorative','Self-Assurance','Significance','Strategic','Woo'];
const CS_DOMAINS={
  Achiever:'#7B2D8E',Arranger:'#7B2D8E',Belief:'#7B2D8E',Consistency:'#7B2D8E',Deliberative:'#7B2D8E',Discipline:'#7B2D8E',Focus:'#7B2D8E',Responsibility:'#7B2D8E',Restorative:'#7B2D8E',
  Activator:'#E97200',Command:'#E97200',Communication:'#E97200',Competition:'#E97200',Maximizer:'#E97200',['Self-Assurance']:'#E97200',Significance:'#E97200',Woo:'#E97200',
  Adaptability:'#0070CD',Connectedness:'#0070CD',Developer:'#0070CD',Empathy:'#0070CD',Harmony:'#0070CD',Includer:'#0070CD',Individualization:'#0070CD',Positivity:'#0070CD',Relator:'#0070CD',
  Analytical:'#00945B',Context:'#00945B',Futuristic:'#00945B',Ideation:'#00945B',Input:'#00945B',Intellection:'#00945B',Learner:'#00945B',Strategic:'#00945B'
};
const domainColors={Executing:'#7B2D8E',Influencing:'#E97200',Relationship:'#0070CD',Strategic:'#00945B'};
const DOMAIN_OF={
  Executing:['Achiever','Arranger','Belief','Consistency','Deliberative','Discipline','Focus','Responsibility','Restorative'],
  Influencing:['Activator','Command','Communication','Competition','Maximizer','Self-Assurance','Significance','Woo'],
  Relationship:['Adaptability','Connectedness','Developer','Empathy','Harmony','Includer','Individualization','Positivity','Relator'],
  Strategic:['Analytical','Context','Futuristic','Ideation','Input','Intellection','Learner','Strategic']
};
function csColor(name){return CS_DOMAINS[name]||'#64748b'}
function csPill(rank,name){return `<span style="background:${csColor(name)};color:#fff;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:600;">#${rank} ${name}</span>`}
function getDomain(theme){for(const d in DOMAIN_OF){if(DOMAIN_OF[d].includes(theme))return d}return null}

// ── CATH VOICE (used in every AI prompt) ──
const CATH_VOICE_REFERENCE=`Cath Voice Tone Reference v1 — Coach4U
CORE: Warm, grounded, human, and decisive. Clarity over quantity, connection over performance. If a sentence feels impressive but unclear, rewrite it.
NON-NEGOTIABLES: Australian English. No exclamation marks, no emojis, no clinical language, no filler, no over-explaining, no policy-document tone unless required. Email sign-off is exactly: Thanks\\nCath
EMOTIONAL TONE: Warm not gushy; supportive not rescuing; calm even when firm; respects autonomy; never shaming. The reader feels steadied, not managed.
SENTENCE STYLE: Short to medium sentences. Plain English. Spoken not academic. One idea per sentence. Minimal adjectives.
CLARITY: Clear next steps; yes/no questions where possible; timeframes plain; options simple; no open-ended drifting. Clarity is care, not control.
STRENGTHS-BASED FRAMING: Name what is working. Describe challenges as patterns, not traits. Use strengths language naturally, not performatively. Avoid labels unless the client uses them.
BOUNDARIES: Calm and firm. No apologising for standard practice; no moralising; no over-justifying.
CLIENT-FACING: Personal not casual. Use the client's name once or twice, not repeatedly. Avoid jargon. Should not sound like a script or admin.
SELF-CHECK: Would I say this out loud? Is the next step clear? Does it reduce cognitive load? Does it sound human? Calm and confident? If not, rewrite.`;

// ── AI PROMPTS (kept inline so this app is self-contained) ──
const AI_PROMPTS = {
  'strengths-pdf-extractor': `You are extracting CliftonStrengths theme order from a Gallup PDF report.

Return ONLY a JSON object with this exact shape (no prose, no code fences):
{"top10":["Theme1","Theme2","Theme3","Theme4","Theme5","Theme6","Theme7","Theme8","Theme9","Theme10"],"name":"<full name from the PDF if present, else empty string>"}

Rules:
- Themes must be from this set only: ${CS34.slice(1).join(', ')}
- Use exact spelling and capitalisation as listed (Self-Assurance has a hyphen)
- Order is rank 1 → rank 10 (signature themes first)
- If only top 5 are visible, return what you find and pad with empty strings ""
- Do not invent themes
- name = the person's full name as printed on the report, if visible (helps the human pick the right contact); otherwise ""`,
  'strengths-personal-insights': `You are drafting a Personal Insights report for a Coach4U client based on their CliftonStrengths top-10.

WRITE IN CATH'S VOICE. The voice reference is the source of truth for tone:

${CATH_VOICE_REFERENCE}

STRUCTURE — exactly 4 short paragraphs, in this order, no headings:
1. What pulls this person forward (their top themes' direction)
2. How they show up at their best
3. Where the same patterns may overdo or get them stuck (frame as patterns, not deficits)
4. One or two practical things to lean into next

RULES:
- Australian English
- No exclamation marks, no emojis, no clinical language
- Plain English, short to medium sentences
- Strengths-based framing — describe patterns, not labels
- Talk to the reader as "you"
- Keep total length around 220-280 words
- Do not list the themes verbatim — weave them in naturally`,
  'strengths-bring-need': `You are drafting a "Bring & Need" reading for a Coach4U client based on their CliftonStrengths top-10. The reading is for the client to read.

WRITE IN CATH'S VOICE. The voice reference is the source of truth for tone:

${CATH_VOICE_REFERENCE}

STRUCTURE — exactly two short labelled paragraphs, no headings beyond the bold inline labels:
**What you bring** — one paragraph on what this person reliably contributes when they're in a team. Concrete, observable behaviours, not adjectives.
**What you need** — one paragraph on what they need from a team to be at their best. Practical conditions, not wishes.

RULES:
- Australian English, no exclamation marks, no emojis
- Plain English, short to medium sentences, one idea per sentence
- Strengths-based — patterns, not deficits
- Talk to the reader as "you"
- Total length 160-220 words across both paragraphs
- Don't list themes verbatim; weave them in naturally
- No "I" from Cath; this is a reading prepared for the client`,
  'strengths-adaptation-tips': `You are writing a short adaptation note for Cath (the practitioner) ahead of a session with a client. The note compares Cath's own CliftonStrengths profile to the client's, and gives Cath practical guidance on how to adapt her natural style.

WRITE IN CATH'S VOICE (this note is for her, but in the same plain register):

${CATH_VOICE_REFERENCE}

STRUCTURE — three short labelled sections:
**Where you're similar** — one sentence or two. Where Cath and the client share dominant themes or domain.
**Where you're different** — one short paragraph naming the most notable difference (domain skew or specific themes), as a pattern not a deficit.
**How to adapt** — three numbered, practical, in-session moves Cath can make to meet the client where they are. Each one short. Each one a verb.

RULES:
- Australian English, no exclamation marks, no emojis, no clinical language
- Plain English, short to medium sentences
- Strengths-based framing throughout
- Address Cath as "you"
- Keep it under 220 words across all three sections
- Don't list themes verbatim; weave them in naturally
- Skip preamble; go straight in`,
  'strengths-couple-dynamics': `You are drafting a Couple Dynamics reading for a Coach4U practitioner working with this couple in session. The reading is for the practitioner (Cath), not for the clients.

WRITE IN CATH'S VOICE. The voice reference is the source of truth for tone:

${CATH_VOICE_REFERENCE}

STRUCTURE — three short sections, each with a bold inline label:
**Where they complement** — one short paragraph on how their differences could serve them as a pair.
**Where friction is likely** — one short paragraph naming the most probable rub-point as a pattern, not a fault.
**Coaching prompts** — exactly three numbered questions Cath could use in session, each on its own line, plain English.

RULES:
- Australian English, no exclamation marks, no emojis
- Strengths-based framing — patterns not labels, never deficits
- Reference the partners by first name (use the names provided)
- Don't list themes verbatim; weave them in naturally
- Total length 200-280 words across all three sections
- Do not start with "Here is" or any preamble; go straight in`
};

const GALLUP_STATUSES=['New','Awaiting Payment','Awaiting Purchase','Awaiting Completion','Completed','Filed'];
const GALLUP_STATUS_COLORS={'New':'#64748b','Awaiting Payment':'#d97706','Awaiting Purchase':'#0891b2','Awaiting Completion':'#7c3aed','Completed':'#15803d','Filed':'#475569'};

// ── STATE ──
let contacts=[], clients=[], clientMembers=[], contactReports=[], strengthsInsights=[], gallupRequests=[];
let pulseResults=[], brainPulseSubmissions=[];
const reportTypes=[{key:'gallup',label:'Full Gallup Report'},{key:'personal_insights',label:'Personal Insights Report'},{key:'bring_need',label:'Bring Need Report'}];
const TABS=[
  {id:'dashboard',label:'Dashboard'},
  {id:'profiles',label:'Profiles'},
  {id:'upload',label:'Upload Report'},
  {id:'domains',label:'Domain Balance'},
  {id:'codes',label:'Code Tracker'},
  {id:'reports',label:'Reports'},
  {id:'sop',label:'Workflow SOP'}
];
let activeTab='dashboard';
let shShowAllState=false;

// ── UTILITIES ──
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getContactName(id){const c=contacts.find(x=>x.id===id);return c?((c.first_name||'')+' '+(c.last_name||'')).trim():'Unknown'}
function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+(type||'');setTimeout(()=>el.className='toast',2400)}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function getAnthropicKey(){return localStorage.getItem('coach4u_anthropic_key')||''}
function setAnthropicKey(k){localStorage.setItem('coach4u_anthropic_key',k)}

window.hardRefresh=async function(){
  try{
    if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs)await r.unregister()}
    if('caches' in window){const keys=await caches.keys();for(const k of keys)await caches.delete(k)}
  }catch(e){console.warn('hardRefresh:',e)}
  const url=new URL(window.location);url.searchParams.set('_bust',Date.now());
  setTimeout(()=>window.location.replace(url.toString()),200);

async function uploadReport(contactId,reportType,file){
  if(!file)return false;
  if(!file.name.toLowerCase().endsWith('.pdf')){toast('Please select a PDF','error');return false}
  const path=contactId+'/'+reportType+'_'+Date.now()+'.pdf';
  const {error:upErr}=await supabase.storage.from('client-reports').upload(path,file,{upsert:true});
  if(upErr){toast('Upload error: '+upErr.message,'error');return false}
  const {data:urlData}=supabase.storage.from('client-reports').getPublicUrl(path);
  const url=urlData.publicUrl;
  await supabase.from('contact_reports').delete().eq('contact_id',contactId).eq('report_type',reportType);
  let ins=await supabase.from('contact_reports').insert({contact_id:contactId,report_type:reportType,filename:file.name,url:url,created_at:new Date().toISOString()}).select().single();
  if(ins.error&&ins.error.code==='42703'){
    ins=await supabase.from('contact_reports').insert({contact_id:contactId,report_type:reportType,filename:file.name,url:url}).select().single();
  }
  if(ins.error){toast('Error saving report: '+ins.error.message,'error');return false}
  await loadAll();
  if(ins.data) contactReports=[ins.data,...contactReports.filter(r=>r.id!==ins.data.id)];
  return true;
}

window.uploadFromPanel=async function(){
  const file=document.getElementById('shFile').files[0];

    if(contactId){await extractWithContact(contactId,file);return}
    await extractStandalone(file);return;

  const ok=await uploadReport(contactId,reportType,file);
  if(ok){toast('Uploaded','success');renderUpload();if(activeTab==='profiles')renderProfiles()}
};

// ── AI: PDF EXTRACTION ──
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const s=r.result||'';const i=s.indexOf(',');res(i>=0?s.slice(i+1):s)};r.onerror=rej;r.readAsDataURL(file)})}

async function callAnthropic(systemPrompt,userText,pdfFile,maxTokens){
  const body={model:'claude-haiku-4-5-20251001',max_tokens:maxTokens||500,system:systemPrompt,messages:[{role:'user',content:[]}]};
  if(pdfFile){const b64=await fileToBase64(pdfFile);body.messages[0].content.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}})}
  body.messages[0].content.push({type:'text',text:userText});
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':getAnthropicKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
  if(!resp.ok){const t=await resp.text();if(resp.status===401) throw new Error('Anthropic API key invalid or expired. Open the bot (bottom-right) and paste a fresh sk-ant-… key.');throw new Error('API '+resp.status+': '+t.slice(0,200))}
  const j=await resp.json();
  return (j.content||[]).filter(p=>p.type==='text').map(p=>p.text).join('\n').trim();
}

async function extractWithContact(contactId,file){
  try{
    const ok=await uploadReport(contactId,'gallup',file);
    if(!ok)return;
    const text=await callAnthropic(AI_PROMPTS['strengths-pdf-extractor'],"Extract this person's top 10 CliftonStrengths themes in rank order from the attached PDF.",file,400);
    const m=text.match(/\{[\s\S]*\}/);const parsed=m?JSON.parse(m[0]):null;
    if(!parsed||!Array.isArray(parsed.top10)) throw new Error('Could not parse theme list');
    const lookup={};CS34.forEach(t=>{if(t)lookup[t.toLowerCase()]=t});
    const cleaned=parsed.top10.map(t=>lookup[(t||'').toLowerCase().trim()]||'').slice(0,10);
    while(cleaned.length<10) cleaned.push('');

window.saveGallupRequest=async function(){
  const id=document.getElementById('gallupReqId').value;
  const mode=document.getElementById('gallupReqMode').value;
  const product=document.getElementById('gallupReqProduct').value;
  const source=document.getElementById('gallupReqSource').value;
  const status=document.getElementById('gallupReqStatus').value;
  const discount=document.getElementById('gallupReqDiscount').value.trim()||'DH7HGTMAZ';
  const codeValue=document.getElementById('gallupReqCodeValue').value.trim()||null;
  const notes=document.getElementById('gallupReqNotes').value.trim()||null;
  if(id){
    const contactId=document.getElementById('gallupReqContact').value;
    if(!contactId){toast('Pick a contact','error');return}
    const patch={contact_id:contactId,product_type:product,source:source,status:status,discount_code:discount,code_value:codeValue,notes:notes,updated_at:new Date().toISOString()};
    const {error}=await supabase.from('gallup_code_requests').update(patch).eq('id',id);
    if(error){toast('Save failed: '+error.message,'error');return}
    toast('Saved','success');
  }else if(mode==='couple'){
    const coupleId=document.getElementById('gallupReqCouple').value;
    if(!coupleId){toast('Pick a Couple client','error');return}
    const cl=clients.find(c=>c.id===coupleId);
    if(!cl){toast('Couple not found','error');return}
    const memberIds=cl.members||[];
    if(memberIds.length<2){toast('This couple has fewer than 2 linked members','error');return}
    const rows=memberIds.map(mid=>({contact_id:mid,client_id:coupleId,product_type:product,source:source,status:status,discount_code:discount,code_value:codeValue,notes:notes}));
    const {error}=await supabase.from('gallup_code_requests').insert(rows);
    if(error){toast('Save failed: '+error.message,'error');return}
    toast('Created '+rows.length+' linked requests','success');
  }else{
    const contactId=document.getElementById('gallupReqContact').value;
    if(!contactId){toast('Pick a contact','error');return}
    const row={contact_id:contactId,product_type:product,source:source,status:status,discount_code:discount,code_value:codeValue,notes:notes};
    const {error}=await supabase.from('gallup_code_requests').insert(row);
    if(error){toast('Save failed: '+error.message,'error');return}
    toast('Request created','success');
  }
  await loadAll();
  renderCodes();
  closeModal('gallupReqModal');
};

window.deleteGallupRequest=async function(){
  const id=document.getElementById('gallupReqId').value;
  if(!id) return;
  if(!confirm('Delete this code request? This cannot be undone.')) return;
  const {error}=await supabase.from('gallup_code_requests').delete().eq('id',id);
  if(error){toast('Delete failed: '+error.message,'error');return}
  await loadAll();
  renderCodes();
  closeModal('gallupReqModal');
  toast('Request deleted','success');
};

  const allContactsSorted=contacts.filter(c=>c.strength_1).sort((a,b)=>(a.first_name+' '+a.last_name).localeCompare(b.first_name+' '+b.last_name));
  const st=reportsState;
  const keyOk=!!getAnthropicKey();

  let html=`<div onclick="navTo('dashboard')" style="font-size:13px;color:#003366;font-weight:600;cursor:pointer;margin-bottom:16px;display:inline-block;" class="no-print">&larr; Back to Dashboard</div>
  ${keyOk?'':'<div class="no-print" style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#92400e;">Anthropic API key not set. Open the bot (bottom-right) and paste your <strong>sk-ant-…</strong> key to enable AI report generation.</div>'}
  <div class="no-print" style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-bottom:16px;">
    <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:10px;">Choose a Report</div>

      <button onclick="setReportsMode('client')" style="background:${st.mode==='client'?'#003366':'#f0f4f8'};color:${st.mode==='client'?'#fff':'#003366'};border:1px solid ${st.mode==='client'?'#003366':'#e2e8f0'};padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">By Client</button>
      <button onclick="setReportsMode('contact')" style="background:${st.mode==='contact'?'#003366':'#f0f4f8'};color:${st.mode==='contact'?'#fff':'#003366'};border:1px solid ${st.mode==='contact'?'#003366':'#e2e8f0'};padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">By Contact</button>
      <button onclick="setReportsMode('team')" style="background:${st.mode==='team'?'#003366':'#f0f4f8'};color:${st.mode==='team'?'#fff':'#003366'};border:1px solid ${st.mode==='team'?'#003366':'#e2e8f0'};padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">Team</button>

      <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:${st.briefMode?'#003366':'#64748b'};font-weight:600;cursor:pointer;background:${st.briefMode?'#dbeafe':'#f0f4f8'};border:1px solid ${st.briefMode?'#003366':'#e2e8f0'};padding:7px 12px;border-radius:8px;">
        <input type="checkbox" ${st.briefMode?'checked':''} onchange="toggleReportsBrief()" style="margin:0;">Pre-session brief
      </label>
    </div>`;
  if(st.mode==='client'){
    html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <select onchange="setReportsRoleFilter(this.value)" style="padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;">
        <option value="">All client types</option>
        ${roles.map(r=>`<option value="${r}" ${r===st.roleFilter?'selected':''}>${escHtml(r)}</option>`).join('')}
      </select>
      <select onchange="setReportsClient(this.value)" style="flex:1;min-width:220px;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;">
        <option value="">— Select a client —</option>
        ${filteredClients.map(c=>`<option value="${c.id}" ${c.id===st.clientId?'selected':''}>${escHtml(c.relationship_name)} (${escHtml(c.role||'Other')})</option>`).join('')}
      </select>
    </div>`;
  } else if(st.mode==='team'){
    const pickedNames=st.teamIds.map(id=>{const c=contacts.find(x=>x.id===id);return c?`<span style="background:#dbeafe;color:#1e3a5f;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;">${escHtml(c.first_name)} ${escHtml(c.last_name)}<span onclick="removeReportsTeamMember('${id}')" style="cursor:pointer;color:#dc2626;font-weight:700;">&times;</span></span>`:''}).join('');
    const clientsWithMembers=allClients.filter(c=>(c.members||[]).length);
    html+=`<div style="margin-bottom:8px;">
      <div style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Pick a team client (loads its members instantly)</div>
      <select onchange="addReportsTeamFromClient(this.value)" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;">
        <option value="">— Select a team client —</option>
        ${clientsWithMembers.map(c=>`<option value="${c.id}">${escHtml(c.relationship_name)} (${escHtml(c.role||'Other')} &middot; ${(c.members||[]).length} member${(c.members||[]).length===1?'':'s'})</option>`).join('')}

    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">

    </div>
    ${st.teamIds.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">${pickedNames}</div>`:'<div style="font-size:11px;color:#94a3b8;margin-top:8px;">Pick a client to load its team in one tap, or build an ad-hoc team.</div>'}`;
  } else {
    html+=`<select onchange="setReportsContact(this.value)" style="width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;">
      <option value="">— Select a contact (with strengths) —</option>
      ${allContactsSorted.map(c=>`<option value="${c.id}" ${c.id===st.contactId?'selected':''}>${escHtml(c.first_name)} ${escHtml(c.last_name)}</option>`).join('')}
    </select>`;
  }
  html+=`</div>`;

  // Render the chosen report
  if(st.mode==='client'&&st.clientId){

    if(cl){

      const withStrengths=memberContacts.filter(c=>c.strength_1);
      html+=`<div style="background:#fff;border:1px solid #e2e8f0;border-left:4px solid #003366;border-radius:12px;padding:14px 18px;margin-bottom:14px;">

        <div style="font-size:12px;color:#64748b;margin-top:2px;">${escHtml(cl.role||'Other')} &middot; ${memberContacts.length} member${memberContacts.length===1?'':'s'} &middot; ${withStrengths.length} with strengths recorded</div>
      </div>`;
      if(!memberContacts.length){
        html+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;text-align:center;color:#94a3b8;">This client has no linked members yet.</div>';
      } else if(memberContacts.length===1){
        html+=st.briefMode?renderPreSessionBriefIndividual(memberContacts[0]):renderStrengthsCard(memberContacts[0],keyOk);
      } else if(memberContacts.length===2){
        html+=st.briefMode?renderPreSessionBriefPair(memberContacts[0],memberContacts[1]):renderPairComparison(memberContacts[0],memberContacts[1],keyOk);
      } else {
        html+=renderTeamHeatmap(cl.relationship_name||'Team',memberContacts);

  } else if(st.mode==='contact'&&st.contactId){
    const c=contacts.find(x=>x.id===st.contactId);
    html+=st.briefMode?renderPreSessionBriefIndividual(c):renderStrengthsCard(c,keyOk);
  } else if(st.mode==='team'&&st.teamIds.length){
    const teamMembers=st.teamIds.map(id=>contacts.find(c=>c.id===id)).filter(Boolean);
    if(teamMembers.length===1) html+=st.briefMode?renderPreSessionBriefIndividual(teamMembers[0]):renderStrengthsCard(teamMembers[0],keyOk);
    else if(teamMembers.length===2) html+=st.briefMode?renderPreSessionBriefPair(teamMembers[0],teamMembers[1]):renderPairComparison(teamMembers[0],teamMembers[1],keyOk);
    else html+=renderTeamHeatmap('Ad-hoc team',teamMembers);
  } else {
    html+=`<div class="no-print" style="background:#fff;border:1px dashed #cbd5e1;border-radius:12px;padding:30px;text-align:center;color:#94a3b8;font-size:13px;">Pick a client, contact, or build a team above.</div>`;

  document.getElementById('reportsContent').innerHTML=html;
}

// ── Report card renderers ──
function renderStrengthsCard(c,keyOk){
  if(!c) return '<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;text-align:center;color:#94a3b8;">No contact selected.</div>';
  const list=getContactStrengths(c);
  if(!list.length) return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;text-align:center;color:#94a3b8;">${escHtml(c.first_name)} ${escHtml(c.last_name)} has no strengths recorded yet.</div>`;
  const dc={Executing:0,Influencing:0,Relationship:0,Strategic:0};
  list.forEach(s=>{const d=getDomain(s.name);if(d)dc[d]++});
  const total=Object.values(dc).reduce((a,b)=>a+b,0)||1;
  const top5=list.filter(s=>s.rank<=5);
  const bottom5=list.filter(s=>s.rank>5);
  let h=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
      <div><div style="font-family:'Quicksand','Inter',sans-serif;font-size:18px;font-weight:700;color:#1e3a5f;">${escHtml(c.first_name)} ${escHtml(c.last_name)}</div>${c.email?`<div style="font-size:12px;color:#94a3b8;margin-top:2px;">${escHtml(c.email)}</div>`:''}</div>
      <button onclick="window.print()" class="no-print" style="background:#003366;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">&#128424; Print</button>
    </div>
    <div style="display:flex;border-radius:6px;overflow:hidden;height:24px;margin-top:12px;margin-bottom:8px;">${Object.entries(dc).map(([d,n])=>n?`<div style="background:${domainColors[d]};width:${(n/total*100).toFixed(1)}%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;">${d.slice(0,3).toUpperCase()} ${n}</div>`:'').join('')}</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:#64748b;">${Object.entries(dc).map(([d,n])=>`<span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:${domainColors[d]};"></span>${d}: ${n}</span>`).join('')}</div>
  </div>`;
  function group(title,items){
    if(!items.length) return '';
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-bottom:12px;">
      <div style="font-family:'Quicksand','Inter',sans-serif;font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase;">${title}</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${items.map(s=>`<div style="display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid #f1f5f9;">
          <div style="background:${csColor(s.name)};color:#fff;font-weight:700;font-size:13px;padding:6px 10px;border-radius:4px;min-width:46px;text-align:center;flex-shrink:0;">#${s.rank}</div>
          <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:14px;color:#1e293b;">${s.name}</div></div>
        </div>`).join('')}
      </div>
    </div>`;
  }
  h+=group('Top 5 — Signature Themes',top5);
  if(bottom5.length) h+=group('Themes 6–10',bottom5);
  // AI blocks
  const piIns=getInsight(c.id,'personal_insights');
  const bnIns=getInsight(c.id,'bring_need');
  const adaptIns=getInsight(c.id,'adaptation_tips');
  const cath=findCathContact();
  const showAdapt=cath&&cath.id!==c.id;
  const aiBlock=(label,fn,ins)=>{
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
        <div style="font-family:'Quicksand','Inter',sans-serif;font-size:13px;font-weight:700;color:#1e3a5f;letter-spacing:.5px;text-transform:uppercase;">${label}</div>
        <button class="no-print" id="${fn}Btn-${c.id}" onclick="${fn}('${c.id}')" ${keyOk?'':'disabled'} style="background:${keyOk?'#003366':'#cbd5e1'};color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:${keyOk?'pointer':'not-allowed'};">${ins?'Regenerate':'Generate'}</button>
      </div>
      ${ins?`<div style="font-size:13px;line-height:1.7;color:#334155;white-space:pre-wrap;">${escHtml(ins.content)}</div><div class="no-print" style="font-size:11px;color:#94a3b8;margin-top:8px;">Generated ${new Date(ins.created_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}</div>`:'<div style="font-size:12px;color:#94a3b8;">Not generated yet.</div>'}
    </div>`;
  };
  h+=aiBlock('Personal Insights','generatePersonalInsights',piIns);
  h+=aiBlock('Bring &amp; Need','generateBringNeed',bnIns);
  if(showAdapt) h+=aiBlock('Adaptation Tips (for Cath)','generateAdaptationTips',adaptIns);
  return h;
}

  const set2=new Set(l2.map(s=>s.name));
  const shared=l1.filter(s=>set2.has(s.name)).map(s=>s.name);
  const dynIns=findCoupleInsight(p1.id,p2.id);
  let h=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
      <div style="font-family:'Quicksand','Inter',sans-serif;font-size:16px;font-weight:700;color:#1e3a5f;">${escHtml(p1.first_name)} &amp; ${escHtml(p2.first_name)}</div>
      <button onclick="window.print()" class="no-print" style="background:#003366;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">&#128424; Print</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:10px;">
      <div><div style="font-size:11px;color:#64748b;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;">${escHtml(p1.first_name)}</div>${strengthsRowChips(l1)}<div style="margin-top:8px;">${domainBar(l1,16)}</div></div>
      <div><div style="font-size:11px;color:#64748b;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;">${escHtml(p2.first_name)}</div>${strengthsRowChips(l2)}<div style="margin-top:8px;">${domainBar(l2,16)}</div></div>
    </div>
    ${shared.length?`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;font-size:12px;color:#15803d;"><strong>Shared themes:</strong> ${shared.join(', ')}</div>`:'<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:12px;color:#64748b;">No shared themes in their top 10.</div>'}
  </div>
  <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;margin-bottom:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
      <div style="font-family:'Quicksand','Inter',sans-serif;font-size:13px;font-weight:700;color:#1e3a5f;letter-spacing:.5px;text-transform:uppercase;">Couple Dynamics (for Cath)</div>
      <button class="no-print" onclick="generateCoupleDynamics('${p1.id}','${p2.id}')" ${keyOk?'':'disabled'} style="background:${keyOk?'#003366':'#cbd5e1'};color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:${keyOk?'pointer':'not-allowed'};">${dynIns?'Regenerate':'Generate'}</button>
    </div>
    ${dynIns?`<div style="font-size:13px;line-height:1.7;color:#334155;white-space:pre-wrap;">${escHtml(dynIns.content)}</div><div class="no-print" style="font-size:11px;color:#94a3b8;margin-top:8px;">Generated ${new Date(dynIns.created_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}</div>`:'<div style="font-size:12px;color:#94a3b8;">Not generated yet.</div>'}
  </div>`;
  return h;
}

function renderTeamHeatmap(teamLabel,members){
  const withStr=members.filter(m=>m.strength_1);
  if(!members.length) return '<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;text-align:center;color:#94a3b8;">No members in this team.</div>';
  const themeFreq={};
  members.forEach(m=>{for(let i=1;i<=10;i++){const s=m['strength_'+i];if(s)themeFreq[s]=(themeFreq[s]||0)+1}});
  const dc={Executing:0,Influencing:0,Relationship:0,Strategic:0};
  Object.entries(themeFreq).forEach(([name,n])=>{const d=getDomain(name);if(d)dc[d]+=n});
  const totalDom=Object.values(dc).reduce((a,b)=>a+b,0)||1;
  const missingDomains=Object.entries(dc).filter(([_,n])=>n===0).map(([d])=>d);
  const sortedThemes=Object.entries(themeFreq).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));
  const shared=sortedThemes.filter(([_,n])=>n>=2);
  const sharedSet=new Set(shared.map(([n])=>n));
  function nameOf(c){return ((c.preferred_name||c.first_name||'')+' '+(c.last_name||'')).trim()||'(no name)'}
  let h=`<div style="background:#fff;border:1px solid #e2e8f0;border-left:4px solid #003366;border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
    <div><div style="font-family:'Quicksand','Inter',sans-serif;font-weight:700;color:#1e3a5f;font-size:16px;">${escHtml(teamLabel)}</div><div style="font-size:12px;color:#64748b;margin-top:2px;">Team heatmap &middot; ${members.length} member${members.length===1?'':'s'} &middot; ${withStr.length} with strengths recorded${missingDomains.length?' &middot; missing: '+missingDomains.join(', '):''}</div></div>
    <button onclick="window.print()" class="no-print" style="background:#003366;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">&#128424; Print</button>
  </div>`;
  if(!withStr.length) return h+'<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;text-align:center;color:#94a3b8;">No strengths recorded for any member yet.</div>';
  h+=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 18px;margin-bottom:14px;">
    <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:8px;">Domain balance — combined</div>
    <div style="display:flex;border-radius:6px;overflow:hidden;height:24px;margin-bottom:8px;">${Object.entries(dc).map(([d,n])=>n?`<div style="background:${domainColors[d]};width:${(n/totalDom*100).toFixed(1)}%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;">${d.slice(0,3).toUpperCase()} ${n}</div>`:'').join('')}</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:#64748b;">${Object.entries(dc).map(([d,n])=>`<span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:${domainColors[d]};"></span>${d}: ${n}${dc[d]===0?' <strong style="color:#dc2626;">(gap)</strong>':''}</span>`).join('')}</div>
  </div>`;
  if(shared.length){
    h+=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 18px;margin-bottom:14px;">
      <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:8px;">Shared themes (${shared.length} theme${shared.length===1?'':'s'} appear in 2+ members)</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">${shared.map(([name,n])=>`<span style="background:${csColor(name)};color:#fff;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;">${name} <span style="background:rgba(255,255,255,.25);padding:1px 6px;border-radius:99px;font-weight:700;">${n}</span></span>`).join('')}</div>
    </div>`;
  } else {
    h+='<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px 18px;margin-bottom:14px;font-size:12px;color:#92400e;">No themes appear in more than one member\'s top-10. The team has high diversity.</div>';
  }
  h+=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 18px;margin-bottom:14px;">
    <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:10px;">Members (${members.length})</div>`;
  members.forEach(m=>{

async function callAnthropicJson(systemPrompt,userText,maxTokens){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':getAnthropicKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens||1200,system:systemPrompt,messages:[{role:'user',content:userText}]})
  });
  if(!resp.ok){const t=await resp.text();if(resp.status===401) throw new Error('Anthropic API key invalid or expired. Open the bot and paste a fresh sk-ant-… key.');throw new Error('API '+resp.status+': '+t.slice(0,200))}
  const j=await resp.json();
  const text=(j.content||[]).filter(p=>p.type==='text').map(p=>p.text).join('\n').trim();
  return {text,usage:j.usage||{}};
}

async function saveInsight(contactId,type,text,usage,snapshot){
  const ins={contact_id:contactId,insight_type:type,content:text,strengths_snapshot:snapshot,model:'claude-haiku-4-5-20251001',tokens_in:usage.input_tokens||null,tokens_out:usage.output_tokens||null};
  const {error}=await supabase.from('strengths_insights').insert(ins);
  if(error){console.error(error);toast('Saved locally but DB write failed: '+error.message,'error')}
  await loadAll();
}

    ${stage('3','Awaiting Purchase','Cath','Once payment lands in the bank, buy the code on the Gallup Store using discount code <code>DH7HGTMAZ</code>. Note the code value into the Code Tracker card.','Code purchased and pasted into the card\'s <em>Code value</em> field. Status moves to <strong>Awaiting Purchase</strong>.')}

function appendChat(role,msg){const c=document.getElementById('aiChatMessages');const colour=role==='bot'?'#f0fdf4':'#dbeafe';const align=role==='bot'?'flex-start':'flex-end';c.insertAdjacentHTML('beforeend',`<div style="background:${colour};border-radius:12px;padding:10px 14px;font-size:13px;color:#1e3a5f;max-width:90%;align-self:${align};">${escHtml(msg)}</div>`);c.scrollTop=c.scrollHeight}
window.sendAiChat=function(){
  const inp=document.getElementById('aiChatInput');const msg=inp.value.trim();if(!msg)return;inp.value='';
  appendChat('user',msg);
  if(msg.startsWith('sk-ant-')){setAnthropicKey(msg);appendChat('bot','API key saved. Auto-extract is now enabled.');return}
  appendChat('bot','In v0.1 the bot only saves your sk-ant-… key. Full chat tools are in the main CRM.');

// ── INIT ──
async function init(){
  // 1. Make the dashboard screen visible immediately with a Loading state
  //    so the user always sees something even before data resolves.
  activeTab='dashboard';
  document.getElementById('screen-dashboard').classList.add('active');
  document.getElementById('dashContent').innerHTML='<div style="padding:40px;text-align:center;color:#64748b;font-size:13px;">Loading Strengths Hub data…</div>';
  // 2. Render tabs synchronously so navigation works even if data load fails.
  try{ renderTabs(); }catch(e){ console.error('renderTabs failed:',e); }
  // 3. Load + render the dashboard.
  try{
    await loadAll();
    navTo('dashboard');
  }catch(e){
    console.error('Init failed:',e);
    document.getElementById('dashContent').innerHTML='<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:24px;color:#dc2626;">Could not load data: '+escHtml(e.message)+'<br><br>Open DevTools Console for details, or click the &#128260; refresh button at the top right.</div>';
  }
}
init();
