<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Coach4U — Request a Gallup CliftonStrengths Code</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
.header{background:#003366;color:#fff;padding:20px 24px;text-align:center;border-bottom:4px solid #c9a646}
.header h1{font-size:20px;font-weight:700;margin-bottom:2px}
.header .sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8aaac8}
.container{max-width:560px;margin:0 auto;padding:20px 16px 40px}
.card{background:#fff;border-radius:12px;padding:22px 24px;margin-bottom:16px;border:1px solid #e2e8f0;border-left:4px solid #003366}
.card h2{font-size:17px;color:#003366;margin-bottom:6px}
.card p{font-size:13px;color:#475569;line-height:1.6}
.org-pill{display:inline-block;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:99px;font-weight:700;margin-top:6px}
.error-card{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:24px;text-align:center;color:#dc2626;font-size:14px;line-height:1.6}
.form-card{background:#fff;border-radius:12px;padding:22px 24px;border:1px solid #e2e8f0}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#1e3a5f;margin-bottom:6px;letter-spacing:.3px}
.form-group label .req{color:#dc2626;margin-left:2px}
.form-group input,.form-group textarea{width:100%;padding:11px 13px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px;font-family:inherit;background:#fff;color:#1e293b;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group textarea:focus{border-color:#003366}
.form-group textarea{resize:vertical;min-height:80px}
.form-help{font-size:11px;color:#94a3b8;margin-top:4px;line-height:1.5}
.submit-btn{background:#003366;color:#fff;border:none;padding:14px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:background .2s}
.submit-btn:hover{background:#1a4d80}
.submit-btn:disabled{background:#94a3b8;cursor:not-allowed}
.success-card{background:#f0fdf4;border:1px solid #bbf7d0;border-left:4px solid #15803d;border-radius:12px;padding:28px 24px;text-align:center}
.success-card h2{color:#15803d;font-size:20px;margin-bottom:10px}
.success-card p{color:#166534;font-size:14px;line-height:1.6}
.footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:30px;padding:0 16px}
</style>
</head>
<body>
<div class="header">
  <h1>Gallup CliftonStrengths Code Request</h1>
  <div class="sub">Coach4U</div>
</div>
<div class="container" id="root">
  <div class="card"><p>Loading…</p></div>
</div>
<div class="footer">SARUBA PTY LTD t/a Coach4U &middot; ABN 50 678 462 178</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://uoixetfvboevjxlkfyqy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const orgId = params.get('org');
const root = document.getElementById('root');

function showError(msg){
  root.innerHTML = `<div class="error-card"><strong>This link isn't active.</strong><br>${msg}<br><br>Contact Cath at Coach4U if you think this is wrong.</div>`;
}

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function init(){
  if(!orgId){showError('No organisation specified in the link.');return;}
  const {data: client, error} = await supabase.from('clients').select('id,relationship_name,role,status').eq('id',orgId).maybeSingle();
  if(error){showError('Could not look up the organisation. Try again later.');return;}
  if(!client){showError('Organisation not found.');return;}
  if(client.role !== 'Organisation'){showError('This link is for organisations only.');return;}
  if(client.status === 'Completed'){showError('This organisation is no longer accepting requests.');return;}
  renderForm(client);
}

function renderForm(client){
  root.innerHTML = `
    <div class="card">
      <h2>Hi from Coach4U</h2>
      <p>Use this form to request a Gallup CliftonStrengths assessment code. Cath will set up the code and email it to you.</p>
      <div class="org-pill">For: ${escHtml(client.relationship_name)}</div>
    </div>
    <div class="form-card">
      <div class="form-group">
        <label>Full name<span class="req">*</span></label>
        <input id="fName" placeholder="First and last name" autocomplete="name">
        <div class="form-help">As you'd like it to appear on your CliftonStrengths report.</div>
      </div>
      <div class="form-group">
        <label>Email<span class="req">*</span></label>
        <input id="fEmail" type="email" placeholder="you@example.com" autocomplete="email">
        <div class="form-help">Cath will email your code to this address.</div>
      </div>
      <div class="form-group">
        <label>Mobile (optional)</label>
        <input id="fPhone" type="tel" placeholder="04xx xxx xxx" autocomplete="tel">
      </div>
      <div class="form-group">
        <label>Anything Cath should know? (optional)</label>
        <textarea id="fNotes" placeholder="e.g. timing, accessibility needs, your role"></textarea>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitForm()">Send request</button>
    </div>
  `;
  window._client = client;
}

window.submitForm = async function(){
  const name = document.getElementById('fName').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const notes = document.getElementById('fNotes').value.trim();
  if(!name){alert('Please enter your full name.');return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alert('Please enter a valid email.');return;}
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Sending…';
  const client = window._client;
  // Split name into first/last for contacts table
  const parts = name.split(/\s+/);
  const first = parts.shift() || '';
  const last = parts.join(' ');
  // 1. Find or create contact by email match
  let contactId = null;
  const {data: existing} = await supabase.from('contacts').select('id').ilike('email', email).maybeSingle();
  if(existing){
    contactId = existing.id;
  } else {
    const {data: created, error: insErr} = await supabase.from('contacts').insert({first_name:first,last_name:last,email:email,phone:phone||null}).select('id').single();
    if(insErr){btn.disabled=false;btn.textContent='Send request';alert('Could not save your contact: '+insErr.message);return;}
    contactId = created.id;
  }
  // 2. Link as member of the org (idempotent)
  const {data: existingLink} = await supabase.from('client_members').select('id').eq('client_id',client.id).eq('contact_id',contactId).maybeSingle();
  if(!existingLink){
    await supabase.from('client_members').insert({client_id:client.id, contact_id:contactId});
  }
  // 3. Create gallup_code_requests row
  const reqNotes = `Requested via public form${notes?` — ${notes}`:''}`;
  const {error: reqErr} = await supabase.from('gallup_code_requests').insert({
    contact_id: contactId,
    client_id: client.id,
    product_type: 'Top 5',
    source: 'Coach4U',
    status: 'New',
    discount_code: 'DH7HGTMAZ',
    notes: reqNotes
  });
  if(reqErr){btn.disabled=false;btn.textContent='Send request';alert('Could not create the request: '+reqErr.message);return;}
  // 4. Show thank-you
  root.innerHTML = `
    <div class="success-card">
      <h2>Thanks ${escHtml(first)}</h2>
      <p>Your request has been sent. Cath will email your CliftonStrengths code to <strong>${escHtml(email)}</strong> within a few business days.</p>
      <p style="margin-top:14px;">If you don't see it, check your spam folder, or contact Cath directly.</p>
    </div>
  `;
};

init();
</script>
</body>
</html>
