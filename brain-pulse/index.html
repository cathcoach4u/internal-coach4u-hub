function renderLand(){var h='<div class="intro-card"><p class="intro-lead">This diagnostic tool helps you understand your nervous system, wellbeing, self-talk patterns, and how you manage everyday brain tasks — measuring capacity, purpose, confidence, and execution.</p><div class="intro-focus"><div class="intro-label">The Core Focus</div><div class="intro-focus-text">Move from feeling <strong>Overwhelmed</strong> and <strong>Unsteady</strong> &rarr; to <strong>Grounded</strong>, <strong>Steady</strong> and <strong>Anchored</strong>.</div></div><p class="intro-body">Think of your capacity like a battery. Life makes constant demands — stress, poor sleep, emotional load, decision fatigue, health concerns, and everyday responsibilities. When your battery runs low, managing tasks becomes harder and your reserves deplete. When you actively recharge through rest, connection, and regulation, you create more space to focus, manage emotions, make clear decisions, and move toward what matters. This check-in helps you see where your battery is sitting right now.</p><div class="intro-how"><div class="intro-label">&#9999;&#65039; How to Complete the Check-In</div><ul><li>Rate how true each statement feels for you <strong>right now</strong>.</li><li>Use the <strong>1–10 scale</strong> for each statement.</li><li>Try not to overthink your answers. Your first response is usually the most accurate.</li><li><strong>Lower scores</strong> suggest your capacity may be running low.</li><li><strong>Higher scores</strong> suggest your reserves are stronger.</li></ul></div></div>';h+='<div style="text-align:center;margin-bottom:20px;"><button type="button" class="start-btn" onclick="screen=\'room\';room=0;render()">Start</button></div>';if(!isPublic&&pulseHistory.length>0)h+='<div style="background:#f8f8f8;border:1px solid #DDDDDD;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:12px;"><div style="font-weight:600;color:#1B3664;margin-bottom:6px;">Your History</div><div style function renderSummary(){var h='<h2 style="font-family:Inter,sans-serif;font-size:18px;font-weight:700;color:#1B3664;margin-bottom:16px;">Review your answers</h2>';CONF.rooms.forEach(function(r){h+='<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #DDDDDD;"><div style="font-weight:600;color:#1B3664;margin-bottom:8px;">'+r.emoji+' '+r.label+'</div>';r.items.forEach(function(t,i){var q=r.id+'_'+(i+1),v=answers[q]||0;h+='<div class="summary-card"><div class="summary-question">'+t+'</div><div><span class="summary-rating">'+v+'</span><span class="summary-edit" onclick="screen=\'room\';room='+CONF.rooms.indexOf(r)+';render()">Edit</span></div></div>';});h+='</div>';});h+='<div class="nav-buttons"><button class="btn-secondary" onclick="screen=\'room\';room=0;render()">Back</button><button class="btn-primary" onclick="submit()">Submit</button></div>';document.getElementById('app').innerHTML=h;}
function calc(){var sc={capacity:0,wellbeing:0,strengths:0,ex:0};CONF.rooms.forEach(function(r){var s=0;r.items.forEach(function(_,i){s+=answers[r.id+'_'+(i+1)]||0;});sc[r.id]=s;});var tot=sc.capacity+sc.wellbeing+sc.strengths+sc.ex,st='Overwhelmed';for(var i=0;i<CONF.stages.length;i++)if(tot>=CONF.stages[i].min&&tot<=CONF.stages[i].max){st=CONF.stages[i].name;break;}var low=null,lv=999;for(var k in sc)if(sc[k]<lv){lv=sc[k];low=k;}return {sc:sc,tot:tot,st:st,low:low};}
async function submit(){var btn=document.querySelector('.btn-primary');if(btn){btn.disabled=true;btn.textContent='Submitting...';}var c=calc();var ansSnap={};for(var k in answers)ansSnap[k]=answers[k];var localResult={id:'local-'+Date.now(),created_at:new Date().toISOString(),capacity_total:c.sc.capacity,wellbeing_total:c.sc.wellbeing,strengths_total:c.sc.strengths,ef_total:c.sc.ex,grand_total:c.tot,stage:c.st,lowest_room:c.low,_answers:ansSnap};if(isPublic){viewId=localResult;clear();answers={};screen='results';render();return;}var row={contact_id:contact.id,capacity_1:answers.capacity_1||0,capacity_2:answers.capacity_2||0,capacity_3:answers.capacity_3||0,capacity_4:answers.capacity_4||0,capacity_5:answers.capacity_5||0,wellbeing_purpose:answers.wellbeing_1||0,wellbeing_social:answers.wellbeing_2||0,wellbeing_financial:answers.wellbeing_3||0,wellbeing_physical:answers.wellbeing_4||0,wellbeing_community:answers.wellbeing_5||0,strengths_1:answers.strengths_1||0,strengths_2:answers.strengths_2||0,strengths_3:answers.strengths_3||0,strengths_4:answers.strengths_4||0,strengths_5:answers.strengths_5||0,ef_initiation:answers.ex_1||0,ef_sustained:answers.ex_2||0,ef_inhibition:answers.ex_3||0,ef_planning:answers.ex_4||0,ef_memory:answers.ex_5||0};try{var res=await SUPA.from(CONF.table).insert(row).select();if(res.error){if(btn){btn.disabled=false;btn.textContent='Error — try again';}alert('Submission error: '+res.error.message);console.error(res.error);return;}var saved=(res.data&&res.data[0])?res.data[0]:localResult;clear();answers={};pulseHistory.unshift(saved);viewId=saved;screen='results';render();}catch(err){if(btn){btn.disabled=false;btn.textContent='Error — try again';}alert('Submission failed: '+(err.message||err));console.error(err);}}
function scoreColor(v){if(!v)return '#cbd5e1';if(v<=4)return '#dc2626';if(v<=6)return '#d97706';return '#16a34a';}
function renderResults(){
  var r=viewId;
  var st=CONF.stages.find(s=>s.name===r.stage||(r.grand_total>=s.min&&r.grand_total<=s.max))||{};
  var stageColor=st.color||'#1B3664';
  var d=new Date(r.created_at);
  var dateStr=d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var clientName=contact&&contact.first_name?((contact.first_name||'')+' '+(contact.last_name||'')).trim():'';
  var roomKeys=['capacity','wellbeing','strengths','ex'];
  var h='<div class="print-only" style="text-align:center;padding-bottom:10px;border-bottom:2px solid #1B3664;margin-bottom:14px;"><div style="font-size:14px;font-weight:700;color:#1B3664;letter-spacing:1px;">Coach4U · Brain Pulse</div><div style="font-size:10px;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-top:2px;">Capacity Check-In Report</div></div>';
  if(clientName)h+='<div style="background:#fff;border:1px solid #DDDDDD;border-radius:12px;padding:12px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;"><div style="font-size:14px;font-weight:700;color:#1B3664;">'+clientName+'</div><div style="font-size:12px;color:#666;">'+dateStr+'</div></div>';
  else h+='<div style="text-align:center;font-size:12px;color:#666;margin-bottom:12px;">'+dateStr+'</div>';
  h+='<div style="background:#f8fafc;border:1px solid #DDDDDD;border-left:6px solid '+stageColor+';border-radius:12px;padding:16px 20px;margin-bottom:14px;"><div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:8px;">Overall Result</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;"><div style="font-size:22px;font-weight:800;color:'+stageColor+';">'+(r.stage||'')+'</div><div style="font-size:36px;font-weight:800;color:'+stageColor+';line-height:1;">'+(r.grand_total||r.total||0)+'<span style="font-size:14px;color:#999;font-weight:500;">/200</span></div></div><div style="font-size:12px;line-height:1.55;color:#4a4a4a;">'+(CONF.stageDesc[r.stage]||'')+'</div></div>';
  h+='<div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:8px;text-align:center;">Capacity Journey</div><div style="display:flex;gap:3px;margin-bottom:16px;">';
  CONF.stages.forEach(function(stg){var active=stg.name===r.stage;h+='<div style="flex:1;text-align:center;border-radius:6px;padding:7px 2px;font-size:9px;font-weight:700;line-height:1.3;border:1px solid '+(active?'transparent':'#cbd5e1')+';'+(active?'background:'+stg.color+';color:#fff;':'background:#ededed;color:#8a8a8a;')+'">'+stg.name+'<br><span style="font-weight:400;">'+stg.min+'–'+stg.max+'</span></div>';});
  h+='</div>';
  h+='<div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:10px;text-align:center;">Your Brain Results &amp; Focus</div><div style="display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;">';
  roomKeys.forEach(function(key){
    var meta=CONF.roomMeta[key],isLowest=r.lowest_room===key,score=key==='ex'?r.ef_total:r[key+'_total'];
    var focusItems=CONF.coachingFocus[key]||[];
    h+='<div style="border-radius:12px;border:1px solid '+meta.borderColor+';background:#fff;overflow:hidden;display:flex;flex-direction:column;"><div style="background:'+meta.headerBg+';padding:10px 12px;display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;border-radius:8px;background:'+meta.color+';color:#fff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+meta.letter+'</div><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;color:#0b3a6e;">'+meta.label+(isLowest?' <span style="display:inline-block;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#fff;color:#555;border:1px solid #d1d5db;border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle;">Focus</span>':'')+'</div><div style="font-size:10px;color:#7c7c7c;font-style:italic;margin-top:1px;line-height:1.3;">'+meta.shortDesc+'</div></div><div style="text-align:right;flex-shrink:0;"><div style="font-size:24px;font-weight:800;color:'+meta.color+';line-height:1;">'+score+'</div><div style="font-size:10px;color:#94a3b8;">/50</div></div></div><div style="padding:10px 12px 6px;font-size:11.5px;line-height:1.55;color:#4d4d4d;">'+meta.fullDesc+'</div><div style="padding:8px 12px 12px;border-top:1px dashed #eee;margin-top:auto;"><div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:6px;">Coaching Focus</div><ul style="margin:0;padding-left:16px;">'+focusItems.map(function(item){return '<li style="font-size:11px;line-height:1.5;color:#4d4d4d;margin-bottom:3px;">'+item+'</li>';}).join('')+'</ul></div></div>';
  });
  h+='</div>';
  h+='<div style="margin-top:24px;page-break-before:always;"><div class="print-only" style="text-align:center;padding-bottom:10px;border-bottom:2px solid #1B3664;margin-bottom:14px;"><div style="font-size:14px;font-weight:700;color:#1B3664;letter-spacing:1px;">Coach4U · Brain Pulse</div><div style="font-size:10px;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-top:2px;">'+(clientName?clientName+' · ':'')+dateStr+'</div></div><div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:10px;text-align:center;">Question Scores</div><div style="background:#f8fafc;border:1px solid #DDDDDD;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:center;gap:18px;flex-wrap:wrap;"><div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;"><span style="display:inline-block;width:18px;height:18px;border-radius:4px;background:#dc2626;color:#fff;font-weight:800;font-size:11px;display:inline-flex;align-items:center;justify-content:center;">1</span><span><strong>1–4</strong> Reserves running low</span></div><div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;"><span style="display:inline-block;width:18px;height:18px;border-radius:4px;background:#d97706;color:#fff;font-weight:800;font-size:11px;display:inline-flex;align-items:center;justify-content:center;">5</span><span><strong>5–6</strong> Building capacity</span></div><div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;"><span style="display:inline-block;width:18px;height:18px;border-radius:4px;background:#16a34a;color:#fff;font-weight:800;font-size:11px;display:inline-flex;align-items:center;justify-content:center;">7</span><span><strong>7–10</strong> Strong reserves</span></div></div><div style="display:grid;grid-template-columns:1fr;gap:12px;">';
  roomKeys.forEach(function(key){
    var meta=CONF.roomMeta[key],score=key==='ex'?r.ef_total:r[key+'_total'];
    h+='<div style="border-radius:12px;border:1px solid '+meta.borderColor+';background:#fff;overflow:hidden;"><div style="background:'+meta.headerBg+';padding:8px 12px;display:flex;align-items:center;gap:8px;"><div style="width:24px;height:24px;border-radius:6px;background:'+meta.color+';color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+meta.letter+'</div><div style="font-size:12px;font-weight:700;color:#0b3a6e;">'+meta.label+'</div><div style="margin-left:auto;font-size:11px;font-weight:700;color:'+meta.color+';">'+score+'/50</div></div><div style="padding:6px 12px 10px;">';
    (CONF.questionDb[key]||[]).forEach(function(q){
      var v=r[q.col]!=null?r[q.col]:(r._answers&&r._answers[q.pk])||0;
      var col=scoreColor(v);
      h+='<div style="display:flex;gap:8px;align-items:flex-start;padding:4px 0;border-bottom:1px dashed #f1f5f9;"><div style="flex-shrink:0;min-width:24px;height:22px;border-radius:5px;background:'+col+';color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;">'+(v||'—')+'</div><div style="font-size:10.5px;line-height:1.4;color:#475569;">'+q.text+'</div></div>';
    });
    h+='</div></div>';
  });
  h+='</div></div>';
  if(!isPublic)h+='<div class="cta-text">Come back next week for another check-in.</div>';
  h+='<button class="print-btn" onclick="window.print()">Print results</button>';
  if(!isPublic)h+='<button class="btn-secondary" style="margin-top:8px;width:100%;" onclick="viewId=null;screen=\'landing\';render()">Back to home</button>';
  document.getElementById('app').innerHTML=h;
}
function renderResult(){var r=viewId;renderResults();}
async function init(){var p=new URLSearchParams(window.location.search),c=p.get('c');isPublic=!c;if(isPublic){contact={first_name:'there'};load();render();return;}try{document.getElementById('app').innerHTML='<div class="loading">Connecting...</div>';SUPA=window.supabase.createClient(CONF.url,CONF.key);var res=await SUPA.from('contacts').select('id,first_name,last_name').eq('id',c).single();if(res.error){document.getElementById('app').innerHTML='<div class="error-card">Error: '+res.error.message+'</div>';return;}contact=res.data;var hres=await SUPA.from(CONF.table).select('*').eq('contact_id',c).order('created_at',{ascending:false});if(!hres.error)pulseHistory=hres.data||[];load();render();}catch(e){console.error(e);document.getElementById('app').innerHTML='<div class="error-card">Error: '+(e.message||e)+'</div>';}}
init();
</script>
