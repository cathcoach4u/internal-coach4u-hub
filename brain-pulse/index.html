<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coach4U – ThriveHQ Brain Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat','Inter',system-ui,sans-serif;background:#fff;color:#2D2D2D;min-height:100vh;line-height:1.1}
.header{background:#1B3664;color:#fff;padding:24px;text-align:center;border-bottom:4px solid #5684C4}
.header h1{font-family:'Inter',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px}
.header .sub{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#5684C4}
.container{max-width:640px;margin:0 auto;padding:24px 16px 40px}
.welcome{background:#fff;border-radius:12px;padding:24px;margin-bottom:24px;border-left:4px solid #1B3664}
.welcome h2{font-family:'Inter',sans-serif;font-size:20px;font-weight:700;color:#1B3664;margin-bottom:8px}
.welcome p{font-size:15px;color:#2D2D2D;line-height:1.6;margin-bottom:12px}
.welcome p:last-child{margin-bottom:0;font-size:13px;color:#666;margin-top:16px}
.public-mode-notice{background:#f8f8f8;border:1px solid #DDDDDD;border-radius:8px;padding:12px 16px;font-size:12px;color:#666;margin-top:12px}
.progress-bar{background:#DDDDDD;height:4px;border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{background:#1B3664;height:100%;transition:width .3s}
.screen{display:none}
.screen.active{display:block}
.landing-cta{background:#1B3664;color:#fff;border:none;padding:16px 32px;border-radius:10px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;width:100%;max-width:320px;margin:0 auto;display:block;transition:background .2s}
.landing-cta:hover{background:#0f2847}
.room-number{font-family:'Inter',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#666;margin-bottom:8px}
.room-title{font-family:'Inter',sans-serif;font-size:20px;font-weight:700;color:#1B3664;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.room-subtitle{font-size:13px;color:#666;margin-bottom:16px;font-style:italic}
.room-intro{background:#f8f8f8;border-left:4px solid #5684C4;padding:12px 16px;border-radius:4px;margin-bottom:16px;font-size:13px;line-height:1.5;color:#2D2D2D}
.legend{background:#f8f8f8;border:1px solid #DDDDDD;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#666;line-height:1.5}
.legend-item{margin-bottom:6px;display:flex;align-items:center;gap:8px}
.legend-item:last-child{margin-bottom:0}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.question-card{background:#fff;border:1px solid #DDDDDD;border-radius:10px;padding:16px;margin-bottom:12px}
.question-text{font-size:15px;color:#2D2D2D;margin-bottom:12px;line-height:1.5}
.rating-group{display:flex;gap:4px;justify-content:space-between;margin-bottom:8px}
.rating-btn{flex:1;height:40px;border:1px solid #DDDDDD;border-radius:8px;background:#fff;font-size:13px;font-weight:700;color:#2D2D2D;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif}
.rating-btn:hover{border-color:#1B3664;background:#f8f8f8}
.rating-btn.selected{background:#1B3664;color:#fff;border-color:#1B3664}
.scale-anchor{font-size:11px;color:#999;text-align:center;margin-top:6px}
.nav-buttons{display:flex;gap:8px;justify-content:space-between;padding-top:16px;border-top:1px solid #DDDDDD;margin-top:20px}
.btn-secondary{background:#f8f8f8;color:#1B3664;border:1px solid #DDDDDD;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.btn-secondary:hover{background:#eee}
.btn-secondary:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#1B3664;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.btn-primary:hover{background:#0f2847}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.summary-card{background:#fff;border:1px solid #DDDDDD;border-radius:10px;padding:16px;margin-bottom:12px}
.summary-question{font-size:13px;color:#666;margin-bottom:6px}
.summary-rating{display:inline-block;background:#1B3664;color:#fff;padding:4px 12px;border-radius:6px;font-weight:700;font-size:13px;margin-right:8px}
.summary-edit{color:#5684C4;cursor:pointer;font-size:12px;font-weight:600;margin-left:8px}
.result-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #DDDDDD}
.overall-result{background:#f8f8f8;border-left:6px solid #1B3664;padding:16px;border-radius:8px;margin-bottom:16px}
.stage-name{font-family:'Inter',sans-serif;font-size:20px;font-weight:700;color:#1B3664;margin-bottom:8px}
.score-display{font-family:'Inter',sans-serif;font-size:48px;font-weight:700;color:#1B3664;line-height:1;margin-bottom:8px}
.score-display span{font-size:16px;color:#999;font-weight:500}
.stage-desc{font-size:13px;line-height:1.6;color:#2D2D2D}
.room-score-card{background:#fff;border:1px solid #DDDDDD;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.room-score-label{font-size:13px;font-weight:600;color:#2D2D2D}
.room-score-value{font-family:'Inter',sans-serif;font-size:18px;font-weight:700;color:#1B3664}
.lowest-room{background:#fff3cd;border:1px solid #ffd700;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#2D2D2D;line-height:1.5}
.lowest-room strong{color:#1B3664}
.trend{font-size:12px;color:#666;margin-top:2px}
.cta-text{font-size:13px;color:#666;text-align:center;margin-top:16px}
.print-btn{background:#1B3664;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:16px;width:100%;display:block}
.print-btn:hover{background:#0f2847}
.footer{text-align:center;padding:20px;font-size:11px;color:#999;border-top:1px solid #DDDDDD;margin-top:20px}
.loading{text-align:center;padding:40px;color:#999;font-size:14px}
.error-card{background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:20px;text-align:center;color:#dc2626;font-size:14px}
.print-only{display:none}
@media print{
  body{background:#fff;color-adjust:exact;-webkit-print-color-adjust:exact}
  .header,.footer,.nav-buttons,.print-btn,.no-print{display:none}
  .container{max-width:100%;padding:0;margin:0}
  .result-card,.room-score-card,.overall-result{break-inside:avoid;page-break-inside:avoid}
  .print-only{display:block}
  a{color:inherit;text-decoration:none}
}
</style>
</head>
<body>
<div class="header">
  <div class="sub">Coach4U · ThriveHQ</div>
  <h1>Brain Pulse</h1>
</div>
<div class="container" id="app"><div class="loading">Loading...</div></div>
<div class="footer">Coach4U · Strengths-Based Coaching & Counselling · www.coach4u.com.au</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.onerror=function(m){document.getElementById('app').innerHTML='<div class="error-card">Error: '+m+'</div>';};
var CONF={url:'https://uoixetfvboevjxlkfyqy.supabase.co',key:'sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ',table:'brain_pulse_submissions',stages:[{name:'Overwhelmed',min:20,max:60,emoji:'🔴',color:'#dc2626'},{name:'Unsteady',min:61,max:100,emoji:'🟧',color:'#ea8a3c'},{name:'Grounded',min:101,max:140,emoji:'🟨',color:'#d4a017'},{name:'Steady',min:141,max:170,emoji:'🟩',color:'#16a34a'},{name:'Anchored',min:171,max:200,emoji:'🔵',color:'#5684C4'}],stageDesc:{Overwhelmed:'Your nervous system is flooded. The rooms need tending, and right now even starting feels hard. This is not failure. This is a signal that capacity is the first room to attend to.',Unsteady:'Awareness is growing. Some rooms are starting to hold, but consistency is fragile. One rough day can still knock things over. The work now is small, repeated tending, not big changes.',Grounded:'Your feet are on the floor. Structure is building, and focus is more accessible. You can feel which rooms are working and which need attention. This is the zone where real progress happens.',Steady:'The rooms are working. Most demands feel manageable, and you have reserves to draw on. Capacity holds even under pressure most of the time. You are close to anchored.',Anchored:'All four anchors are holding. You feel regulated, resourced, clear, and aimed. You are moving toward what matters, with structure that supports you. This is earned ground.'},rooms:[{id:'capacity',emoji:'🪟',label:'Capacity',items:['Over the past week, I felt calm in my body most of the time.','Over the past week, I noticed stress building and took action to keep myself calm.','Over the past week, I bounced back quickly when upset rather than staying reactive.','Over the past week, I had enough energy to respond well to my day.','Over the past week, I used a regulation tool (like breathing, movement, or connection) when I needed to calm down.']},{id:'wellbeing',emoji:'🌱',label:'Wellbeing',items:['Over the past week, what I did felt meaningful and connected to what matters to me.','Over the past week, I felt supported and connected to the people in my life.','Over the past week, I felt secure and in control of my finances.','Over the past week, I cared for my body and felt well in it.','Over the past week, I felt I belonged to and contributed to a community that matters to me.']},{id:'strengths',emoji:'🌟',label:'Strengths',subtitle:'(and how you relate to yourself)',intro:'This room measures the inner conversation you had with yourself this week — how you trusted your decisions, reframed the moments, accepted who you are, and spoke to yourself throughout the day.',items:['Over the past week, I was confident in my decisions without second-guessing myself.','Over the past week, I focused on what I was doing right rather than what I was doing wrong.','Over the past week, I accepted who I am and how I am built rather than fighting it.','Over the past week, I spoke to myself with kindness rather than criticism.','Over the past week, I reminded myself I was doing okay.']},{id:'ex',emoji:'🏗',label:'Execution',intro:'This room measures how you managed the everyday brain struggles of ADHD this week — starting, finishing, pausing, prioritising, and remembering.',items:['Over the past week, I started tasks that needed to be done, not just the ones that interested me.','Over the past week, I stayed with tasks long enough to finish them.','Over the past week, I caught myself before reacting in ways I would later regret.','Over the past week, I did the important things before the loud ones.','Over the past week, I remembered to do the things I meant to do.']}],legend:[{range:'1–2',label:'Not at all',emoji:'🔴'},{range:'3–4',label:'A little',emoji:'🟧'},{range:'5–6',label:'Somewhat',emoji:'🟨'},{range:'7–8',label:'Mostly',emoji:'🟩'},{range:'9–10',label:'All the time',emoji:'🔵'}]};
var SUPA,contact=null,isPublic=false,answers={},history=[],screen='landing',room=0,viewId=null;
function key(){return 'bp_'+(contact?contact.id:'pub');}
function save(){localStorage.setItem(key(),JSON.stringify(answers));}
function load(){var s=localStorage.getItem(key());if(s)try{answers=JSON.parse(s);}catch(e){}}
function clear(){localStorage.removeItem(key());}
function render(){if(viewId)return renderResult();if(screen==='landing')return renderLand();if(screen==='room')return renderRoom();if(screen==='summary')return renderSummary();if(screen==='results')return renderResults();}
function renderLand(){var h='<div class="welcome"><h2>Welcome, '+(contact&&contact.first_name?contact.first_name:'there')+'</h2><p>Your Brain Pulse check-in. Answer honestly — there are no right or wrong answers.</p></div>';if(!isPublic&&history.length>0)h+='<div style="background:#f8f8f8;border:1px solid #DDDDDD;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:12px;"><div style="font-weight:600;color:#1B3664;margin-bottom:6px;">Your History</div><div style="font-size:11px;color:#666;">'+history.length+' check-in'+(history.length!==1?'s':'')+'</div></div>';h+='<button class="landing-cta" onclick="screen=\'room\';room=0;render()">Start my weekly check-in</button>';if(!isPublic&&history.length>0)h+='<button class="btn-secondary" style="margin-top:12px;width:100%;" onclick="screen=\'history\';render()">View past results</button>';if(isPublic)h+='<div class="public-mode-notice">Your results are private and are not stored.</div>';document.getElementById('app').innerHTML=h;}
function renderRoom(){var r=CONF.rooms[room],p=((room+1)/CONF.rooms.length)*100,h='<div class="progress-bar"><div class="progress-fill" style="width:'+p+'%"></div></div><div class="room-number">Room '+(room+1)+' of '+CONF.rooms.length+'</div><div class="room-title">'+r.emoji+' '+r.label+(r.subtitle?'<span style="font-size:13px;font-weight:400;color:#666;margin-left:auto;">'+r.subtitle+'</span>':'')+'</div>';if(r.intro)h+='<div class="room-intro">'+r.intro+'</div>';if(room===0)h+='<div class="legend"><div style="font-weight:600;color:#1B3664;margin-bottom:8px;">How to rate each item</div>'+CONF.legend.map(l=>'<div class="legend-item"><span class="legend-dot" style="background:'+l.emoji+'"></span><strong>'+l.range+'</strong> '+l.label+'</div>').join('')+'</div>';r.items.forEach(function(t,i){var q=r.id+'_'+(i+1),v=answers[q]||0;h+='<div class="question-card"><div class="question-text">'+t+'</div><div class="rating-group">';for(var j=1;j<=10;j++)h+='<button type="button" class="rating-btn '+(v===j?'selected':'')+'" onclick="answers[\''+q+'\']='+j+';save();render()" aria-label="Rate '+t+' as '+j+' out of 10">'+j+'</button>';h+='</div><div class="scale-anchor">1 = Not at all | 10 = All the time</div></div>';});var aN=Object.keys(answers).filter(k=>k.startsWith(r.id)).length===r.items.length;h+='<div class="nav-buttons"><button class="btn-secondary" onclick="room--;save();render()" '+(room===0?'disabled':'')+'>Back</button><button class="btn-primary" onclick="room++;save();if(room>='+CONF.rooms.length+'){screen=\'summary\';render();}else render();" '+(!aN?'disabled':'')+'>Next</button></div>';document.getElementById('app').innerHTML=h;}
function renderSummary(){var h='<h2 style="font-family:Inter,sans-serif;font-size:18px;font-weight:700;color:#1B3664;margin-bottom:16px;">Review your answers</h2>';CONF.rooms.forEach(function(r){h+='<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #DDDDDD;"><div style="font-weight:600;color:#1B3664;margin-bottom:8px;">'+r.emoji+' '+r.label+'</div>';r.items.forEach(function(t,i){var q=r.id+'_'+(i+1),v=answers[q]||0;h+='<div class="summary-card"><div class="summary-question">'+t+'</div><div><span class="summary-rating">'+v+'</span><span class="summary-edit" onclick="screen=\'room\';room='+CONF.rooms.indexOf(r)+';render()">Edit</span></div></div>';});h+='</div>';});h+='<div class="nav-buttons"><button class="btn-secondary" onclick="screen=\'room\';room=0;render()">Back</button><button class="btn-primary" onclick="submit()">Submit</button></div>';document.getElementById('app').innerHTML=h;}
function calc(){var sc={capacity:0,wellbeing:0,strengths:0,ex:0};CONF.rooms.forEach(function(r){var s=0;r.items.forEach(function(_,i){s+=answers[r.id+'_'+(i+1)]||0;});sc[r.id]=s;});var tot=sc.capacity+sc.wellbeing+sc.strengths+sc.ex,st='Overwhelmed';for(var i=0;i<CONF.stages.length;i++)if(tot>=CONF.stages[i].min&&tot<=CONF.stages[i].max){st=CONF.stages[i].name;break;}var low=null,lv=999;for(var k in sc)if(sc[k]<lv){lv=sc[k];low=k;}return {sc:sc,tot:tot,st:st,low:low};}
async function submit(){var btn=document.querySelector('.btn-primary');if(btn){btn.disabled=true;btn.textContent='Submitting...';}var c=calc();if(isPublic){viewId={id:'local-'+Date.now(),created_at:new Date().toISOString(),capacity_total:c.sc.capacity,wellbeing_total:c.sc.wellbeing,strengths_total:c.sc.strengths,ef_total:c.sc.ex,grand_total:c.tot,stage:c.st,lowest_room:c.low};clear();answers={};screen='results';render();return;}var row={contact_id:contact.id,capacity_1:answers.capacity_1||0,capacity_2:answers.capacity_2||0,capacity_3:answers.capacity_3||0,capacity_4:answers.capacity_4||0,capacity_5:answers.capacity_5||0,wellbeing_purpose:answers.wellbeing_1||0,wellbeing_social:answers.wellbeing_2||0,wellbeing_financial:answers.wellbeing_3||0,wellbeing_physical:answers.wellbeing_4||0,wellbeing_community:answers.wellbeing_5||0,strengths_1:answers.strengths_1||0,strengths_2:answers.strengths_2||0,strengths_3:answers.strengths_3||0,strengths_4:answers.strengths_4||0,strengths_5:answers.strengths_5||0,ef_initiation:answers.ex_1||0,ef_sustained:answers.ex_2||0,ef_inhibition:answers.ex_3||0,ef_planning:answers.ex_4||0,ef_memory:answers.ex_5||0};var res=await SUPA.from(CONF.table).insert(row).select();if(res.error){if(btn){btn.disabled=false;btn.textContent='Error — try again';}console.error(res.error);return;}clear();answers={};history.unshift(res.data[0]);viewId=res.data[0].id;screen='results';render();}
function renderResults(){var r=viewId;var st=CONF.stages.find(s=>s.name===r.stage||(r.grand_total>=s.min&&r.grand_total<=s.max));var h='<div class="overall-result"><div class="stage-name">'+(st?st.emoji+' '+st.name:r.stage||'—')+'</div><div class="score-display">'+(r.grand_total||r.total||0)+'<span>/200</span></div><div class="stage-desc">'+CONF.stageDesc[st?st.name:r.stage]+'</div></div><div style="font-family:Inter,sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#666;font-weight:600;margin-bottom:10px;">Your rooms</div>';var rms=[{l:'🪟 Capacity',v:r.capacity_total||0},{l:'🌱 Wellbeing',v:r.wellbeing_total||0},{l:'🌟 Strengths',v:r.strengths_total||0},{l:'🏗 Execution',v:r.ef_total||0}];rms.forEach(function(x){h+='<div class="room-score-card"><div class="room-score-label">'+x.l+'</div><div class="room-score-value">'+x.v+'<span style="font-size:12px;color:#999;font-weight:400;">/50</span></div></div>';});var lbl={capacity:'🪟 Capacity',wellbeing:'🌱 Wellbeing',strengths:'🌟 Strengths',ef:'🏗 Execution'};if(r.lowest_room)h+='<div class="lowest-room">Your <strong>'+lbl[r.lowest_room]+'</strong> is the room asking for attention this week.</div>';h+='<div class="cta-text">Come back next week for another check-in.</div><button class="print-btn" onclick="window.print()">Print results</button>';if(!isPublic)h+='<button class="btn-secondary" style="margin-top:8px;width:100%;" onclick="viewId=null;screen=\'landing\';render()">Back to home</button>';document.getElementById('app').innerHTML=h;}
function renderResult(){var r=viewId;renderResults();}
async function init(){var p=new URLSearchParams(window.location.search),c=p.get('c');isPublic=!c;if(isPublic){contact={first_name:'there'};load();render();return;}try{document.getElementById('app').innerHTML='<div class="loading">Connecting...</div>';SUPA=window.supabase.createClient(CONF.url,CONF.key);var res=await SUPA.from('contacts').select('id,first_name,last_name').eq('id',c).single();if(res.error){document.getElementById('app').innerHTML='<div class="error-card">Error: '+res.error.message+'</div>';return;}contact=res.data;var hres=await SUPA.from(CONF.table).select('*').eq('contact_id',c).order('created_at',{ascending:false});if(!hres.error)history=hres.data||[];load();render();}catch(e){console.error(e);document.getElementById('app').innerHTML='<div class="error-card">Error: '+(e.message||e)+'</div>';}}
init();
</script>
</body>
</html>
