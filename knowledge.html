<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coach4U Agent Knowledge</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b;margin:0;padding:40px 20px;line-height:1.6;}
  .wrap{max-width:860px;margin:0 auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:40px 48px;}
  h1{font-size:26px;color:#1e3a5f;margin:0 0 4px;}
  .subtitle{color:#64748b;font-size:13px;margin-bottom:8px;}
  .meta{display:flex;gap:16px;flex-wrap:wrap;padding:12px 0;border-top:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;margin:16px 0 28px;font-size:13px;color:#475569;}
  .meta span strong{color:#94a3b8;font-weight:600;}
  h2{font-size:20px;color:#1e3a5f;margin:36px 0 8px;}
  h3{font-size:17px;color:#003366;margin:28px 0 6px;padding-top:20px;border-top:2px solid #e2e8f0;}
  h3:first-of-type{border-top:none;padding-top:0;}
  .trigger{display:inline-block;background:#f1f5f9;color:#475569;font-family:monospace;font-size:12px;padding:2px 8px;border-radius:99px;margin-left:8px;}
  .stage-meta{font-size:13px;color:#64748b;margin:6px 0 14px;}
  .stage-meta strong{color:#94a3b8;font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.5px;}
  .message{background:#f8fafc;border:1px solid #e2e8f0;border-left:3px solid #0f766e;border-radius:8px;padding:16px 20px;margin:10px 0;}
  .message-head{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:12px;font-weight:600;}
  .tag{padding:2px 8px;border-radius:99px;}
  .tag-cath{background:#f3e8ff;color:#7e22ce;}
  .tag-lou{background:#ccfbf1;color:#0f766e;}
  .tag-plat{background:#f1f5f9;color:#64748b;}
  .subject{font-weight:600;color:#1e293b;margin-bottom:6px;font-size:14px;}
  .subject::before{content:'Subject: ';color:#94a3b8;font-weight:400;font-size:12px;}
  pre.body{white-space:pre-wrap;font-family:inherit;font-size:14px;color:#1e293b;margin:0;line-height:1.6;}
  .prompt{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px 20px;margin:16px 0;}
  .loading,.error{padding:60px 20px;text-align:center;color:#94a3b8;}
  .error{color:#dc2626;}
  .children{margin:24px 0;}
  .children a{display:inline-block;margin:4px 8px 4px 0;padding:6px 12px;background:#eff6ff;color:#003366;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;}
  .children a:hover{background:#dbeafe;}
  .footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:40px;padding-top:20px;border-top:1px solid #f1f5f9;}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading">Loading knowledge...</div>
</div>
<script>
const SUPABASE_URL='https://uoixetfvboevjxlkfyqy.supabase.co';
const SUPABASE_KEY='sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const PLATFORM_LABELS={text:'Text / SMS',whatsapp:'WhatsApp',email:'Email',teams:'Teams'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function load(){
  const params=new URLSearchParams(location.search);
  const agentId=params.get('agent');
  const wrap=document.getElementById('wrap');
  if(!agentId){
    const {data:agents}=await sb.from('agents').select('id,name,description,type,parent_agent_id').eq('status','active').order('name');
    let html='<h1>Coach4U Agent Knowledge</h1><p class="subtitle">Select an agent below.</p><div class="children">';
    (agents||[]).forEach(a=>{html+=`<a href="?agent=${a.id}">${esc(a.name)}</a>`;});
    html+='</div>';
    wrap.innerHTML=html;
    return;
  }
  const [ag,stages,tmpls,children]=await Promise.all([
    sb.from('agents').select('*').eq('id',agentId).single(),
    sb.from('agent_stages').select('*').eq('agent_id',agentId).order('stage_order',{ascending:true}),
    sb.from('agent_templates').select('*').order('created_at',{ascending:true}),
    sb.from('agents').select('id,name').eq('parent_agent_id',agentId).order('name')
  ]);
  if(ag.error||!ag.data){wrap.innerHTML='<div class="error">Agent not found.</div>';return;}
  const a=ag.data;
  document.title=a.name+' — Knowledge';
  const myStages=stages.data||[];
  const myStageIds=myStages.map(s=>s.id);
  const myTemplates=(tmpls.data||[]).filter(t=>myStageIds.includes(t.stage_id));
  const myChildren=(children.data||[]);
  let parentName='';
  if(a.parent_agent_id){
    const {data:p}=await sb.from('agents').select('id,name').eq('id',a.parent_agent_id).single();
    if(p) parentName=p.name;
  }
  let html=`<h1>${esc(a.name)}</h1>`;
  if(a.description) html+=`<p class="subtitle">${esc(a.description)}</p>`;
  html+='<div class="meta">';
  if(a.type) html+=`<span><strong>TYPE</strong> ${esc(a.type)}</span>`;
  if(a.status) html+=`<span><strong>STATUS</strong> ${esc(a.status)}</span>`;
  if(parentName) html+=`<span><strong>PARENT</strong> ${esc(parentName)}</span>`;
  if(a.owner) html+=`<span><strong>OWNER</strong> ${esc(a.owner)}</span>`;
  if(a.used_by) html+=`<span><strong>USED BY</strong> ${esc(a.used_by)}</span>`;
  if(a.used_for) html+=`<span><strong>USED FOR</strong> ${esc(a.used_for)}</span>`;
  html+='</div>';

  if(a.purpose){html+=`<h2>Purpose</h2><p>${esc(a.purpose)}</p>`;}

  if(myChildren.length){
    html+='<h2>Child Agents</h2><div class="children">';
    myChildren.forEach(c=>{html+=`<a href="?agent=${c.id}">${esc(c.name)}</a>`;});
    html+='</div>';
  }

  if(myStages.length){
    html+='<h2>Stages &amp; Messages</h2>';
    myStages.forEach(s=>{
      html+=`<h3>${esc(s.name)}${s.trigger_phrase?`<span class="trigger">${esc(s.trigger_phrase)}</span>`:''}</h3>`;
      if(s.purpose) html+=`<div class="stage-meta"><strong>Purpose:</strong> ${esc(s.purpose)}</div>`;
      if(s.default_sender) html+=`<div class="stage-meta"><strong>Default Sender:</strong> ${esc(s.default_sender)}</div>`;
      if(s.platform_rule) html+=`<div class="stage-meta"><strong>Platform Rule:</strong> ${esc(s.platform_rule)}</div>`;
      const ings=myTemplates.filter(t=>t.stage_id===s.id);
      if(!ings.length){
        html+='<div class="stage-meta" style="color:#94a3b8;font-style:italic;">No messages yet for this stage.</div>';
      } else {
        ings.forEach(t=>{
          const personaClass=t.persona==='Cath'?'tag-cath':'tag-lou';
          html+=`<div class="message">
            <div class="message-head">
              <span class="tag ${personaClass}">${esc(t.persona)}</span>
              <span class="tag tag-plat">${esc(PLATFORM_LABELS[t.platform]||t.platform)}</span>
            </div>
            ${t.subject?`<div class="subject">${esc(t.subject)}</div>`:''}
            <pre class="body">${esc(t.body)}</pre>
          </div>`;
        });
      }
    });
  }

  html+=`<div class="footer">Coach4U Agent Knowledge — live from Supabase. Last loaded ${new Date().toLocaleString('en-AU')}.</div>`;
  wrap.innerHTML=html;
}
load().catch(e=>{document.getElementById('wrap').innerHTML='<div class="error">Error loading: '+(e.message||e)+'</div>';});
</script>
</body>
</html>
