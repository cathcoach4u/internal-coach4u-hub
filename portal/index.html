<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coach4U – SAFEty Pulse</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
.header{background:#003366;color:#fff;padding:20px 24px;text-align:center;border-bottom:4px solid #c9a646}
.header h1{font-size:22px;font-weight:700;margin-bottom:2px}
.header .sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8aaac8}
.container{max-width:640px;margin:0 auto;padding:20px 16px 40px}
.welcome{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px;border-left:4px solid #003366}
.welcome h2{font-size:18px;color:#003366;margin-bottom:4px}
.welcome p{font-size:13px;color:#64748b}
.error-card{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:24px;text-align:center;color:#dc2626;font-size:14px}
.tab-bar{display:flex;gap:0;margin-bottom:20px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:#64748b;transition:all .2s}
.tab.active{background:#003366;color:#fff}
.tab:not(.active):hover{background:#f8fafc}

/* Intro card */
.intro-card{background:#fff;border-radius:12px;padding:22px 24px;margin-bottom:20px;border:1px solid #e2e8f0;border-left:4px solid #c9a646}
.intro-card .intro-lead{font-size:14px;line-height:1.65;color:#1e3a5f;font-weight:600;margin-bottom:16px}
.intro-card .intro-body{font-size:13px;line-height:1.7;color:#475569;margin-bottom:16px}
.intro-card .intro-focus{background:#f0f4f8;border-radius:8px;padding:14px 16px;margin-bottom:16px;text-align:center}
.intro-card .intro-focus-text{font-size:13px;line-height:1.6;color:#003366}
.intro-card .intro-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#003366;font-weight:700;margin-bottom:8px}
.intro-card .intro-how{background:#fafbfc;border:1px solid #eef2f6;border-radius:8px;padding:14px 18px}
.intro-card .intro-how ul{margin:0;padding-left:20px}
.intro-card .intro-how li{font-size:12.5px;line-height:1.7;color:#475569;margin-bottom:4px}
.intro-card .intro-how li:last-child{margin-bottom:0}

/* Form */
.pillar-section{background:#fff;border-radius:12px;margin-bottom:16px;overflow:hidden;border:1px solid #e2e8f0}
.pillar-header{padding:14px 20px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}
.pillar-header .letter{font-size:20px;font-weight:800;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.pillar-header .desc{font-size:11px;font-weight:400;color:#64748b;font-style:italic}
.question{padding:14px 20px;border-top:1px solid #f1f5f9}
.q-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.question .q-text{font-size:13px;line-height:1.5;color:#334155}
.question .q-num{font-size:11px;color:#94a3b8;font-weight:600;flex-shrink:0}
.rating-group{display:flex;gap:4px;justify-content:space-between}
.rating-btn{flex:1;height:36px;max-width:36px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.rating-btn:hover{border-color:#003366;color:#003366}
.rating-btn.selected{background:#003366;color:#fff;border-color:#003366}
.submit-bar{text-align:center;padding:8px 0 20px}
.submit-btn{background:#003366;color:#fff;border:none;padding:14px 48px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;width:100%;max-width:320px}
.submit-btn:hover{background:#1a4d80}
.submit-btn:disabled{background:#94a3b8;cursor:not-allowed}

/* Results */
.result-card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid #e2e8f0}
.overall-result{border-left:6px solid #003366;background:#f8fafc}
.overall-result .band-name{font-size:24px;font-weight:800}
.overall-result .score{font-size:48px;font-weight:800;line-height:1}
.overall-result .score span{font-size:18px;color:#94a3b8;font-weight:500}
.band-track{display:flex;gap:3px;margin-bottom:20px}
.band-step{flex:1;text-align:center;border-radius:6px;padding:8px 2px;font-size:10px;font-weight:700;line-height:1.3;color:#94a3b8;background:#ededed}
.band-step.active{color:#fff}
.band-step small{font-weight:400;display:block;margin-top:2px}
.pillar-result{border-radius:14px;overflow:hidden;border:1px solid #e2e8f0;margin-bottom:14px;display:flex}
.pillar-score-side{width:28%;min-width:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 8px;flex-shrink:0}
.pillar-score-side .big-letter{font-size:52px;font-weight:800;line-height:1;margin-bottom:8px}
.pillar-score-side .big-num{font-size:34px;font-weight:800;line-height:1}
.pillar-score-side .of{font-size:12px;color:#94a3b8;margin-top:2px}
.pillar-content{flex:1;display:flex;flex-direction:column;background:#fff}
.pillar-header-row{padding:14px 18px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pillar-header-row h3{font-size:16px;font-weight:700;color:#0b3a6e;margin:0}
.pillar-header-row .tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#f3f4f6;color:#555;border:1px solid #d1d5db;border-radius:4px;padding:2px 8px}
.pillar-header-row .desc{width:100%;font-size:11px;color:#7c7c7c;font-style:italic;margin-top:2px}
.pillar-body{padding:8px 18px 14px;font-size:13px;line-height:1.7;color:#4d4d4d}
.coaching-focus{margin-top:12px;padding-top:12px;border-top:1px solid #eee}
.coaching-focus .cf-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:8px}
.coaching-focus ul{margin:0;padding-left:20px}
.coaching-focus li{font-size:12.5px;line-height:1.6;color:#4d4d4d;margin-bottom:6px}
.history-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.history-item:hover{background:#f8fafc}
.history-item .date{font-size:12px;color:#64748b}
.history-item .band{font-weight:700;font-size:14px}
.history-item .scores{font-size:12px;color:#94a3b8;margin-top:4px}
.no-results{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px}
.footer{text-align:center;padding:20px;font-size:11px;color:#94a3b8}
.back-btn{display:inline-block;margin-bottom:16px;font-size:13px;color:#003366;cursor:pointer;font-weight:600}
.back-btn:hover{text-decoration:underline}
.print-only{display:none}
.pulse-quad{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:640px){.pulse-quad{grid-template-columns:1fr}}
@page{size:A4;margin:12mm}
@media print{
  body{background:#fff !important;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  .header,.footer,.tab-bar,.welcome,.no-print,.back-btn,.intro-card{display:none !important}
  .container{max-width:100% !important;padding:0 !important;margin:0 !important}
  .result-card,.pillar-result,.report-page,.pulse-card{break-inside:avoid;page-break-inside:avoid}
  .band-track{display:flex !important;gap:3px !important}
  .band-step{border:1px solid #cbd5e1 !important;padding:8px 2px !important}
  .band-step.active{border-color:transparent !important;color:#fff !important}
  .print-only{display:block !important}
  .pulse-quad{grid-template-columns:1fr 1fr !important;gap:8px !important}
  .report-page-break{page-break-before:always;break-before:page}
  a{color:inherit;text-decoration:none}
}
.loading{text-align:center;padding:40px;color:#64748b;font-size:14px}
</style>
</head>
<body>
<div class="header">
  <div class="sub">Coach4U &middot; Capacity Check-In</div>
  <h1>The SAFEty Pulse</h1>
</div>

<div class="container" id="app">
  <div class="loading">Loading...</div>
</div>

<div class="footer">Coach4U &middot; Strengths-Based Coaching &amp; Counselling &middot; www.coach4u.com.au</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="document.getElementById('app').innerHTML='<div class=error-card>Failed to load. Please check your internet connection and refresh.</div>'"></script>
<script>
window.onerror=function(msg){document.getElementById('app').innerHTML='<div class="error-card">Error: '+msg+'</div>';};
var supabase;
try{supabase=window.supabase.createClient('https://uoixetfvboevjxlkfyqy.supabase.co','sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ');}catch(e){document.getElementById('app').innerHTML='<div class="error-card">Connection error: '+e.message+'</div>';}

const QUESTIONS={
  self_awareness:[
    {id:'s1',text:'I know what gives me energy and I keep doing what works for me.'},
    {id:'s2',text:'I notice what drains my energy and I limit those drains.'},
    {id:'s3',text:'When my tank is running low, I notice it and refill it.'},
    {id:'s4',text:'I understand the patterns that drain my energy and work around them.'},
    {id:'s5',text:'When something is not working for me, I adjust rather than repeating the same pattern.'}
  ],
  aim:[
    {id:'a1',text:'I know what matters most to me and I direct my energy toward it.'},
    {id:'a2',text:'Even when my energy is lower, I take small steps forward.'},
    {id:'a3',text:'When life takes me off track, I bring my focus back to what matters.'},
    {id:'a4',text:'I use strategies that help me stay focused and on track.'},
    {id:'a5',text:'I keep directing my time and energy toward my priorities.'}
  ],
  foundation:[
    {id:'f1',text:'I have routines that help keep my tank steady during the day.'},
    {id:'f2',text:'When my routines slip, I reset them.'},
    {id:'f3',text:'I use tools or systems that make life easier to manage.'},
    {id:'f4',text:'When life becomes busy or stressful, I simplify where I can.'},
    {id:'f5',text:'I have structures that help protect my energy.'}
  ],
  emotion:[
    {id:'e1',text:'I notice when my emotions are rising and pause before reacting.'},
    {id:'e2',text:'When I feel overwhelmed, I slow down and steady myself.'},
    {id:'e3',text:'After a strong emotional reaction, I settle and regain balance.'},
    {id:'e4',text:'When something upsetting happens, I regain perspective.'},
    {id:'e5',text:'In difficult moments, I choose responses that support my long term wellbeing.'}
  ]
};

const PILLAR_META={
  self_awareness:{letter:'S',label:'Self Awareness',desc:'Understanding your patterns and protecting your energy',color:'#5c8a7a',lightBg:'#eff4f1',borderColor:'#bfd3c9',headerBg:'#d7e2dc'},
  aim:{letter:'A',label:'Aim',desc:'Moving toward what matters and staying on track',color:'#c9824b',lightBg:'#fbf3ea',borderColor:'#ead2b4',headerBg:'#f0dfc6'},
  foundation:{letter:'F',label:'Foundation',desc:'Routines and structures that keep life steady',color:'#4f6269',lightBg:'#eef1f2',borderColor:'#bcc6ca',headerBg:'#d0d7da'},
  emotion:{letter:'E',label:'Emotion',desc:'Recognising, pausing, and responding rather than reacting',color:'#8c6e9f',lightBg:'#f3eef7',borderColor:'#cfc1db',headerBg:'#ddd2e5'}
};

const BANDS=[
  {name:'Overwhelmed',min:20,max:55,bg:'#003366'},
  {name:'Stretched',min:56,max:91,bg:'#1a4d80'},
  {name:'Stabilising',min:92,max:127,bg:'#336699'},
  {name:'In Control',min:128,max:163,bg:'#4d80b3'},
  {name:'In Flow',min:164,max:200,bg:'#80aacc'}
];

const BAND_DESC={
  'Overwhelmed':'Your reserves are running very low right now. Life is demanding more than your current capacity can hold. This is important information, not a judgement. Small steps and self-protection matter most here.',
  'Stretched':'You are managing, but it is costing you. Your reserves are low and consistency is hard to maintain. Awareness is growing, which is the first real shift.',
  'Stabilising':'You are finding your footing. Some things are working and your capacity is building. This is the stage where patterns become visible and small consistent actions create real momentum.',
  'In Control':'Your supports are working and you are handling most of what life asks of you with growing steadiness. The focus now is consolidating what is already working rather than adding more.',
  'In Flow':'You are operating with intention and self-trust. Your capacity is strong and you are directing your energy toward what matters most. Protect what is working and keep noticing what sustains this.'
};

const PILLAR_DESC={
  self_awareness:'You are building a clearer picture of what gives you energy, what drains it, and what patterns are at play. That awareness is the foundation for every other change \u2014 you can only work with what you can see.',
  aim:'This score reflects how consistently your attention and energy are moving toward what matters most. Direction improves when priorities are visible and the next step is clear and doable.',
  foundation:'Foundation reflects the routines, structures and supports that help life feel stable. When this is strong, you recover faster when things wobble and you have more reserve for what matters.',
  emotion:'Emotion reflects your capacity to notice rising emotional signals, pause before reacting, and return to balance after difficult moments. Recovery speed is the skill that grows over time.'
};

const COACHING_FOCUS={
  self_awareness:[
    'Name one pattern this week that cost you energy unnecessarily.',
    'Track one thing you did that actively restored your reserves.',
    'Notice the gap between what you know and what you actually do \u2014 without judgement.'
  ],
  aim:[
    'Keep your one most important priority visible this week.',
    'Use small steps to reduce friction at the start of tasks.',
    'When you drift, return to what matters without self-judgement.'
  ],
  foundation:[
    'Protect the one routine that most stabilises your week.',
    'When routines slip, reset one at a time rather than all at once.',
    'Notice early signs that your structure is starting to loosen.'
  ],
  emotion:[
    'Notice rising emotion one step earlier than you normally would.',
    'Use one settling strategy before reactivity builds, not only after.',
    'Practise recovery after hard moments rather than aiming for perfection.'
  ]
};

let contact=null;
let isPublicMode=false;
let answers={};
let results=[];
let currentView='form';
let viewingResult=null;

async function init(){
  const app=document.getElementById('app');
  const params=new URLSearchParams(window.location.search);
  const cid=params.get('c');

  if(!cid){
    isPublicMode=true;
    contact={first_name:'there'};
    render();
    return;
  }

  try{
  app.innerHTML='<div class="loading">Connecting...</div>';
  const {data,error}=await supabase.from('contacts').select('id,first_name,last_name').eq('id',cid).single();
  if(error){
    app.innerHTML='<div class="error-card">Error loading contact: '+error.message+'<br><br><small>Code: '+error.code+'</small></div>';
    return;
  }
  if(!data){
    app.innerHTML='<div class="error-card">Client not found. Please check your link or contact your coach.</div>';
    return;
  }
  contact=data;
  app.innerHTML='<div class="loading">Loading results...</div>';
  const {data:res,error:resErr}=await supabase.from('pulse_results').select('*').eq('contact_id',cid).order('created_at',{ascending:false});
  if(!resErr) results=res||[];
  render();
  }catch(e){
    console.error(e);
    app.innerHTML='<div class="error-card">Error: '+(e.message||e)+'</div>';
  }
}

function render(){
  if(viewingResult) return renderResultDetail(viewingResult);
  const app=document.getElementById('app');
  if(isPublicMode){
    let html=`<div class="welcome"><h2>SAFEty Pulse</h2><p>A free capacity check-in based on the SAFE framework. Answer honestly \u2014 there are no right or wrong answers.</p>
      <p style="font-size:11px;color:#94a3b8;margin-top:8px;">Your results are private and are not stored. Print or screenshot your results before closing this page.</p></div>`;
    html+=renderForm();
    app.innerHTML=html;
    return;
  }
  let html=`<div class="welcome"><h2>Welcome, ${contact.first_name}</h2><p>Your SAFEty Pulse check-in. Answer honestly \u2014 there are no right or wrong answers.</p></div>`;
  html+=`<div class="tab-bar">
    <div class="tab ${currentView==='form'?'active':''}" onclick="switchTab('form')">Complete Check-In</div>
    <div class="tab ${currentView==='history'?'active':''}" onclick="switchTab('history')">Past Results (${results.length})</div>
  </div>`;
  if(currentView==='form') html+=renderForm();
  else html+=renderHistory();
  app.innerHTML=html;
}

function switchTab(tab){currentView=tab;render();}

function renderForm(){
  let html=`<div class="intro-card">
    <p class="intro-lead">This diagnostic tool helps you understand your current capacity and reserves \u2014 measuring energy management, executive functioning, emotional regulation and self direction.</p>
    <div class="intro-focus">
      <div class="intro-label">The Core Focus</div>
      <div class="intro-focus-text">Move from feeling <strong>Overwhelmed</strong> and <strong>Stretched</strong> &rarr; to <strong>Stabilising</strong>, <strong>In Control</strong> and <strong>In Flow</strong>.</div>
    </div>
    <p class="intro-body">Think of your energy like a bank account. Life makes constant withdrawals \u2014 stress, poor sleep, emotional load, decision fatigue, and everyday responsibilities. When the balance runs low, even simple tasks feel harder than they should. When you actively top up your reserves, you create more space to think clearly, manage your emotions, respond rather than react, and focus on what matters most. This check-in helps you see where your balance is sitting right now.</p>
    <div class="intro-how">
      <div class="intro-label">&#9999;&#65039; How to Complete the Check-In</div>
      <ul>
        <li>Rate how true each statement feels for you <strong>right now</strong>.</li>
        <li>Use the <strong>1\u201310 scale</strong> for each statement.</li>
        <li>Try not to overthink your answers. Your first response is usually the most accurate.</li>
        <li><strong>Lower scores</strong> suggest your reserves may be running low.</li>
        <li><strong>Higher scores</strong> suggest your capacity reserves are stronger.</li>
      </ul>
    </div>
  </div>`;
  html+='<form id="pulseForm" onsubmit="submitPulse(event)">';
  let qNum=1;
  for(const [key,meta] of Object.entries(PILLAR_META)){
    html+=`<div class="pillar-section">
      <div class="pillar-header" style="background:${meta.lightBg};border-bottom:1px solid ${meta.borderColor};">
        <div class="letter" style="background:${meta.color};">${meta.letter}</div>
        <div><div style="color:${meta.color};">${meta.label}</div><div class="desc">${meta.desc}</div></div>
      </div>`;
    QUESTIONS[key].forEach(q=>{
      html+=`<div class="question">
        <div class="q-row"><span class="q-num">Q${qNum}</span><span class="q-text">${q.text}</span></div>
        <div class="rating-group" id="rg_${q.id}">`;
      for(let i=1;i<=10;i++){
        const sel=answers[q.id]===i?'selected':'';
        html+=`<button type="button" class="rating-btn ${sel}" onclick="rate('${q.id}',${i})">${i}</button>`;
      }
      html+=`</div></div>`;
      qNum++;
    });
    html+=`</div>`;
  }
  const answered=Object.keys(answers).length;
  html+=`<div class="submit-bar"><button type="submit" class="submit-btn" ${answered<20?'disabled':''}>${answered<20?answered+'/20 answered':'Submit My Pulse'}</button></div></form>`;
  return html;
}

function rate(qid,val){
  answers[qid]=val;
  const grp=document.getElementById('rg_'+qid);
  if(grp){
    grp.querySelectorAll('.rating-btn').forEach((btn,i)=>{
      btn.classList.toggle('selected',i+1===val);
    });
  }
  const answered=Object.keys(answers).length;
  const btn=document.querySelector('.submit-btn');
  if(btn){
    btn.disabled=answered<20;
    btn.textContent=answered<20?answered+'/20 answered':'Submit My Pulse';
  }
}

function calcScores(){
  const pillars={};
  for(const [key,qs] of Object.entries(QUESTIONS)){
    pillars[key]=qs.reduce((sum,q)=>sum+(answers[q.id]||0),0);
  }
  const total=Object.values(pillars).reduce((a,b)=>a+b,0);
  let band='Overwhelmed';
  for(const b of BANDS){if(total>=b.min&&total<=b.max)band=b.name;}
  let lowest=null,lowestVal=999;
  for(const [k,v] of Object.entries(pillars)){if(v<lowestVal){lowestVal=v;lowest=k;}}
  return{pillars,total,band,lowest};
}

async function submitPulse(e){
  e.preventDefault();
  const btn=document.querySelector('.submit-btn');
  btn.disabled=true;
  btn.textContent='Submitting...';
  const scores=calcScores();

  if(isPublicMode){
    const localResult={
      id:'local-'+Date.now(),
      created_at:new Date().toISOString(),
      self_awareness:scores.pillars.self_awareness,
      aim:scores.pillars.aim,
      foundation:scores.pillars.foundation,
      emotion:scores.pillars.emotion,
      total:scores.total,
      band:scores.band,
      lowest_pillar:scores.lowest,
      answers:JSON.stringify(answers)
    };
    answers={};
    viewingResult=localResult;
    render();
    return;
  }

  const row={
    contact_id:contact.id,
    self_awareness:scores.pillars.self_awareness,
    aim:scores.pillars.aim,
    foundation:scores.pillars.foundation,
    emotion:scores.pillars.emotion,
    total:scores.total,
    band:scores.band,
    lowest_pillar:scores.lowest,
    answers:JSON.stringify(answers)
  };
  const {data,error}=await supabase.from('pulse_results').insert(row).select();
  if(error){
    btn.disabled=false;
    btn.textContent='Error \u2014 try again';
    console.error(error);
    return;
  }
  answers={};
  results.unshift(data[0]);
  viewingResult=data[0];
  render();
}

function renderHistory(){
  if(!results.length) return '<div class="no-results">No results yet. Complete your first check-in above.</div>';
  return results.map(r=>{
    const d=new Date(r.created_at);
    const dateStr=d.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
    const bandColor=BANDS.find(b=>b.name===r.band)?.bg||'#333';
    return `<div class="history-item" onclick="viewResult('${r.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <div style="flex:1;min-width:0;">
          <div><span class="band" style="color:${bandColor};">${r.band}</span> <span style="font-size:20px;font-weight:800;color:${bandColor};margin-left:8px;">${r.total}<span style="font-size:13px;color:#94a3b8;font-weight:400;">/200</span></span></div>
          <div class="date" style="margin-top:2px;">${dateStr}</div>
        </div>
        <button class="no-print" onclick="event.stopPropagation();printResult('${r.id}')" style="background:#003366;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;">&#128424; Print</button>
      </div>
      <div class="scores">S: ${r.self_awareness}/50 &middot; A: ${r.aim}/50 &middot; F: ${r.foundation}/50 &middot; E: ${r.emotion}/50</div>
    </div>`;
  }).join('');
}
function printResult(id){
  const r=results.find(x=>x.id===id);
  if(!r) return;
  viewingResult=r;
  render();
  setTimeout(()=>window.print(),100);
}

function viewResult(id){
  viewingResult=results.find(r=>r.id===id);
  render();
}

function pulseScoreColor(v){
  if(!v) return '#cbd5e1';
  if(v<=4) return '#dc2626';
  if(v<=6) return '#0891b2';
  return '#16a34a';
}
function renderResultDetail(r){
  const d=new Date(r.created_at);
  const dateStr=d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const bandColor=BANDS.find(b=>b.name===r.band)?.bg||'#333';
  const backLabel=isPublicMode?'Start again':'Back to results';
  const backAction=isPublicMode?'viewingResult=null;answers={};currentView="form";render();':'viewingResult=null;currentView="history";render();';
  let answers={};
  try{answers=r.answers?(typeof r.answers==='string'?JSON.parse(r.answers):r.answers):{};}catch(e){answers={};}
  const scores={self_awareness:r.self_awareness,aim:r.aim,foundation:r.foundation,emotion:r.emotion};
  const pillarKeys=['self_awareness','aim','foundation','emotion'];
  const clientName=(contact&&contact.first_name&&contact.first_name!=='there')?(contact.first_name+(contact.last_name?' '+contact.last_name:'')):'';

  let html=`<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap;">
    <div class="back-btn" style="margin:0;" onclick="${backAction}">&larr; ${backLabel}</div>
    <button onclick="window.print()" style="background:#003366;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">&#128424; Print results</button>
  </div>`;

  html+=`<div class="print-only" style="text-align:center;padding-bottom:10px;border-bottom:2px solid #003366;margin-bottom:14px;">
    <div style="font-size:14px;font-weight:700;color:#003366;letter-spacing:1px;">Coach4U &middot; SAFEty Pulse</div>
    <div style="font-size:10px;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-top:2px;">Capacity Check-In Report</div>
  </div>`;

  html+=`<div class="report-page">`;
  if(clientName){
    html+=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
      <div style="font-size:14px;font-weight:700;color:#1e3a5f;">${clientName}</div>
      <div style="font-size:12px;color:#64748b;">${dateStr}</div>
    </div>`;
  } else {
    html+=`<div style="text-align:center;font-size:12px;color:#64748b;margin-bottom:12px;">${dateStr}</div>`;
  }

  html+=`<div class="pulse-card" style="background:#f8fafc;border:1px solid #e2e8f0;border-left:6px solid ${bandColor};border-radius:12px;padding:16px 20px;margin-bottom:14px;">
    <div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:8px;">Overall Result</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
      <div style="font-size:22px;font-weight:800;color:${bandColor};">${r.band}</div>
      <div style="font-size:36px;font-weight:800;color:${bandColor};line-height:1;">${r.total}<span style="font-size:14px;color:#94a3b8;font-weight:500;">/200</span></div>
    </div>
    <div style="font-size:12px;line-height:1.55;color:#4a4a4a;">${BAND_DESC[r.band]||''}</div>
  </div>`;

  html+=`<div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:8px;text-align:center;">Capacity Journey</div>
    <div style="display:flex;gap:3px;margin-bottom:16px;">`;
  BANDS.forEach(b=>{
    const active=b.name===r.band;
    html+=`<div style="flex:1;text-align:center;border-radius:6px;padding:7px 2px;font-size:9px;font-weight:700;line-height:1.3;border:1px solid ${active?'transparent':'#cbd5e1'};${active?'background:'+b.bg+';color:#fff;':'background:#ededed;color:#8a8a8a;'}">${b.name}<br><span style="font-weight:400;">${b.min}\u2013${b.max}</span></div>`;
  });
  html+=`</div>`;

  html+=`<div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:10px;text-align:center;">Your SAFE Results &amp; Focus</div>
    <div class="pulse-quad">`;
  pillarKeys.forEach(key=>{
    const meta=PILLAR_META[key];
    const score=scores[key];
    const isLowest=r.lowest_pillar===key;
    const focusItems=COACHING_FOCUS[key]||[];
    html+=`<div class="pulse-card" style="border-radius:12px;border:1px solid ${meta.borderColor};background:#fff;overflow:hidden;display:flex;flex-direction:column;">
      <div style="background:${meta.headerBg};padding:10px 12px;display:flex;align-items:center;gap:10px;">
        <div style="width:34px;height:34px;border-radius:8px;background:${meta.color};color:#fff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${meta.letter}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:#0b3a6e;">${meta.label}${isLowest?' <span style="display:inline-block;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#fff;color:#555;border:1px solid #d1d5db;border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle;">Focus</span>':''}</div>
          <div style="font-size:10px;color:#7c7c7c;font-style:italic;margin-top:1px;line-height:1.3;">${meta.desc}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:24px;font-weight:800;color:${meta.color};line-height:1;">${score}</div>
          <div style="font-size:10px;color:#94a3b8;">/50</div>
        </div>
      </div>
      <div style="padding:10px 12px 6px;font-size:11.5px;line-height:1.55;color:#4d4d4d;">${PILLAR_DESC[key]}</div>
      <div style="padding:8px 12px 12px;border-top:1px dashed #eee;margin-top:auto;">
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:6px;">Coaching Focus</div>
        <ul style="margin:0;padding-left:16px;">
          ${focusItems.map(item=>'<li style="font-size:11px;line-height:1.5;color:#4d4d4d;margin-bottom:3px;">'+item+'</li>').join('')}
        </ul>
      </div>
    </div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="report-page report-page-break" style="margin-top:24px;">
    <div class="print-only" style="text-align:center;padding-bottom:10px;border-bottom:2px solid #003366;margin-bottom:14px;">
      <div style="font-size:14px;font-weight:700;color:#003366;letter-spacing:1px;">Coach4U &middot; SAFEty Pulse</div>
      <div style="font-size:10px;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-top:2px;">${clientName?clientName+' &middot; ':''}${dateStr}</div>
    </div>
    <div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#8a8a8a;font-weight:700;margin-bottom:10px;text-align:center;">Question Scores</div>
    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:center;gap:18px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;">
        <span style="display:inline-flex;width:18px;height:18px;border-radius:4px;background:#dc2626;color:#fff;font-weight:800;font-size:11px;align-items:center;justify-content:center;">1</span>
        <span><strong>1\u20134</strong> Reserves running low</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;">
        <span style="display:inline-flex;width:18px;height:18px;border-radius:4px;background:#0891b2;color:#fff;font-weight:800;font-size:11px;align-items:center;justify-content:center;">5</span>
        <span><strong>5\u20136</strong> Building capacity</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;">
        <span style="display:inline-flex;width:18px;height:18px;border-radius:4px;background:#16a34a;color:#fff;font-weight:800;font-size:11px;align-items:center;justify-content:center;">7</span>
        <span><strong>7\u201310</strong> Strong reserves</span>
      </div>
    </div>
    <div class="pulse-quad">`;
  pillarKeys.forEach(key=>{
    const meta=PILLAR_META[key];
    html+=`<div class="pulse-card" style="border-radius:12px;border:1px solid ${meta.borderColor};background:#fff;overflow:hidden;">
      <div style="background:${meta.headerBg};padding:8px 12px;display:flex;align-items:center;gap:8px;">
        <div style="width:24px;height:24px;border-radius:6px;background:${meta.color};color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${meta.letter}</div>
        <div style="font-size:12px;font-weight:700;color:#0b3a6e;">${meta.label}</div>
        <div style="margin-left:auto;font-size:11px;font-weight:700;color:${meta.color};">${scores[key]}/50</div>
      </div>
      <div style="padding:6px 12px 10px;">`;
    (QUESTIONS[key]||[]).forEach(q=>{
      const v=answers[q.id];
      const col=pulseScoreColor(v);
      html+=`<div style="display:flex;gap:8px;align-items:flex-start;padding:4px 0;border-bottom:1px dashed #f1f5f9;">
        <div style="flex-shrink:0;min-width:24px;height:22px;border-radius:5px;background:${col};color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;">${v||'—'}</div>
        <div style="font-size:10.5px;line-height:1.4;color:#475569;">${q.text}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div></div>
    <div class="footer no-print" style="margin-top:16px;font-size:11px;color:#999;text-align:center;">Coach4U &middot; SAFEty Pulse &middot; ${dateStr}</div>`;
  document.getElementById('app').innerHTML=html;
}

init();
</script>
</body>
</html>
