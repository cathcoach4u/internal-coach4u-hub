<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach4U CRM</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Coach4U">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f0f6ff;color:#1e293b;min-height:100vh;display:flex;letter-spacing:-0.01em;}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:linear-gradient(180deg,#1e3a5f 0%,#234b78 100%);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
.sidebar-logo{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-logo img{width:36px;height:36px;border-radius:8px;background:#fff;padding:2px;}
.sidebar-logo span{font-family:'Quicksand','Inter',sans-serif;font-size:18px;font-weight:700;color:#fff;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 10px;font-size:13px;color:rgba(255,255,255,.7);cursor:pointer;border-radius:8px;border:none;background:none;width:calc(100% - 20px);text-align:left;transition:all .15s;font-family:inherit;font-weight:500;}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff;}
.nav-item.active{background:#3b82f6;color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3);}
.nav-item .icon{width:20px;text-align:center;font-size:15px;}
.sidebar-footer{margin-top:auto;padding:16px 16px;font-size:11px;color:rgba(255,255,255,.3);border-top:1px solid rgba(255,255,255,.08);}

/* ── AREA TABS ── */
.area-tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #e2e8f0;padding:0 32px;position:sticky;top:0;z-index:40;}
.area-tab{padding:14px 20px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.area-tab:hover{color:#1e3a5f;background:#f8fafc;}
.area-tab.active{color:#1e3a5f;border-bottom-color:#3b82f6;}
.area-tab .tab-icon{margin-right:6px;}

/* ── MAIN AREA ── */
.main{margin-left:220px;flex:1;min-height:100vh;}

/* ── HEADER ── */
.header{background:linear-gradient(180deg,#1e3a5f 0%,#234b78 100%);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;}
.header h2{font-family:'Quicksand','Inter',sans-serif;font-size:20px;font-weight:700;color:#fff;}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(255,255,255,.7);font-weight:500;}

/* ── CONTENT ── */
.content{padding:28px 32px;}
.screen{display:none;}
.screen.active{display:block;}

/* ── DASHBOARD ── */
.dash-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px;}
.dash-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.dash-card .dc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.dc-icon.blue{background:#dbeafe;color:#2563eb;}
.dc-icon.green{background:#dcfce7;color:#16a34a;}
.dc-icon.amber{background:#fef3c7;color:#d97706;}
.dash-card .dc-info h4{font-size:26px;font-weight:700;color:#1e3a5f;line-height:1.2;}
.dash-card .dc-info p{font-size:12px;color:#94a3b8;font-weight:500;}

/* ── SEARCH BAR ── */
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.search-input{padding:10px 16px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;width:300px;max-width:100%;background:#fff;font-family:inherit;transition:all .2s;}
.search-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.btn-blue{background:#3b82f6;color:#fff;box-shadow:0 1px 3px rgba(59,130,246,.25);}.btn-blue:hover{background:#2563eb;}
.btn-green{background:#16a34a;color:#fff;}.btn-green:hover{background:#15803d;}
.btn-red{background:#ef4444;color:#fff;}.btn-red:hover{background:#dc2626;}
.btn-gray{background:#f1f5f9;color:#1e293b;border:1px solid #e2e8f0;}.btn-gray:hover{background:#e2e8f0;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;}
th{background:#f8fafc;text-align:left;padding:12px 16px;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #e2e8f0;font-weight:600;}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f1f5f9;}
tr:hover td{background:#f8fafc;}
td .actions{display:flex;gap:6px;}
td .actions button{padding:4px 10px;font-size:12px;}

/* ── BADGES ── */
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;display:inline-block;}
.badge-green{background:#dcfce7;color:#15803d;}
.badge-amber{background:#fef3c7;color:#d97706;}
.badge-red{background:#fef2f2;color:#ef4444;}
.badge-blue{background:#dbeafe;color:#2563eb;}
.badge-gray{background:#f1f5f9;color:#64748b;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:28px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal h3{font-family:'Quicksand','Inter',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;color:#1e3a5f;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;transition:all .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.form-group textarea{height:80px;resize:vertical;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.toast.show{opacity:1;}
.toast.success{background:#16a34a;}
.toast.error{background:#ef4444;}

/* ── LINKED MEMBERS ── */
.member-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.member-tag{background:#dbeafe;color:#2563eb;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.member-tag .remove{cursor:pointer;font-weight:700;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .sidebar.mobile-open{display:flex;width:260px;z-index:60;}
  .main{margin-left:0;}
  .mobile-toggle{display:block!important;}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:55;}
  .mobile-overlay.show{display:block;}
  .area-tabs{padding:0 12px;overflow-x:auto;}
  .area-tab{padding:10px 14px;font-size:12px;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="C4U.png" alt="Coach4U">

<!-- MOBILE OVERLAY -->

<!-- MAIN -->

      <div id="clCards"></div>

    <!-- STRENGTHS DASHBOARD -->

    </div>

    <!-- STRENGTHS HUB -->
    <div class="screen" id="screen-strengths">
      <div class="toolbar">
        <input class="search-input" id="shSearch" placeholder="Search by name or strength..." oninput="filterStrengths()">
      </div>
      <div id="shCards"></div>
    </div>

    <!-- THRIVEHQ DASHBOARD -->
    <div class="screen" id="screen-thqdash">
      <div id="thqDashContent"></div>
    </div>

    <!-- THRIVEHQ MEMBERS -->
    <div class="screen" id="screen-thrivehq">
      <div class="toolbar">
        <input class="search-input" id="thqSearch" placeholder="Search members..." oninput="filterThriveHQ()">
      </div>
      <div id="thqContent"></div>
    </div>

    <!-- THRIVEHQ COACHING CALLS -->
    <div class="screen" id="screen-thqcalls">
      <div class="toolbar">
        <input class="search-input" id="thqCallSearch" placeholder="Search members..." oninput="renderCoachingCalls()">
      </div>
      <div id="thqCallSummary"></div>
      <div id="thqCallContent"></div>
    </div>

    <!-- OPERATIONS DASHBOARD -->
    <div class="screen" id="screen-opsdash">
      <div id="opsDashContent"></div>

    <!-- TASK MANAGEMENT -->
    <div class="screen" id="screen-tasks">
      <div class="toolbar">
        <input class="search-input" id="tkSearch" placeholder="Search tasks..." oninput="filterTasks()">
        <select id="tkFilterStatus" onchange="filterTasks()" style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;">
          <option value="">All Status</option><option>To Do</option><option>In Progress</option><option>Done</option>

        <select id="tkFilterPriority" onchange="filterTasks()" style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;">

        <button class="btn btn-blue" onclick="openTaskModal()">+ Add Task</button>
      </div>
      <div id="tkCards"></div>
    </div>

    <!-- REFERRAL HUB -->
    <div class="screen" id="screen-referrals">
      <div class="toolbar">
        <input class="search-input" id="refSearch" placeholder="Search referrers..." oninput="filterReferrals()">

      </div>

  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">

    <div class="form-group"><label>Description</label><textarea id="tkDesc"></textarea></div>
    <div class="form-group"><label>Owner</label>
      <select id="tkOwner"><option>Cath Baker</option></select>
    </div>

      <select id="tkPriority"><option>High</option><option>Medium</option><option>Low</option></select>
    </div>
    <div class="form-group"><label>Status</label>
      <select id="tkStatus"><option>To Do</option><option>In Progress</option><option>Done</option></select>
    </div>

<!-- REFERRAL MODAL -->

      <button class="btn btn-gray" onclick="closeModal('clientModal')">Cancel</button>
      <button class="btn btn-green" onclick="saveClient()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){

// ── SUPABASE ──
const SUPABASE_URL = 'https://uoixetfvboevjxlkfyqy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CLIFTONSTRENGTHS 34 THEMES ──
const CS34 = ['','Achiever','Activator','Adaptability','Analytical','Arranger','Belief','Command','Communication','Competition','Connectedness','Consistency','Context','Deliberative','Developer','Discipline','Empathy','Focus','Futuristic','Harmony','Ideation','Includer','Individualization','Input','Intellection','Learner','Maximizer','Positivity','Relator','Responsibility','Restorative','Self-Assurance','Significance','Strategic','Woo'];

// Gallup CliftonStrengths domain colors
const CS_DOMAINS={
  // Executing — purple
  Achiever:'#7B2D8E',Arranger:'#7B2D8E',Belief:'#7B2D8E',Consistency:'#7B2D8E',Deliberative:'#7B2D8E',Discipline:'#7B2D8E',Focus:'#7B2D8E',Responsibility:'#7B2D8E',Restorative:'#7B2D8E',
  // Influencing — orange
  Activator:'#E97200',Command:'#E97200',Communication:'#E97200',Competition:'#E97200',Maximizer:'#E97200',['Self-Assurance']:'#E97200',Significance:'#E97200',Woo:'#E97200',
  // Relationship Building — blue
  Adaptability:'#0070CD',Connectedness:'#0070CD',Developer:'#0070CD',Empathy:'#0070CD',Harmony:'#0070CD',Includer:'#0070CD',Individualization:'#0070CD',Positivity:'#0070CD',Relator:'#0070CD',
  // Strategic Thinking — green
  Analytical:'#00945B',Context:'#00945B',Futuristic:'#00945B',Ideation:'#00945B',Input:'#00945B',Intellection:'#00945B',Learner:'#00945B',Strategic:'#00945B'
};
function csColor(name){return CS_DOMAINS[name]||'#64748b';}
function csPill(rank,name){return `<span style="background:${csColor(name)};color:#fff;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:600;">#${rank} ${name}</span>`;}

// ── DATA ──
let contacts = [];
let clients = [];
let tasks = [];
let referrals = [];
let itprojects = [];
let tempMembers = [];

// ── LOAD FROM SUPABASE ──
async function loadContacts(){
  const {data,error} = await supabase.from('contacts').select('*').order('first_name');
  if(data) contacts = data;
  if(error) console.error('Load contacts error:', error);
}
async function loadClients(){
  const [{data,error},{data:allMembers}] = await Promise.all([
    supabase.from('clients').select('*').order('relationship_name'),
    supabase.from('client_members').select('client_id,contact_id')
  ]);
  if(data){
    const memberMap={};
    (allMembers||[]).forEach(m=>{if(!memberMap[m.client_id])memberMap[m.client_id]=[];memberMap[m.client_id].push(m.contact_id);});
    data.forEach(c=>{c.members=memberMap[c.id]||[];});
    clients=data;
  }
  if(error) console.error('Load clients error:', error);
}
async function loadTasks(){
  const {data,error} = await supabase.from('tasks').select('*').order('created_at',{ascending:false});
  if(data) tasks = data;
  if(error) console.error('Load tasks error:', error);
}

async function loadAll(){
  await Promise.all([loadContacts(), loadClients(), loadTasks()]);
  renderSidebarNav('home');
  renderDashboard();
}

window.navTo = function(tab,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  const titles={dashboard:'Dashboard',crmdash:'CRM',thqdash:'ThriveHQ',strdash:'Strengths',opsdash:'Operations',masterlist:'Master List',clients:'Clients',thrivehq:'Members',strengths:'Strengths Hub',thqcalls:'Coaching Calls',tasks:'Task Management',referrals:'Referral Hub',itprojects:'IT Projects'};
  document.getElementById('pageTitle').textContent=titles[tab]||'Coach4U';
  // Sync area tab
  const area=pageToArea[tab]||'home';
  if(area!==currentArea){
    currentArea=area;
    document.querySelectorAll('.area-tab').forEach(t=>t.classList.remove('active'));
    const areaKeys=Object.keys(areaConfig);
    const idx=areaKeys.indexOf(area);
    const tabs=document.querySelectorAll('.area-tab');
    if(idx>=0&&tabs[idx]) tabs[idx].classList.add('active');
  }
  renderSidebarNav(area);
  // Highlight active sidebar item
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.nav-item').forEach(n=>{if(n.dataset.page===tab) n.classList.add('active');});
  if(tab==='dashboard') renderDashboard();
  if(tab==='crmdash') renderCrmDash();
  if(tab==='thqdash') renderThqDash();
  if(tab==='strdash') renderStrDash();
  if(tab==='opsdash') renderOpsDash();
  if(tab==='masterlist') renderMasterList();
  if(tab==='clients') renderClients();
  if(tab==='thrivehq') renderThriveHQ();
  if(tab==='strengths') renderStrengths();
  if(tab==='thqcalls') renderCoachingCalls();
  if(tab==='tasks') renderTasks();
  if(tab==='referrals') renderReferrals();
  if(tab==='itprojects') renderITProjects();
  closeMobile();
};

// ── STRENGTHS DASHBOARD ──
function renderStrDash(){
  const withStr=contacts.filter(c=>c.strength_1);
  const withoutStr=contacts.filter(c=>!c.strength_1);

  // Domain counts across all contacts
  const domainCount={Executing:0,Influencing:0,Relationship:0,Strategic:0};
  const strengthFreq={};
  withStr.forEach(c=>{
    for(let i=1;i<=10;i++){
      const s=c['strength_'+i];
      if(s){
        strengthFreq[s]=(strengthFreq[s]||0)+1;
        const d=getDomain(s);
        if(d) domainCount[d]++;
      }
    }
  });

  const totalDom=Object.values(domainCount).reduce((a,b)=>a+b,0)||1;
  const topStrengths=Object.entries(strengthFreq).sort((a,b)=>b[1]-a[1]).slice(0,10);

  let html=`<div class="dash-cards">
    <div class="dash-card"><div class="dc-icon green">&#127919;</div><div class="dc-info"><h4>${withStr.length}</h4><p>Profiles Complete</p></div></div>
    <div class="dash-card"><div class="dc-icon amber">&#9888;</div><div class="dc-info"><h4>${withoutStr.length}</h4><p>No Strengths Yet</p></div></div>
  </div>`;

  // Domain balance across all contacts
  html+=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:20px;">
    <div style="font-family:'Quicksand','Inter',sans-serif;font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:14px;">Overall Domain Balance</div>
    <div style="display:flex;border-radius:6px;overflow:hidden;height:32px;margin-bottom:12px;">
      ${Object.entries(domainCount).map(([d,c])=>c?'<div style="background:'+domainColors[d]+';width:'+(c/totalDom*100).toFixed(1)+'%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;">'+d+' '+c+'</div>':'').join('')}
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
      ${Object.entries(domainCount).map(([d,c])=>`<div style="display:flex;align-items:center;gap:6px;"><div style="width:12px;height:12px;border-radius:2px;background:${domainColors[d]};"></div><span style="font-size:12px;color:#64748b;">${d}: ${c} (${(c/totalDom*100).toFixed(0)}%)</span></div>`).join('')}
    </div>
  </div>`;

  // Top 10 most common strengths
  html+=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:20px;">
    <div style="font-family:'Quicksand','Inter',sans-serif;font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:14px;">Most Common Strengths</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${topStrengths.map(([name,count])=>{
        const pct=(count/withStr.length*100).toFixed(0);
        return `<div style="display:flex;align-items:center;gap:10px;">
          <span style="background:${csColor(name)};color:#fff;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;width:140px;text-align:center;">${name}</span>
          <div style="flex:1;background:#f1f5f9;border-radius:4px;height:18px;overflow:hidden;">
            <div style="background:${csColor(name)};height:100%;width:${pct}%;border-radius:4px;"></div>
          </div>
          <span style="font-size:12px;color:#64748b;font-weight:600;width:60px;text-align:right;">${count} (${pct}%)</span>

function renderClients(){
  const q=document.getElementById('clSearch').value.toLowerCase();
  const filtered=clients.filter(c=>(c.relationship_name+' '+c.role+' '+c.status+' '+c.practitioner).toLowerCase().includes(q));
  const groupOrder=['Couple','Individual','Business','Organisation'];
  const groupLabels={'Couple':'Couples','Individual':'Individuals','Business':'Business','Organisation':'Community','Other':'Other','Archived':'Archived'};
  // Separate active from archived (Completed)
  const active=filtered.filter(c=>c.status!=='Completed');
  const archived=filtered.filter(c=>c.status==='Completed');
  const grouped={};
  active.forEach(c=>{const g=c.role||'Other';if(!grouped[g])grouped[g]=[];grouped[g].push(c);});
  let html='';
  const renderGroup=(g,items,label)=>{
    if(!items||!items.length)return;
    const collapsed=clientGroupState[g]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    html+=`<div style="margin-bottom:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleClientGroup('${g}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;transition:transform .2s;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${label||groupLabels[g]||g}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${items.length}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:8px;padding:12px 12px;">${items.map(c=>renderClientCard(c)).join('')}</div>`}
    </div>`;
  };
  groupOrder.forEach(g=>{if(grouped[g])renderGroup(g,grouped[g]);delete grouped[g];});
  Object.keys(grouped).forEach(g=>renderGroup(g,grouped[g]));
  if(archived.length) renderGroup('Archived',archived,'Archived');
  document.getElementById('clCards').innerHTML=html||'<div style="padding:20px;text-align:center;color:#94a3b8;">No clients found.</div>';
}

const thqGroupState={};
function toggleThqGroup(g){thqGroupState[g]=!thqGroupState[g];renderThriveHQ();}
window.toggleThqGroup=toggleThqGroup;

function getThqMembers(q){
  const thqClients=clients.filter(cl=>cl.role==='Organisation'||cl.relationship_name.toLowerCase().includes('thrivehq'));
  const memberMap={};
  thqClients.forEach(cl=>{
    (cl.members||[]).forEach(mid=>{
      if(!memberMap[mid])memberMap[mid]={contact:null,clients:[]};
      memberMap[mid].clients.push(cl);
    });
  });
  Object.keys(memberMap).forEach(mid=>{memberMap[mid].contact=contacts.find(c=>c.id===mid);});
  let members=Object.values(memberMap).filter(m=>m.contact);
  if(q){
    members=members.filter(m=>{
      const c=m.contact;
      return (c.first_name+' '+c.last_name+' '+(c.email||'')+' '+(c.strengths||'')).toLowerCase().includes(q);
    });
  }
  return members;
}

function renderThriveHQ(){
  const q=document.getElementById('thqSearch').value.toLowerCase();
  const members=getThqMembers(q);

  const totalMembers=members.length;
  const overdueCount=members.filter(m=>m.contact.renewal_date&&new Date(m.contact.renewal_date)<new Date()).length;
  const awaitingProfile=members.filter(m=>!m.contact.strength_1).length;

  let html=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;">

const thqSelected=new Set();

window.toggleCallMember=function(contactId){
  if(thqSelected.has(contactId)) thqSelected.delete(contactId);
  else thqSelected.add(contactId);
  renderCoachingCalls();
};

const domainColors={Executing:'#7B2D8E',Influencing:'#E97200',Relationship:'#0070CD',Strategic:'#00945B'};
const executingThemes=['Achiever','Arranger','Belief','Consistency','Deliberative','Discipline','Focus','Responsibility','Restorative'];
const influencingThemes=['Activator','Command','Communication','Competition','Maximizer','Self-Assurance','Significance','Woo'];
const relationshipThemes=['Adaptability','Connectedness','Developer','Empathy','Harmony','Includer','Individualization','Positivity','Relator'];
const strategicThemes=['Analytical','Context','Futuristic','Ideation','Input','Intellection','Learner','Strategic'];
function getDomain(name){
  if(executingThemes.includes(name)) return 'Executing';
  if(influencingThemes.includes(name)) return 'Influencing';
  if(relationshipThemes.includes(name)) return 'Relationship';
  if(strategicThemes.includes(name)) return 'Strategic';
  return null;
}
const domDescriptions={Executing:'getting things done and taking action',Influencing:'persuading, speaking up and taking charge',Relationship:'connecting, building trust and supporting each other',Strategic:'thinking, analysing and absorbing information'};
const domTone={Executing:'action-oriented — they want clear next steps and tangible outcomes',Influencing:'energetic and vocal — they want to be heard and make an impact',Relationship:'people-first — they want connection, safety and to feel valued',Strategic:'curious and reflective — they want ideas, context and time to think'};
const domTips={Executing:'Give them tasks, accountability and progress markers.',Influencing:'Create space for them to share, lead discussions and champion ideas.',Relationship:'Build in check-ins, pair work and acknowledgment.',Strategic:'Pose thought-provoking questions and allow processing time.'};

function renderCoachingCalls(){
  const q=(document.getElementById('thqCallSearch').value||'').toLowerCase();
  const members=getThqMembers(q);
  const selected=members.filter(m=>thqSelected.has(m.contact.id));

  // Build summary
  const summaryEl=document.getElementById('thqCallSummary');
  if(selected.length>0){
    const strengthCount={};
    const domainCount={Executing:0,Influencing:0,Relationship:0,Strategic:0};
    selected.forEach(m=>{
      const c=m.contact;
      for(let i=1;i<=10;i++){
        const s=c['strength_'+i];
        if(s){
          if(!strengthCount[s]) strengthCount[s]={count:0,members:[]};
          strengthCount[s].count++;
          strengthCount[s].members.push(c.first_name);
          const d=getDomain(s);
          if(d) domainCount[d]++;
        }
      }
    });
    const sorted=Object.entries(strengthCount).sort((a,b)=>b[1].count-a[1].count);
    const totalDom=Object.values(domainCount).reduce((a,b)=>a+b,0)||1;
    const shared=sorted.filter(([,info])=>info.count>1);

    const domSorted=Object.entries(domainCount).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]);
    const topDom=domSorted[0]?domSorted[0][0]:null;
    const secondDom=domSorted[1]?domSorted[1][0]:null;
    let insight='';
    if(topDom){
      const tied=domSorted.length>1&&domSorted[0][1]===domSorted[1][1];
      if(tied){
        insight=`<strong>Balanced energy</strong> between <strong>${topDom}</strong> (${domDescriptions[topDom]}) and <strong>${secondDom}</strong> (${domDescriptions[secondDom]}). This group can both think and do — lean into that versatility.`;
      } else {
        insight=`This group leads with <strong>${topDom}</strong> — ${domTone[topDom]}. ${domTips[topDom]}`;
        if(secondDom) insight+=` Secondary energy: <strong>${secondDom}</strong> (${domDescriptions[secondDom]}).`;
      }
    }

    let shtml=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 18px;margin-bottom:14px;">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:${insight||shared.length?'10':'0'}px;">
        <div style="font-family:'Quicksand','Inter',sans-serif;font-size:15px;font-weight:700;color:#1e3a5f;white-space:nowrap;">${selected.length} on call</div>
        <div style="display:flex;border-radius:4px;overflow:hidden;height:22px;flex:1;min-width:200px;">
          ${Object.entries(domainCount).map(([d,c])=>c?'<div style="background:'+domainColors[d]+';width:'+(c/totalDom*100).toFixed(1)+'%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;">'+d+' '+c+'</div>':'').join('')}
        </div>
        <button onclick="thqSelected.clear();renderCoachingCalls();" style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:3px 8px;font-size:10px;color:#64748b;cursor:pointer;">Clear</button>
      </div>
      ${insight?'<div style="font-size:13px;color:#475569;line-height:1.5;margin-bottom:'+(shared.length?'10':'0')+'px;">'+insight+'</div>':''}
      ${shared.length?'<div style="display:flex;flex-wrap:wrap;gap:4px;"><span style="font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-right:4px;line-height:24px;">Shared:</span>'+shared.map(([name,info])=>`<span style="background:${csColor(name)};color:#fff;padding:3px 8px;border-radius:2px;font-size:11px;font-weight:700;">${name} <span style="opacity:.7;">×${info.count}</span></span>`).join('')+'</div>':''}
    </div>`;
    summaryEl.innerHTML=shtml;
  } else {
    summaryEl.innerHTML=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:14px;text-align:center;">
      <div style="font-size:14px;color:#64748b;">Select members below to see the group's strengths and coaching insights</div>
    </div>`;
  }

  // Member cards with checkboxes
  let html=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;">`;
  members.forEach(m=>{
    const c=m.contact;
    const sel=thqSelected.has(c.id);
    const allStr=[];
    for(let i=1;i<=10;i++){if(c['strength_'+i]) allStr.push(c['strength_'+i]);}
    html+=`<div onclick="toggleCallMember('${c.id}')" style="background:${sel?'#f0f7ff':'#fff'};border:2px solid ${sel?'#1e3a5f':'#e2e8f0'};border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;${sel?'box-shadow:0 0 0 1px #1e3a5f;':''}" onmouseover="this.style.borderColor='#1e3a5f'" onmouseout="this.style.borderColor='${sel?'#1e3a5f':'#e2e8f0'}'">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="width:22px;height:22px;border-radius:4px;border:2px solid ${sel?'#1e3a5f':'#cbd5e1'};background:${sel?'#1e3a5f':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          ${sel?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
        </div>
        <span style="font-weight:700;font-size:13px;color:#1e293b;">${c.first_name} ${c.last_name}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;">
        ${allStr.map(s=>`<span style="background:${csColor(s)};color:#fff;padding:2px 7px;border-radius:2px;font-size:9px;font-weight:700;">${s}</span>`).join('')}
        ${!allStr.length?'<span style="font-size:10px;color:#94a3b8;">No strengths</span>':''}
      </div>
    </div>`;
  });
  html+=`</div>`;
  if(!members.length) html='<div style="padding:20px;text-align:center;color:#94a3b8;">No linked members found.</div>';
  document.getElementById('thqCallContent').innerHTML=html;
}

const tkGroupState={};
function toggleTkGroup(g){tkGroupState[g]=!tkGroupState[g];renderTasks();}

function renderTaskCard(t){
  const overdue=t.due_date&&t.status!=='Done'&&new Date(t.due_date)<new Date();
  const borderColor=overdue?'#ef4444':t.priority==='High'?'#eab308':t.priority==='Medium'?'#3b82f6':'#94a3b8';
  return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid ${borderColor};border-radius:8px;padding:14px 16px;display:flex;gap:12px;align-items:center;">
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-weight:600;font-size:14px;color:#1e293b;${t.status==='Done'?'text-decoration:line-through;color:#94a3b8;':''}">${t.title}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;${t.priority==='High'?'background:#fef2f2;color:#dc2626;':t.priority==='Medium'?'background:#fef9c3;color:#a16207;':'background:#f1f5f9;color:#64748b;'}">${t.priority}</span>
      </div>
      <div style="font-size:12px;color:#64748b;margin-top:4px;">${t.owner}${t.due_date?' &middot; Due: <strong style="color:'+(overdue?'#ef4444':'#1e293b')+';">'+t.due_date+'</strong>':''}${t.description?' &middot; '+t.description:''}</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:6px 12px;font-size:12px;color:#475569;cursor:pointer;" onclick="openTaskModal('${t.id}')">Edit</button>
      ${t.status!=='Done'?'<button style="background:none;border:1px solid #bbf7d0;border-radius:6px;padding:6px 12px;font-size:12px;color:#16a34a;cursor:pointer;" onclick="completeTask(\''+t.id+'\')">Done</button>':''}
      <button style="background:none;border:1px solid #fecaca;border-radius:6px;padding:6px 12px;font-size:12px;color:#dc2626;cursor:pointer;" onclick="deleteTask('${t.id}')">Del</button>
    </div>
  </div>`;
}

function renderTasks(){
  const q=document.getElementById('tkSearch').value.toLowerCase();
  const fs=document.getElementById('tkFilterStatus').value;
  const fp=document.getElementById('tkFilterPriority').value;
  const filtered=tasks.filter(t=>{
    if(fs&&t.status!==fs)return false;
    if(fp&&t.priority!==fp)return false;
    return(t.title+' '+t.owner+' '+t.description).toLowerCase().includes(q);
  });
  const statusOrder=['To Do','In Progress','Done'];
  const grouped={};
  filtered.forEach(t=>{const s=t.status||'To Do';if(!grouped[s])grouped[s]=[];grouped[s].push(t);});
  let html='';
  statusOrder.forEach(s=>{
    if(!grouped[s]||!grouped[s].length)return;
    const collapsed=tkGroupState[s]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    html+=`<div style="margin-bottom:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleTkGroup('${s}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${s}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${grouped[s].length}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:8px;padding:12px;">${grouped[s].map(t=>renderTaskCard(t)).join('')}</div>`}
    </div>`;
  });
  document.getElementById('tkCards').innerHTML=html||'<div style="padding:20px;text-align:center;color:#94a3b8;">No tasks found.</div>';
}
window.filterTasks=function(){renderTasks();};

window.openTaskModal=function(id){
  const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('taskModalTitle').textContent=t?'Edit Task':'Add Task';
  document.getElementById('taskId').value=t?t.id:'';
  document.getElementById('tkTitle').value=t?t.title:'';
  document.getElementById('tkDesc').value=t?t.description:'';
  document.getElementById('tkOwner').value=t?t.owner:'Cath';
  document.getElementById('tkPriority').value=t?t.priority:'Medium';
  document.getElementById('tkStatus').value=t?t.status:'To Do';
  document.getElementById('tkDue').value=t?t.due_date:'';
  document.getElementById('taskModal').classList.add('open');
};

window.saveTask=async function(){
  const id=document.getElementById('taskId').value;
  const data={title:document.getElementById('tkTitle').value.trim(),description:document.getElementById('tkDesc').value.trim(),owner:document.getElementById('tkOwner').value,priority:document.getElementById('tkPriority').value,status:document.getElementById('tkStatus').value,due_date:document.getElementById('tkDue').value||null};
  if(!data.title){toast('Task title required','error');return;}
  if(id){
    const {error}=await supabase.from('tasks').update(data).eq('id',id);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Task updated','success');
  }else{
    const {error}=await supabase.from('tasks').insert(data);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Task added','success');
  }
  closeModal('taskModal');await loadTasks();renderTasks();
};

window.completeTask=async function(id){
  const {error}=await supabase.from('tasks').update({status:'Done'}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Task completed','success');await loadTasks();renderTasks();
};

window.deleteTask=async function(id){
  if(!confirm('Delete this task?'))return;
  const {error}=await supabase.from('tasks').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Task deleted','success');await loadTasks();renderTasks();
};

  const filtered=itprojects.filter(p=>(p.name+' '+p.owner+' '+p.status).toLowerCase().includes(q));
  const statusOrder=['In Progress','Planning','On Hold','Completed'];
  const grouped={};
  filtered.forEach(p=>{const s=p.status||'Planning';if(!grouped[s])grouped[s]=[];grouped[s].push(p);});
  let html='';
  statusOrder.forEach(s=>{
    if(!grouped[s]||!grouped[s].length)return;
    const collapsed=itGroupState[s]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    html+=`<div style="margin-bottom:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleItGroup('${s}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${s}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${grouped[s].length}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:8px;padding:12px;">${grouped[s].map(p=>{
        const borderColor=p.status==='Completed'?'#16a34a':p.status==='In Progress'?'#3b82f6':p.status==='On Hold'?'#eab308':'#94a3b8';
        return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid ${borderColor};border-radius:8px;padding:14px 16px;display:flex;gap:12px;align-items:center;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-weight:600;font-size:14px;color:#1e293b;">${p.name}</span>
              <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;${p.status==='Completed'?'background:#dcfce7;color:#15803d;':p.status==='In Progress'?'background:#eff6ff;color:#2563eb;':p.status==='On Hold'?'background:#fef9c3;color:#a16207;':'background:#f1f5f9;color:#64748b;'}">${p.status}</span>
            </div>
            <div style="font-size:12px;color:#64748b;margin-top:4px;">${p.owner}${p.notes?' &middot; '+p.notes:''}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <button style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:6px 12px;font-size:12px;color:#475569;cursor:pointer;" onclick="openITModal('${p.id}')">Edit</button>
            <button style="background:none;border:1px solid #fecaca;border-radius:6px;padding:6px 12px;font-size:12px;color:#dc2626;cursor:pointer;" onclick="deleteITProject('${p.id}')">Del</button>
          </div>
        </div>`;
      }).join('')}</div>`}
    </div>`;
  });
  document.getElementById('itCards').innerHTML=html||'<div style="padding:20px;text-align:center;color:#94a3b8;">No projects found.</div>';
}
window.filterITProjects=function(){renderITProjects();};

window.openITModal=function(id){
  const p=id?itprojects.find(x=>x.id===id):null;
  document.getElementById('itModalTitle').textContent=p?'Edit Project':'Add Project';
  document.getElementById('itId').value=p?p.id:'';
  document.getElementById('itName').value=p?p.name:'';
  document.getElementById('itStatus').value=p?p.status:'Planning';
  document.getElementById('itOwner').value=p?p.owner:'Cath';
  document.getElementById('itNotes').value=p?p.notes:'';
  document.getElementById('itModal').classList.add('open');
};

window.saveITProject=function(){
  const id=document.getElementById('itId').value;
  const data={name:document.getElementById('itName').value.trim(),status:document.getElementById('itStatus').value,owner:document.getElementById('itOwner').value,notes:document.getElementById('itNotes').value.trim()};
  if(!data.name){toast('Project name required','error');return;}
  if(id){Object.assign(itprojects.find(x=>x.id===id),data);toast('Project updated','success');}
  else{data.id=String(nextITId++);itprojects.push(data);toast('Project added','success');}
  closeModal('itModal');renderITProjects();
};

window.deleteITProject=function(id){
  if(!confirm('Delete this project?'))return;
  itprojects=itprojects.filter(p=>p.id!==id);toast('Project deleted','success');renderITProjects();
};

// ── BOOT ──
loadAll();

// ── MOBILE CHECK ──
if(window.innerWidth<=768) document.getElementById('mobileToggle').style.display='inline-block';
window.addEventListener('resize',()=>{
  document.getElementById('mobileToggle').style.display=window.innerWidth<=768?'inline-block':'none';
});

})();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
