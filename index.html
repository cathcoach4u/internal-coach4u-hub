<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach4U CRM</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Coach4U">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f6ff;color:#1e293b;min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{width:240px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
.sidebar-logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e2e8f0;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);}
.sidebar-logo img{width:40px;height:40px;border-radius:8px;}
.sidebar-logo span{font-size:18px;font-weight:700;color:#3b82f6;}
.nav-section{padding:16px 12px 8px;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;font-size:14px;color:#475569;cursor:pointer;border-radius:8px;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:all .15s;font-family:inherit;}
.nav-item:hover{background:#eff6ff;color:#3b82f6;}
.nav-item.active{background:#3b82f6;color:#fff;}
.nav-item .icon{width:20px;text-align:center;font-size:16px;}
.nav-group-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;margin:2px 8px;font-size:14px;color:#475569;cursor:pointer;border-radius:8px;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:all .15s;font-family:inherit;}
.nav-group-btn:hover{background:#eff6ff;color:#3b82f6;}
.nav-group-btn .arrow{font-size:10px;transition:transform .2s;}
.nav-group-btn.open .arrow{transform:rotate(90deg);}
.nav-group-items{display:none;padding-left:20px;}
.nav-group-items.open{display:block;}
.sidebar-footer{margin-top:auto;padding:16px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;}

/* ── MAIN AREA ── */
.main{margin-left:240px;flex:1;min-height:100vh;}

/* ── HEADER ── */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.header h2{font-size:20px;font-weight:700;color:#1e293b;}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#64748b;}

/* ── CONTENT ── */
.content{padding:24px 28px;}
.screen{display:none;}
.screen.active{display:block;}

/* ── DASHBOARD ── */
.dash-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px;}
.dash-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;display:flex;align-items:center;gap:14px;}
.dash-card .dc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.dc-icon.blue{background:#eff6ff;color:#3b82f6;}
.dc-icon.green{background:#f0fdf4;color:#16a34a;}
.dc-icon.amber{background:#fefce8;color:#ca8a04;}
.dash-card .dc-info h4{font-size:24px;font-weight:700;color:#1e293b;line-height:1.2;}
.dash-card .dc-info p{font-size:12px;color:#94a3b8;}
.dash-section{margin-bottom:24px;}
.dash-section h3{font-size:16px;font-weight:600;margin-bottom:12px;color:#1e293b;}
.recent-list{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;}
.recent-item{padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;font-size:14px;}
.recent-item:last-child{border-bottom:none;}
.recent-item:hover{background:#f8fafc;}
.recent-item .ri-name{font-weight:600;}
.recent-item .ri-meta{font-size:12px;color:#94a3b8;}

/* ── SEARCH BAR ── */
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.search-input{padding:8px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;width:280px;max-width:100%;background:#fff;}
.search-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-blue{background:#3b82f6;color:#fff;}.btn-blue:hover{background:#2563eb;}
.btn-green{background:#16a34a;color:#fff;}.btn-green:hover{background:#15803d;}
.btn-red{background:#ef4444;color:#fff;}.btn-red:hover{background:#dc2626;}
.btn-gray{background:#f1f5f9;color:#1e293b;border:1px solid #e2e8f0;}.btn-gray:hover{background:#e2e8f0;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;}
th{background:#f8fafc;text-align:left;padding:12px 16px;font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f1f5f9;}
tr:hover td{background:#f8fafc;}
td .actions{display:flex;gap:6px;}
td .actions button{padding:4px 10px;font-size:12px;}

/* ── BADGES ── */
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;display:inline-block;}
.badge-green{background:#f0fdf4;color:#16a34a;}
.badge-amber{background:#fefce8;color:#ca8a04;}
.badge-red{background:#fef2f2;color:#ef4444;}
.badge-blue{background:#eff6ff;color:#2563eb;}
.badge-gray{background:#f1f5f9;color:#64748b;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;padding:28px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:#64748b;margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.form-group textarea{height:80px;resize:vertical;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
.toast.success{background:#16a34a;}
.toast.error{background:#ef4444;}

/* ── LINKED MEMBERS ── */
.member-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.member-tag{background:#eff6ff;color:#2563eb;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.member-tag .remove{cursor:pointer;font-weight:700;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .sidebar.mobile-open{display:flex;width:260px;z-index:60;}
  .main{margin-left:0;}
  .mobile-toggle{display:block!important;}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:55;}
  .mobile-overlay.show{display:block;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){

// ── SUPABASE ──
const SUPABASE_URL = 'https://uoixetfvboevjxlkfyqy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CLIFTONSTRENGTHS 34 THEMES ──
const CS34 = ['','Achiever','Activator','Adaptability','Analytical','Arranger','Belief','Command','Communication','Competition','Connectedness','Consistency','Context','Deliberative','Developer','Discipline','Empathy','Focus','Futuristic','Harmony','Ideation','Includer','Individualization','Input','Intellection','Learner','Maximizer','Positivity','Relator','Responsibility','Restorative','Self-Assurance','Significance','Strategic','Woo'];

// ── DATA ──
let contacts = [];
let clients = [];
let tasks = [];
let referrals = [];
let itprojects = [];
let tempMembers = [];

// ── LOAD FROM SUPABASE ──
async function loadContacts(){
  const {data,error} = await supabase.from('contacts').select('*').order('first_name');
  if(data) contacts = data;
  if(error) console.error('Load contacts error:', error);
}
async function loadClients(){
  const {data,error} = await supabase.from('clients').select('*').order('relationship_name');
  if(data){
    // Load members for each client
    for(let c of data){
      const {data:members} = await supabase.from('client_members').select('contact_id').eq('client_id', c.id);
      c.members = members ? members.map(m=>m.contact_id) : [];
    }
    clients = data;
  }
  if(error) console.error('Load clients error:', error);
}
async function loadTasks(){
  const {data,error} = await supabase.from('tasks').select('*').order('created_at',{ascending:false});
  if(data) tasks = data;
  if(error) console.error('Load tasks error:', error);
}

async function loadAll(){
  await Promise.all([loadContacts(), loadClients(), loadTasks()]);
  renderDashboard();
}

// ── DATE DISPLAY ──
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ── NAVIGATION ──
window.navTo = function(tab,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const titles={dashboard:'Dashboard',masterlist:'Master List',clients:'Clients',thrivehq:'ThriveHQ',strengths:'Strengths Hub',tasks:'Task Management',referrals:'Referral Hub',itprojects:'IT Projects'};
  document.getElementById('pageTitle').textContent=titles[tab]||'Coach4U';
  if(tab==='dashboard'){loadAll();}
  if(tab==='masterlist'){loadContacts().then(()=>renderMasterList());}
  if(tab==='clients'){Promise.all([loadContacts(),loadClients()]).then(()=>renderClients());}
  if(tab==='thrivehq'){Promise.all([loadContacts(),loadClients()]).then(()=>renderThriveHQ());}
  if(tab==='strengths'){loadContacts().then(()=>renderStrengths());}
  if(tab==='tasks'){loadTasks().then(()=>renderTasks());}
  if(tab==='referrals') renderReferrals();
  if(tab==='itprojects') renderITProjects();
  closeMobile();
};

// Navigate to a specific client from Master List
window.goToClient=function(clientId){
  // Navigate to clients tab
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-clients').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('pageTitle').textContent='Clients';
  // Find the client and expand its group
  const cl=clients.find(c=>c.id===clientId);
  if(cl){
    const role=cl.role||'Other';
    clientGroupState[role]=false; // expand
    document.getElementById('clSearch').value=cl.relationship_name;
    renderClients();
  }
};

// ── SIDEBAR DROPDOWN ──
window.toggleGroup = function(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
};

// ── MOBILE NAV ──
window.openMobile = function(){
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('mobileOverlay').classList.add('show');
};
window.closeMobile = function(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('mobileOverlay').classList.remove('show');
};

// ── TOAST ──
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── MODAL ──
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};

// ── DASHBOARD ──
const dashGroupState={recentClients:false,recentContacts:false,upcomingTasks:false};
function toggleDashGroup(g){dashGroupState[g]=!dashGroupState[g];renderDashboard();}
window.toggleDashGroup=toggleDashGroup;

function renderDashboard(){
  document.getElementById('dcContacts').textContent=contacts.length;
  document.getElementById('dcClients').textContent=clients.filter(c=>c.status==='Active').length;
  document.getElementById('dcOnHold').textContent=clients.filter(c=>c.status==='On Hold').length;

  const recentClientsHtml=clients.slice(0,5).map(c=>{
    const borderColor=c.status==='Active'?'#16a34a':c.status==='On Hold'?'#eab308':'#94a3b8';
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid ${borderColor};border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;">
      <div style="flex:1;min-width:0;">
        <span style="font-weight:600;font-size:14px;color:#1e293b;">${c.relationship_name}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;margin-left:8px;${c.status==='Active'?'background:#dcfce7;color:#15803d;':c.status==='On Hold'?'background:#fef9c3;color:#a16207;':'background:#f1f5f9;color:#64748b;'}">${c.status}</span>
      </div>
      <span style="font-size:12px;color:#64748b;">${c.practitioner}</span>
    </div>`;
  }).join('');

  const recentContactsHtml=contacts.slice(0,5).map(c=>`<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid #3b82f6;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;">
    <div style="flex:1;min-width:0;">
      <span style="font-weight:600;font-size:14px;color:#1e293b;">${c.first_name} ${c.last_name}</span>
      ${c.email?'<span style="font-size:12px;color:#64748b;margin-left:8px;">'+c.email+'</span>':''}
    </div>
    <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;${c.contact_type==='Individual'?'background:#eff6ff;color:#2563eb;':c.contact_type==='Organisation'?'background:#dcfce7;color:#15803d;':'background:#fef9c3;color:#a16207;'}">${c.contact_type}</span>
  </div>`).join('');

  const upcomingHtml=tasks.filter(t=>t.status!=='Done'&&t.due_date).sort((a,b)=>a.due_date.localeCompare(b.due_date)).slice(0,5).map(t=>{
    const overdue=new Date(t.due_date)<new Date();
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid ${overdue?'#ef4444':t.priority==='High'?'#eab308':'#94a3b8'};border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;">
      <div style="flex:1;min-width:0;">
        <span style="font-weight:600;font-size:14px;color:#1e293b;">${t.title}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;margin-left:8px;${t.priority==='High'?'background:#fef2f2;color:#dc2626;':t.priority==='Medium'?'background:#fef9c3;color:#a16207;':'background:#f1f5f9;color:#64748b;'}">${t.priority}</span>
      </div>
      <span style="font-size:12px;font-weight:600;color:${overdue?'#ef4444':'#1e293b'};">${t.due_date}</span>
    </div>`;
  }).join('')||'<div style="padding:12px;font-size:13px;color:#94a3b8;text-align:center;">No upcoming tasks</div>';

  function dashSection(key,label,count,content){
    const collapsed=dashGroupState[key]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    return `<div style="margin-bottom:16px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleDashGroup('${key}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${label}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${count}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:8px;padding:12px;">${content}</div>`}
    </div>`;
  }

  document.getElementById('recentClients').innerHTML=dashSection('recentClients','Recent Clients',clients.length,recentClientsHtml);
  document.getElementById('recentContacts').innerHTML=dashSection('recentContacts','Recent Contacts',contacts.length,recentContactsHtml);
  document.getElementById('upcomingTasks').innerHTML=dashSection('upcomingTasks','Upcoming Tasks',tasks.filter(t=>t.status!=='Done'&&t.due_date).length,upcomingHtml);
}

// ── MASTER LIST ──
const mlGroupState={};
function toggleMlGroup(g){mlGroupState[g]=!mlGroupState[g];renderMasterList();}
window.toggleMlGroup=toggleMlGroup;

function renderMasterList(){
  const q=document.getElementById('mlSearch').value.toLowerCase();
  const filtered=contacts.filter(c=>(c.first_name+' '+c.last_name+' '+c.email+' '+c.contact_type+' '+c.strengths).toLowerCase().includes(q));
  // Group by first letter
  const grouped={};
  filtered.forEach(c=>{const letter=(c.first_name||'?')[0].toUpperCase();if(!grouped[letter])grouped[letter]=[];grouped[letter].push(c);});
  const letters=Object.keys(grouped).sort();
  let html='';
  letters.forEach(letter=>{
    const collapsed=mlGroupState[letter]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    html+=`<div style="margin-bottom:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleMlGroup('${letter}')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${letter}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${grouped[letter].length}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:0;">${grouped[letter].map(c=>{
        const hasStr=c.strength_1;
        const linkedClients=clients.filter(cl=>(cl.members||[]).includes(c.id));
        return `<div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='#fff'" onclick="openContactModal('${c.id}')">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="flex:1;min-width:0;">
              <span style="font-weight:600;font-size:14px;color:#1e293b;">${c.first_name} ${c.last_name}</span>
              ${c.email?' <a href="mailto:'+c.email+'" style="color:#3b82f6;font-size:12px;text-decoration:none;" onclick="event.stopPropagation()">'+c.email+'</a>':''}
            </div>
            <div style="flex-shrink:0;display:flex;align-items:center;gap:8px;">
              ${c.phone?'<a href="tel:'+c.phone.replace(/\\s/g,'')+'" style="color:#1e293b;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap;" onclick="event.stopPropagation()">'+c.phone+'</a>':''}
              ${hasStr?'<span style="width:8px;height:8px;border-radius:50%;background:#3b82f6;flex-shrink:0;" title="Has strengths"></span>':''}
              <button style="background:none;border:1px solid #fecaca;border-radius:6px;padding:4px 10px;font-size:11px;color:#dc2626;cursor:pointer;" onclick="event.stopPropagation();deleteContact('${c.id}')">Del</button>
            </div>
          </div>
          ${linkedClients.length?'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;padding-left:2px;">'+linkedClients.map(cl=>'<span onclick="event.stopPropagation();goToClient(\''+cl.id+'\')" style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;background:#dcfce7;color:#15803d;cursor:pointer;" onmouseover="this.style.background=\'#bbf7d0\'" onmouseout="this.style.background=\'#dcfce7\'">'+cl.relationship_name+' ('+cl.role+')</span>').join('')+'</div>':''}
        </div>`;
      }).join('')}</div>`}
    </div>`;
  });
  document.getElementById('mlCards').innerHTML=html||'<div style="padding:20px;text-align:center;color:#94a3b8;">No contacts found.</div>';
}
window.filterMasterList=function(){renderMasterList();};

window.openContactModal=function(id){
  const c=id?contacts.find(x=>x.id===id):null;
  document.getElementById('contactModalTitle').textContent=c?'Edit Contact':'Add Contact';
  document.getElementById('contactId').value=c?c.id:'';
  document.getElementById('cFirst').value=c?c.first_name:'';
  document.getElementById('cLast').value=c?c.last_name:'';
  document.getElementById('cEmail').value=c?c.email:'';
  document.getElementById('cPhone').value=c?c.phone:'';
  document.getElementById('cType').value=c?c.contact_type:'Individual';
  document.getElementById('cNotes').value=c?c.notes:'';
  // Build 10 strength dropdowns
  const grid=document.getElementById('cStrengthsGrid');
  grid.innerHTML='';
  for(let i=1;i<=10;i++){
    const label=document.createElement('span');
    label.style.cssText='font-size:13px;font-weight:700;color:'+(i<=5?'#3b82f6':'#93c5fd')+';';
    label.textContent='#'+i;
    const sel=document.createElement('select');
    sel.id='cStr'+i;
    sel.style.cssText='padding:6px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;';
    sel.innerHTML=CS34.map(s=>'<option value="'+s+'"'+(c&&c['strength_'+i]===s?' selected':'')+'>'+( s||'-- Select --')+'</option>').join('');
    grid.appendChild(label);
    grid.appendChild(sel);
  }
  document.getElementById('contactModal').classList.add('open');
};

window.saveContact=async function(){
  const id=document.getElementById('contactId').value;
  const strengths=[];
  const data={
    first_name:document.getElementById('cFirst').value.trim(),
    last_name:document.getElementById('cLast').value.trim(),
    email:document.getElementById('cEmail').value.trim(),
    phone:document.getElementById('cPhone').value.trim(),
    contact_type:document.getElementById('cType').value,
    notes:document.getElementById('cNotes').value.trim()
  };
  for(let i=1;i<=10;i++){
    const v=document.getElementById('cStr'+i).value;
    data['strength_'+i]=v||null;
    if(v) strengths.push(v);
  }
  data.strengths=strengths.join(', ')||null;
  if(!data.first_name||!data.last_name){toast('First and last name required','error');return;}
  if(id){
    const {error}=await supabase.from('contacts').update(data).eq('id',id);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Contact updated','success');
  }else{
    const {error}=await supabase.from('contacts').insert(data);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Contact added','success');
  }
  closeModal('contactModal');
  await loadContacts();
  renderMasterList();
  renderDashboard();
};

window.deleteContact=async function(id){
  if(!confirm('Delete this contact?'))return;
  const {error}=await supabase.from('contacts').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Contact deleted','success');
  await loadContacts();
  renderMasterList();
  renderDashboard();
};

// ── CLIENTS ──
function getContactName(id){
  const c=contacts.find(x=>x.id===id);
  return c?c.first_name+' '+c.last_name:'Unknown';
}

function renderClientCard(c){
  const members=(c.members||[]).map(mid=>getContactName(mid));
  const borderColor=c.status==='Active'?'#16a34a':c.status==='On Hold'?'#eab308':'#94a3b8';
  return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid ${borderColor};border-radius:8px;padding:14px 16px;display:flex;gap:12px;align-items:center;">
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-weight:600;font-size:14px;color:#1e293b;">${c.relationship_name}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;${c.status==='Active'?'background:#dcfce7;color:#15803d;':c.status==='On Hold'?'background:#fef9c3;color:#a16207;':'background:#f1f5f9;color:#64748b;'}">${c.status}</span>
      </div>
      <div style="font-size:12px;color:#64748b;margin-top:4px;">${members.length?'Members: '+members.join(', '):''}</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:6px 12px;font-size:12px;color:#475569;cursor:pointer;" onclick="openClientModal('${c.id}')">Edit</button>
      <button style="background:none;border:1px solid #fecaca;border-radius:6px;padding:6px 12px;font-size:12px;color:#dc2626;cursor:pointer;" onclick="deleteClient('${c.id}')">Del</button>
    </div>
  </div>`;
}

const clientGroupState={Couple:true,Individual:true,Business:true,Organisation:true,Archived:true};
function toggleClientGroup(g){clientGroupState[g]=!clientGroupState[g];renderClients();}
window.toggleClientGroup=toggleClientGroup;

function renderClients(){
  const q=document.getElementById('clSearch').value.toLowerCase();
  const filtered=clients.filter(c=>(c.relationship_name+' '+c.role+' '+c.status+' '+c.practitioner).toLowerCase().includes(q));
  const groupOrder=['Couple','Individual','Business','Organisation'];
  const groupLabels={'Couple':'Couples','Individual':'Individuals','Business':'Business','Organisation':'Community','Other':'Other','Archived':'Archived'};
  // Separate active from archived (Completed)
  const active=filtered.filter(c=>c.status!=='Completed');
  const archived=filtered.filter(c=>c.status==='Completed');
  const grouped={};
  active.forEach(c=>{const g=c.role||'Other';if(!grouped[g])grouped[g]=[];grouped[g].push(c);});
  let html='';
  const renderGroup=(g,items,label)=>{
    if(!items||!items.length)return;
    const collapsed=clientGroupState[g]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    html+=`<div style="margin-bottom:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleClientGroup('${g}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;transition:transform .2s;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${label||groupLabels[g]||g}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${items.length}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:8px;padding:12px 12px;">${items.map(c=>renderClientCard(c)).join('')}</div>`}
    </div>`;
  };
  groupOrder.forEach(g=>{if(grouped[g])renderGroup(g,grouped[g]);delete grouped[g];});
  Object.keys(grouped).forEach(g=>renderGroup(g,grouped[g]));
  if(archived.length) renderGroup('Archived',archived,'Archived');
  document.getElementById('clCards').innerHTML=html||'<div style="padding:20px;text-align:center;color:#94a3b8;">No clients found.</div>';
}
window.filterClients=function(){renderClients();};

window.openClientModal=function(id){
  const c=id?clients.find(x=>x.id===id):null;
  document.getElementById('clientModalTitle').textContent=c?'Edit Client':'Add Client';
  document.getElementById('clientId').value=c?c.id:'';
  document.getElementById('clName').value=c?c.relationship_name:'';
  document.getElementById('clRole').value=c?c.role:'';
  document.getElementById('clStatus').value=c?c.status:'Active';
  document.getElementById('clPractitioner').value=c?c.practitioner:'Cath';
  document.getElementById('clNotes').value=c?c.notes:'';
  tempMembers=c?[...(c.members||[])]:[];
  renderMemberSelect();
  renderTempMembers();
  document.getElementById('clientModal').classList.add('open');
};

function renderMemberSelect(){
  document.getElementById('clMemberSelect').innerHTML='<option value="">-- Select contact --</option>'+
    contacts.map(c=>`<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('');
}

function renderTempMembers(){
  document.getElementById('clMembers').innerHTML=tempMembers.map(mid=>
    `<span class="member-tag">${getContactName(mid)} <span class="remove" onclick="removeTempMember('${mid}')">&times;</span></span>`
  ).join('');
}

window.addMemberToClient=function(){
  const sel=document.getElementById('clMemberSelect');
  const val=sel.value;
  if(!val||tempMembers.includes(val))return;
  tempMembers.push(val);
  sel.value='';
  renderTempMembers();
};

window.removeTempMember=function(mid){
  tempMembers=tempMembers.filter(m=>m!==mid);
  renderTempMembers();
};

window.saveClient=async function(){
  const id=document.getElementById('clientId').value;
  const data={
    relationship_name:document.getElementById('clName').value.trim(),
    role:document.getElementById('clRole').value.trim(),
    status:document.getElementById('clStatus').value,
    practitioner:document.getElementById('clPractitioner').value,
    notes:document.getElementById('clNotes').value.trim()
  };
  if(!data.relationship_name){toast('Client name required','error');return;}
  let clientId=id;
  if(id){
    const {error}=await supabase.from('clients').update(data).eq('id',id);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Client updated','success');
  }else{
    const {data:inserted,error}=await supabase.from('clients').insert(data).select();
    if(error){toast('Error: '+error.message,'error');return;}
    clientId=inserted[0].id;
    toast('Client added','success');
  }
  // Sync members
  await supabase.from('client_members').delete().eq('client_id',clientId);
  if(tempMembers.length){
    await supabase.from('client_members').insert(tempMembers.map(cid=>({client_id:clientId,contact_id:cid})));
  }
  closeModal('clientModal');
  await loadClients();
  renderClients();
  renderDashboard();
};

window.deleteClient=async function(id){
  if(!confirm('Delete this client?'))return;
  const {error}=await supabase.from('clients').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Client deleted','success');
  await loadClients();
  renderClients();
  renderDashboard();
};

// ── STRENGTHS HUB ──
function renderStrengths(){
  const q=document.getElementById('shSearch').value.toLowerCase();
  const filtered=contacts.filter(c=>{
    const hasStr=c.strength_1;
    const searchStr=(c.first_name+' '+c.last_name+' '+(c.strengths||'')).toLowerCase();
    return hasStr&&searchStr.includes(q);
  });
  let html=`<div style="border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
    <div style="padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px;">
      <span style="font-weight:700;font-size:14px;color:#1e293b;">Strengths Profiles</span>
      <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${filtered.length}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;padding:12px;">`;
  html+=filtered.map(c=>{
    const strengths=[];
    for(let i=1;i<=10;i++){if(c['strength_'+i])strengths.push({rank:i,name:c['strength_'+i]});}
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid #3b82f6;border-radius:8px;padding:14px 16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
        <span style="font-weight:600;font-size:14px;color:#1e293b;">${c.first_name} ${c.last_name}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;${c.contact_type==='Individual'?'background:#eff6ff;color:#2563eb;':c.contact_type==='Organisation'?'background:#dcfce7;color:#15803d;':'background:#fef9c3;color:#a16207;'}">${c.contact_type}</span>
        ${c.email?'<span style="font-size:12px;color:#64748b;">'+c.email+'</span>':''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">${strengths.map(s=>
        `<span style="background:${s.rank<=1?'#1d4ed8':s.rank<=3?'#3b82f6':s.rank<=5?'#60a5fa':'#93c5fd'};color:#fff;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;">#${s.rank} ${s.name}</span>`
      ).join('')}</div>
    </div>`;
  }).join('');
  html+='</div></div>';
  document.getElementById('shCards').innerHTML=filtered.length?html:'<div style="padding:20px;text-align:center;color:#94a3b8;">No contacts with strengths found.</div>';
}
window.filterStrengths=function(){renderStrengths();};

// ── THRIVEHQ ──
const thqGroupState={};
function toggleThqGroup(g){thqGroupState[g]=!thqGroupState[g];renderThriveHQ();}
window.toggleThqGroup=toggleThqGroup;

function renderThriveHQ(){
  const q=document.getElementById('thqSearch').value.toLowerCase();
  // Only show members from Community (Organisation) or client named ThriveHQ
  const thqClients=clients.filter(cl=>cl.role==='Organisation'||cl.relationship_name.toLowerCase().includes('thrivehq'));
  const memberMap={};
  thqClients.forEach(cl=>{
    (cl.members||[]).forEach(mid=>{
      if(!memberMap[mid])memberMap[mid]={contact:null,clients:[]};
      memberMap[mid].clients.push(cl);
    });
  });
  // Attach contact data
  Object.keys(memberMap).forEach(mid=>{
    memberMap[mid].contact=contacts.find(c=>c.id===mid);
  });
  // Filter
  let members=Object.values(memberMap).filter(m=>m.contact);
  if(q){
    members=members.filter(m=>{
      const c=m.contact;
      const searchStr=(c.first_name+' '+c.last_name+' '+(c.email||'')+' '+(c.strengths||'')+' '+m.clients.map(cl=>cl.relationship_name).join(' ')).toLowerCase();
      return searchStr.includes(q);
    });
  }

  // Summary stats
  const totalMembers=members.length;
  const withStrengths=members.filter(m=>m.contact.strength_1).length;
  const totalClients=thqClients.length;
  const activeClients=thqClients.filter(c=>c.status==='Active').length;

  let html=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px;">
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;border-top:3px solid #3b82f6;">
      <div style="font-size:28px;font-weight:700;color:#1e293b;">${totalMembers}</div>
      <div style="font-size:12px;color:#64748b;">Linked Members</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;border-top:3px solid #16a34a;">
      <div style="font-size:28px;font-weight:700;color:#1e293b;">${activeClients}</div>
      <div style="font-size:12px;color:#64748b;">Active Relationships</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;border-top:3px solid #8b5cf6;">
      <div style="font-size:28px;font-weight:700;color:#1e293b;">${withStrengths}</div>
      <div style="font-size:12px;color:#64748b;">Strengths Profiled</div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;border-top:3px solid #eab308;">
      <div style="font-size:28px;font-weight:700;color:#1e293b;">${totalMembers-withStrengths}</div>
      <div style="font-size:12px;color:#64748b;">Awaiting Profile</div>
    </div>
  </div>`;

  // Group members by their client relationship type
  const byRole={};
  members.forEach(m=>{
    m.clients.forEach(cl=>{
      const role=cl.role||'Other';
      if(!byRole[role])byRole[role]=[];
      if(!byRole[role].find(x=>x.contact.id===m.contact.id)){
        byRole[role].push(m);
      }
    });
  });

  const roleOrder=['Organisation'];
  const roleLabels={'Organisation':'Community','Other':'Other'};

  roleOrder.forEach(role=>{
    if(!byRole[role]||!byRole[role].length)return;
    const collapsed=thqGroupState[role]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    html+=`<div style="margin-bottom:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleThqGroup('${role}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${roleLabels[role]||role}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${byRole[role].length}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:8px;padding:12px;">${byRole[role].map(m=>{
        const c=m.contact;
        const strengths=[];
        for(let i=1;i<=5;i++){if(c['strength_'+i])strengths.push({rank:i,name:c['strength_'+i]});}
        const rels=m.clients.map(cl=>cl.relationship_name);
        return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid #3b82f6;border-radius:8px;padding:14px 16px;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
            <span style="font-weight:600;font-size:14px;color:#1e293b;">${c.first_name} ${c.last_name}</span>
            ${c.email?'<span style="font-size:12px;color:#64748b;">'+c.email+'</span>':''}
            ${c.phone?'<a href="tel:'+c.phone.replace(/\\s/g,'')+'" style="font-size:12px;color:#1e293b;text-decoration:none;font-weight:600;">'+c.phone+'</a>':''}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:${strengths.length?'8':'0'}px;">
            ${rels.map(r=>'<span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;background:#dcfce7;color:#15803d;">'+r+'</span>').join('')}
            ${c.contact_type?'<span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;background:#eff6ff;color:#2563eb;">'+c.contact_type+'</span>':''}
          </div>
          ${strengths.length?'<div style="display:flex;flex-wrap:wrap;gap:4px;">'+strengths.map(s=>'<span style="background:'+(s.rank<=1?'#1d4ed8':s.rank<=3?'#3b82f6':'#60a5fa')+';color:#fff;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;">#'+s.rank+' '+s.name+'</span>').join('')+'</div>':'<div style="font-size:11px;color:#94a3b8;">No strengths profile</div>'}
        </div>`;
      }).join('')}</div>`}
    </div>`;
    delete byRole[role];
  });

  // Any remaining roles
  Object.keys(byRole).forEach(role=>{
    if(!byRole[role].length)return;
    const collapsed=thqGroupState[role]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    html+=`<div style="margin-bottom:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleThqGroup('${role}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${roleLabels[role]||role}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${byRole[role].length}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:8px;padding:12px;">${byRole[role].map(m=>{
        const c=m.contact;
        const strengths=[];
        for(let i=1;i<=5;i++){if(c['strength_'+i])strengths.push({rank:i,name:c['strength_'+i]});}
        const rels=m.clients.map(cl=>cl.relationship_name);
        return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid #3b82f6;border-radius:8px;padding:14px 16px;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
            <span style="font-weight:600;font-size:14px;color:#1e293b;">${c.first_name} ${c.last_name}</span>
            ${c.email?'<span style="font-size:12px;color:#64748b;">'+c.email+'</span>':''}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:${strengths.length?'8':'0'}px;">
            ${rels.map(r=>'<span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;background:#dcfce7;color:#15803d;">'+r+'</span>').join('')}
          </div>
          ${strengths.length?'<div style="display:flex;flex-wrap:wrap;gap:4px;">'+strengths.map(s=>'<span style="background:'+(s.rank<=1?'#1d4ed8':s.rank<=3?'#3b82f6':'#60a5fa')+';color:#fff;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;">#'+s.rank+' '+s.name+'</span>').join('')+'</div>':'<div style="font-size:11px;color:#94a3b8;">No strengths profile</div>'}
        </div>`;
      }).join('')}</div>`}
    </div>`;
  });

  if(!members.length) html+='<div style="padding:20px;text-align:center;color:#94a3b8;">No linked members found. Link contacts to clients on the Clients page.</div>';

  document.getElementById('thqContent').innerHTML=html;
}
window.filterThriveHQ=function(){renderThriveHQ();};

// ── TASKS ──
const tkGroupState={};
function toggleTkGroup(g){tkGroupState[g]=!tkGroupState[g];renderTasks();}
window.toggleTkGroup=toggleTkGroup;

function renderTaskCard(t){
  const overdue=t.due_date&&t.status!=='Done'&&new Date(t.due_date)<new Date();
  const borderColor=overdue?'#ef4444':t.priority==='High'?'#eab308':t.priority==='Medium'?'#3b82f6':'#94a3b8';
  return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid ${borderColor};border-radius:8px;padding:14px 16px;display:flex;gap:12px;align-items:center;">
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-weight:600;font-size:14px;color:#1e293b;${t.status==='Done'?'text-decoration:line-through;color:#94a3b8;':''}">${t.title}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;${t.priority==='High'?'background:#fef2f2;color:#dc2626;':t.priority==='Medium'?'background:#fef9c3;color:#a16207;':'background:#f1f5f9;color:#64748b;'}">${t.priority}</span>
      </div>
      <div style="font-size:12px;color:#64748b;margin-top:4px;">${t.owner}${t.due_date?' &middot; Due: <strong style="color:'+(overdue?'#ef4444':'#1e293b')+';">'+t.due_date+'</strong>':''}${t.description?' &middot; '+t.description:''}</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:6px 12px;font-size:12px;color:#475569;cursor:pointer;" onclick="openTaskModal('${t.id}')">Edit</button>
      ${t.status!=='Done'?'<button style="background:none;border:1px solid #bbf7d0;border-radius:6px;padding:6px 12px;font-size:12px;color:#16a34a;cursor:pointer;" onclick="completeTask(\''+t.id+'\')">Done</button>':''}
      <button style="background:none;border:1px solid #fecaca;border-radius:6px;padding:6px 12px;font-size:12px;color:#dc2626;cursor:pointer;" onclick="deleteTask('${t.id}')">Del</button>
    </div>
  </div>`;
}

function renderTasks(){
  const q=document.getElementById('tkSearch').value.toLowerCase();
  const fs=document.getElementById('tkFilterStatus').value;
  const fp=document.getElementById('tkFilterPriority').value;
  const filtered=tasks.filter(t=>{
    if(fs&&t.status!==fs)return false;
    if(fp&&t.priority!==fp)return false;
    return(t.title+' '+t.owner+' '+t.description).toLowerCase().includes(q);
  });
  const statusOrder=['To Do','In Progress','Done'];
  const grouped={};
  filtered.forEach(t=>{const s=t.status||'To Do';if(!grouped[s])grouped[s]=[];grouped[s].push(t);});
  let html='';
  statusOrder.forEach(s=>{
    if(!grouped[s]||!grouped[s].length)return;
    const collapsed=tkGroupState[s]||false;
    const arrow=collapsed?'&#9654;':'&#9660;';
    html+=`<div style="margin-bottom:12px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
      <div onclick="toggleTkGroup('${s}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:${collapsed?'none':'1px solid #e2e8f0'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:#94a3b8;">${arrow}</span>
          <span style="font-weight:700;font-size:14px;color:#1e293b;">${s}</span>
          <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${grouped[s].length}</span>
        </div>
      </div>
      ${collapsed?'':`<div style="display:flex;flex-direction:column;gap:8px;padding:12px;">${grouped[s].map(t=>renderTaskCard(t)).join('')}</div>`}
    </div>`;
  });
  document.getElementById('tkCards').innerHTML=html||'<div style="padding:20px;text-align:center;color:#94a3b8;">No tasks found.</div>';
}
window.filterTasks=function(){renderTasks();};

window.openTaskModal=function(id){
  const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('taskModalTitle').textContent=t?'Edit Task':'Add Task';
  document.getElementById('taskId').value=t?t.id:'';
  document.getElementById('tkTitle').value=t?t.title:'';
  document.getElementById('tkDesc').value=t?t.description:'';
  document.getElementById('tkOwner').value=t?t.owner:'Cath';
  document.getElementById('tkPriority').value=t?t.priority:'Medium';
  document.getElementById('tkStatus').value=t?t.status:'To Do';
  document.getElementById('tkDue').value=t?t.due_date:'';
  document.getElementById('taskModal').classList.add('open');
};

window.saveTask=async function(){
  const id=document.getElementById('taskId').value;
  const data={title:document.getElementById('tkTitle').value.trim(),description:document.getElementById('tkDesc').value.trim(),owner:document.getElementById('tkOwner').value,priority:document.getElementById('tkPriority').value,status:document.getElementById('tkStatus').value,due_date:document.getElementById('tkDue').value||null};
  if(!data.title){toast('Task title required','error');return;}
  if(id){
    const {error}=await supabase.from('tasks').update(data).eq('id',id);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Task updated','success');
  }else{
    const {error}=await supabase.from('tasks').insert(data);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Task added','success');
  }
  closeModal('taskModal');await loadTasks();renderTasks();
};

window.completeTask=async function(id){
  const {error}=await supabase.from('tasks').update({status:'Done'}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Task completed','success');await loadTasks();renderTasks();
};

window.deleteTask=async function(id){
  if(!confirm('Delete this task?'))return;
  const {error}=await supabase.from('tasks').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Task deleted','success');await loadTasks();renderTasks();
};

// ── REFERRALS ──
function renderReferrals(){
  const q=document.getElementById('refSearch').value.toLowerCase();
  const filtered=referrals.filter(r=>(r.name+' '+r.organisation+' '+r.email).toLowerCase().includes(q));
  let html=`<div style="border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden;">
    <div style="padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px;">
      <span style="font-weight:700;font-size:14px;color:#1e293b;">Referrers</span>
      <span style="background:#f1f5f9;color:#64748b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;">${filtered.length}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;padding:12px;">`;
  html+=filtered.map(r=>`<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid #3b82f6;border-radius:8px;padding:14px 16px;display:flex;gap:12px;align-items:center;">
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-weight:600;font-size:14px;color:#1e293b;">${r.name}</span>
        ${r.organisation?'<span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;background:#eff6ff;color:#2563eb;">'+r.organisation+'</span>':''}
      </div>
      <div style="font-size:12px;color:#64748b;margin-top:4px;">
        ${r.email?'<a href="mailto:'+r.email+'" style="color:#3b82f6;text-decoration:none;">'+r.email+'</a>':''}
        ${r.email&&r.phone?' &middot; ':''}
        ${r.phone?'<a href="tel:'+r.phone.replace(/\\s/g,'')+'" style="color:#1e293b;text-decoration:none;font-weight:600;">'+r.phone+'</a>':''}
        ${r.notes?' &middot; '+r.notes:''}
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:6px 12px;font-size:12px;color:#475569;cursor:pointer;" onclick="openReferralModal('${r.id}')">Edit</button>
      <button style="background:none;border:1px solid #fecaca;border-radius:6px;padding:6px 12px;font-size:12px;color:#dc2626;cursor:pointer;" onclick="deleteReferral('${r.id}')">Del</button>
    </div>
  </div>`).join('');
  html+='</div></div>';
  document.getElementById('refCards').innerHTML=filtered.length?html:'<div style="padding:20px;text-align:center;color:#94a3b8;">No referrers found.</div>';
}
window.filterReferrals=function(){renderReferrals();};

window.openReferralModal=function(id){
  const r=id?referrals.find(x=>x.id===id):null;
  document.getElementById('referralModalTitle').textContent=r?'Edit Referrer':'Add Referrer';
  document.getElementById('refId').value=r?r.id:'';
  document.getElementById('refName').value=r?r.name:'';
  document.getElementById('refOrg').value=r?r.organisation:'';
  document.getElementById('refEmail').value=r?r.email:'';
  document.getElementById('refPhone').value=r?r.phone:'';
  document.getElementById('refNotes').value=r?r.notes:'';
  document.getElementById('referralModal').classList.add('open');
};

window.saveReferral=function(){
  const id=document.getElementById('refId').value;
  const data={name:document.getElementById('refName').value.trim(),organisation:document.getElementById('refOrg').value.trim(),email:document.getElementById('refEmail').value.trim(),phone:document.getElementById('refPhone').value.trim(),notes:document.getElementById('refNotes').value.trim()};
  if(!data.name){toast('Referrer name required','error');return;}
  if(id){Object.assign(referrals.find(x=>x.id===id),data);toast('Referrer updated','success');}
  else{data.id=String(nextRefId++);referrals.push(data);toast('Referrer added','success');}
  closeModal('referralModal');renderReferrals();
};

window.deleteReferral=function(id){
  if(!confirm('Delete this referrer?'))return;
  referrals=referrals.filter(r=>r.id!==id);toast('Referrer deleted','success');renderReferrals();
};

// ── IT PROJECTS ──
const itGroupState={};
function toggleItGroup(g){itGroupState[g]=!itGroupState[g];renderITProjects();}
window.toggleItGroup=toggleItGroup;

function renderITProjects(){
  const q=document.getElementById('itSearch').value.toLowerCase();
  const filtered=itprojects.filter(p=>(p.name+' '+p.owner+' '+p.status).toLowerCase().includes(q));
  const statusOrder=['In Progress','Planning','On Hold','Completed'];
  const grouped={};
  filtered.forEach(p=>{const s=p.status||'Planning';if(!grouped[s])grouped[s]=[];grouped[s].push(p);});

          <span style="font-size:12px;color:#94a3b8;">${arrow}</span>

      </div>

        const borderColor=p.status==='Completed'?'#16a34a':p.status==='In Progress'?'#3b82f6':p.status==='On Hold'?'#eab308':'#94a3b8';
        return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid ${borderColor};border-radius:8px;padding:14px 16px;display:flex;gap:12px;align-items:center;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-weight:600;font-size:14px;color:#1e293b;">${p.name}</span>
              <span style="font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;${p.status==='Completed'?'background:#dcfce7;color:#15803d;':p.status==='In Progress'?'background:#eff6ff;color:#2563eb;':p.status==='On Hold'?'background:#fef9c3;color:#a16207;':'background:#f1f5f9;color:#64748b;'}">${p.status}</span>
            </div>
            <div style="font-size:12px;color:#64748b;margin-top:4px;">${p.owner}${p.notes?' &middot; '+p.notes:''}</div>

            <button style="background:none;border:1px solid #fecaca;border-radius:6px;padding:6px 12px;font-size:12px;color:#dc2626;cursor:pointer;" onclick="deleteITProject('${p.id}')">Del</button>
          </div>
        </div>`;
      }).join('')}</div>`}
    </div>`;
  });
  document.getElementById('itCards').innerHTML=html||'<div style="padding:20px;text-align:center;color:#94a3b8;">No projects found.</div>';
}
window.filterITProjects=function(){renderITProjects();};

window.openITModal=function(id){
  const p=id?itprojects.find(x=>x.id===id):null;
  document.getElementById('itModalTitle').textContent=p?'Edit Project':'Add Project';
  document.getElementById('itId').value=p?p.id:'';
  document.getElementById('itName').value=p?p.name:'';
  document.getElementById('itStatus').value=p?p.status:'Planning';
  document.getElementById('itOwner').value=p?p.owner:'Cath';
  document.getElementById('itNotes').value=p?p.notes:'';
  document.getElementById('itModal').classList.add('open');
};

window.saveITProject=function(){
  const id=document.getElementById('itId').value;
  const data={name:document.getElementById('itName').value.trim(),status:document.getElementById('itStatus').value,owner:document.getElementById('itOwner').value,notes:document.getElementById('itNotes').value.trim()};
  if(!data.name){toast('Project name required','error');return;}
  if(id){Object.assign(itprojects.find(x=>x.id===id),data);toast('Project updated','success');}
  else{data.id=String(nextITId++);itprojects.push(data);toast('Project added','success');}
  closeModal('itModal');renderITProjects();
};

window.deleteITProject=function(id){
  if(!confirm('Delete this project?'))return;
  itprojects=itprojects.filter(p=>p.id!==id);toast('Project deleted','success');renderITProjects();
};

// ── BOOT ──
loadAll();

if(window.innerWidth<=768) document.getElementById('mobileToggle').style.display='inline-block';
window.addEventListener('resize',()=>{
  document.getElementById('mobileToggle').style.display=window.innerWidth<=768?'inline-block':'none';
});

})();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
