<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach4U CRM</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Coach4U">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f6ff;color:#1e293b;min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{width:240px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
.sidebar-logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e2e8f0;}
.sidebar-logo img{width:40px;height:40px;border-radius:8px;}
.sidebar-logo span{font-size:18px;font-weight:700;color:#3b82f6;}
.nav-section{padding:16px 12px 8px;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;font-size:14px;color:#475569;cursor:pointer;border-radius:8px;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:all .15s;font-family:inherit;}
.nav-item:hover{background:#eff6ff;color:#3b82f6;}
.nav-item.active{background:#3b82f6;color:#fff;}
.nav-item .icon{width:20px;text-align:center;font-size:16px;}
.nav-group-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;margin:2px 8px;font-size:14px;color:#475569;cursor:pointer;border-radius:8px;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:all .15s;font-family:inherit;}
.nav-group-btn:hover{background:#eff6ff;color:#3b82f6;}
.nav-group-btn .arrow{font-size:10px;transition:transform .2s;}
.nav-group-btn.open .arrow{transform:rotate(90deg);}
.nav-group-items{display:none;padding-left:20px;}
.nav-group-items.open{display:block;}
.sidebar-footer{margin-top:auto;padding:16px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;}

/* ── MAIN AREA ── */
.main{margin-left:240px;flex:1;min-height:100vh;}

/* ── HEADER ── */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.header h2{font-size:20px;font-weight:700;color:#1e293b;}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#64748b;}

/* ── CONTENT ── */
.content{padding:24px 28px;}
.screen{display:none;}
.screen.active{display:block;}

/* ── DASHBOARD ── */
.dash-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px;}
.dash-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;display:flex;align-items:center;gap:14px;}
.dash-card .dc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.dc-icon.blue{background:#eff6ff;color:#3b82f6;}
.dc-icon.green{background:#f0fdf4;color:#16a34a;}
.dc-icon.amber{background:#fefce8;color:#ca8a04;}
.dash-card .dc-info h4{font-size:24px;font-weight:700;color:#1e293b;line-height:1.2;}
.dash-card .dc-info p{font-size:12px;color:#94a3b8;}
.dash-section{margin-bottom:24px;}
.dash-section h3{font-size:16px;font-weight:600;margin-bottom:12px;color:#1e293b;}
.recent-list{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;}
.recent-item{padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;font-size:14px;}
.recent-item:last-child{border-bottom:none;}
.recent-item:hover{background:#f8fafc;}
.recent-item .ri-name{font-weight:600;}
.recent-item .ri-meta{font-size:12px;color:#94a3b8;}

/* ── SEARCH BAR ── */
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.search-input{padding:8px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;width:280px;max-width:100%;background:#fff;}
.search-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-blue{background:#3b82f6;color:#fff;}.btn-blue:hover{background:#2563eb;}
.btn-green{background:#16a34a;color:#fff;}.btn-green:hover{background:#15803d;}
.btn-red{background:#ef4444;color:#fff;}.btn-red:hover{background:#dc2626;}
.btn-gray{background:#f1f5f9;color:#1e293b;border:1px solid #e2e8f0;}.btn-gray:hover{background:#e2e8f0;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;}
th{background:#f8fafc;text-align:left;padding:12px 16px;font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f1f5f9;}
tr:hover td{background:#f8fafc;}
td .actions{display:flex;gap:6px;}
td .actions button{padding:4px 10px;font-size:12px;}

/* ── BADGES ── */
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;display:inline-block;}
.badge-green{background:#f0fdf4;color:#16a34a;}
.badge-amber{background:#fefce8;color:#ca8a04;}
.badge-red{background:#fef2f2;color:#ef4444;}
.badge-blue{background:#eff6ff;color:#2563eb;}
.badge-gray{background:#f1f5f9;color:#64748b;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;padding:28px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:#64748b;margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.form-group textarea{height:80px;resize:vertical;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
.toast.success{background:#16a34a;}
.toast.error{background:#ef4444;}

/* ── LINKED MEMBERS ── */
.member-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.member-tag{background:#eff6ff;color:#2563eb;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.member-tag .remove{cursor:pointer;font-weight:700;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .sidebar.mobile-open{display:flex;width:260px;z-index:60;}
  .main{margin-left:0;}
  .mobile-toggle{display:block!important;}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:55;}
  .mobile-overlay.show{display:block;}
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){

// ── SUPABASE ──
const SUPABASE_URL = 'https://uoixetfvboevjxlkfyqy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── DATA ──
let contacts = [];
let clients = [];
let tasks = [];
let referrals = [];
let itprojects = [];
let tempMembers = [];

// ── LOAD FROM SUPABASE ──
async function loadContacts(){
  const {data,error} = await supabase.from('contacts').select('*').order('first_name');
  if(data) contacts = data;
  if(error) console.error('Load contacts error:', error);
}
async function loadClients(){
  const {data,error} = await supabase.from('clients').select('*').order('relationship_name');
  if(data){
    // Load members for each client
    for(let c of data){
      const {data:members} = await supabase.from('client_members').select('contact_id').eq('client_id', c.id);
      c.members = members ? members.map(m=>m.contact_id) : [];
    }
    clients = data;
  }
  if(error) console.error('Load clients error:', error);
}
async function loadTasks(){
  const {data,error} = await supabase.from('tasks').select('*').order('created_at',{ascending:false});
  if(data) tasks = data;
  if(error) console.error('Load tasks error:', error);
}

async function loadAll(){
  await Promise.all([loadContacts(), loadClients(), loadTasks()]);
  renderDashboard();
}

// ── DATE DISPLAY ──
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ── NAVIGATION ──
window.navTo = function(tab,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const titles={dashboard:'Dashboard',masterlist:'Master List',clients:'Clients',strengths:'Strengths Hub',tasks:'Task Management',referrals:'Referral Hub',itprojects:'IT Projects'};
  document.getElementById('pageTitle').textContent=titles[tab]||'Coach4U';
  if(tab==='dashboard'){loadAll();}
  if(tab==='masterlist'){loadContacts().then(()=>renderMasterList());}
  if(tab==='clients'){Promise.all([loadContacts(),loadClients()]).then(()=>renderClients());}
  if(tab==='strengths'){loadContacts().then(()=>renderStrengths());}
  if(tab==='tasks'){loadTasks().then(()=>renderTasks());}
  if(tab==='referrals') renderReferrals();
  if(tab==='itprojects') renderITProjects();
  closeMobile();
};

// ── SIDEBAR DROPDOWN ──
window.toggleGroup = function(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
};

// ── MOBILE NAV ──
window.openMobile = function(){
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('mobileOverlay').classList.add('show');
};
window.closeMobile = function(){
  document.getElementById('sidebar').classList.remove('mobile-open');

// ── TOAST ──
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── MODAL ──
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};

// ── DASHBOARD ──
function renderDashboard(){
  document.getElementById('dcContacts').textContent=contacts.length;
  document.getElementById('dcClients').textContent=clients.filter(c=>c.status==='Active').length;
  document.getElementById('dcOnHold').textContent=clients.filter(c=>c.status==='On Hold').length;
  document.getElementById('recentClients').innerHTML=clients.slice(0,5).map(c=>
    `<div class="recent-item"><div><span class="ri-name">${c.relationship_name}</span></div><div><span class="badge badge-${c.status==='Active'?'green':c.status==='On Hold'?'amber':'gray'}">${c.status}</span> <span class="ri-meta">${c.practitioner}</span></div></div>`
  ).join('');
  document.getElementById('recentContacts').innerHTML=contacts.slice(0,5).map(c=>
    `<div class="recent-item"><div><span class="ri-name">${c.first_name} ${c.last_name}</span> <span class="ri-meta">${c.email}</span></div><span class="badge badge-${c.contact_type==='Individual'?'blue':c.contact_type==='Organisation'?'green':'amber'}">${c.contact_type}</span></div>`
  ).join('');
}

// ── MASTER LIST ──
function renderMasterList(){
  const q=document.getElementById('mlSearch').value.toLowerCase();
  const filtered=contacts.filter(c=>(c.first_name+' '+c.last_name+' '+c.email+' '+c.contact_type+' '+c.strengths).toLowerCase().includes(q));
  document.getElementById('mlCards').innerHTML=filtered.map(c=>{
    const initials=(c.first_name[0]||'')+(c.last_name[0]||'');
    const strengths=(c.strengths||'').split(',').map(s=>s.trim()).filter(Boolean);
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:42px;height:42px;border-radius:50%;background:#3b82f6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;">${initials}</div>
          <div>
            <div style="font-weight:700;font-size:15px;">${c.first_name} ${c.last_name}</div>
            <span class="badge badge-${c.contact_type==='Individual'?'blue':c.contact_type==='Organisation'?'green':'amber'}" style="margin-top:2px;">${c.contact_type}</span>
          </div>
        </div>
        <div class="actions"><button class="btn btn-gray" onclick="openContactModal('${c.id}')">Edit</button><button class="btn btn-red" onclick="deleteContact('${c.id}')">Del</button></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">
        ${c.email?'<div style="font-size:13px;"><a href="mailto:'+c.email+'" style="color:#3b82f6;text-decoration:none;">'+c.email+'</a></div>':''}
        ${c.phone?'<div style="font-size:14px;font-weight:600;"><a href="tel:'+c.phone.replace(/\\s/g,'')+'" style="color:#1e293b;text-decoration:none;letter-spacing:.3px;">'+c.phone+'</a></div>':''}
      </div>
      ${strengths.length?'<div style="display:flex;flex-wrap:wrap;gap:4px;">'+strengths.map((s,i)=>'<span style="background:'+(i===0?'#3b82f6':i<3?'#60a5fa':'#93c5fd')+';color:#fff;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;">'+s+'</span>').join('')+'</div>':''}
    </div>`;
  }).join('')||'<div style="padding:20px;text-align:center;color:#94a3b8;">No contacts found.</div>';
}
window.filterMasterList=function(){renderMasterList();};

window.openContactModal=function(id){
  const c=id?contacts.find(x=>x.id===id):null;
  document.getElementById('contactModalTitle').textContent=c?'Edit Contact':'Add Contact';
  document.getElementById('contactId').value=c?c.id:'';
  document.getElementById('cFirst').value=c?c.first_name:'';
  document.getElementById('cLast').value=c?c.last_name:'';
  document.getElementById('cEmail').value=c?c.email:'';
  document.getElementById('cPhone').value=c?c.phone:'';
  document.getElementById('cType').value=c?c.contact_type:'Individual';
  document.getElementById('cStrengths').value=c?c.strengths:'';
  document.getElementById('cNotes').value=c?c.notes:'';
  document.getElementById('contactModal').classList.add('open');
};

window.saveContact=async function(){
  const id=document.getElementById('contactId').value;
  const data={
    first_name:document.getElementById('cFirst').value.trim(),
    last_name:document.getElementById('cLast').value.trim(),
    email:document.getElementById('cEmail').value.trim(),
    phone:document.getElementById('cPhone').value.trim(),
    contact_type:document.getElementById('cType').value,
    strengths:document.getElementById('cStrengths').value.trim(),
    notes:document.getElementById('cNotes').value.trim()
  };
  if(!data.first_name||!data.last_name){toast('First and last name required','error');return;}
  if(id){
    const {error}=await supabase.from('contacts').update(data).eq('id',id);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Contact updated','success');
  }else{
    const {error}=await supabase.from('contacts').insert(data);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Contact added','success');
  }
  closeModal('contactModal');
  await loadContacts();
  renderMasterList();
  renderDashboard();
};

window.deleteContact=async function(id){
  if(!confirm('Delete this contact?'))return;
  const {error}=await supabase.from('contacts').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Contact deleted','success');
  await loadContacts();
  renderMasterList();
  renderDashboard();
};

// ── CLIENTS ──
function getContactName(id){
  const c=contacts.find(x=>x.id===id);
  return c?c.first_name+' '+c.last_name:'Unknown';
}

function renderClients(){
  const q=document.getElementById('clSearch').value.toLowerCase();
  const filtered=clients.filter(c=>(c.relationship_name+' '+c.role+' '+c.status+' '+c.practitioner).toLowerCase().includes(q));
  document.getElementById('clCards').innerHTML=filtered.map(c=>{
    const members=(c.members||[]).map(mid=>getContactName(mid));
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div>
          <div style="font-weight:700;font-size:16px;margin-bottom:4px;">${c.relationship_name}</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <span class="badge badge-${c.status==='Active'?'green':c.status==='On Hold'?'amber':'gray'}">${c.status}</span>
            ${c.role?'<span style="font-size:12px;color:#64748b;">'+c.role+'</span>':''}
          </div>
        </div>
        <div class="actions"><button class="btn btn-gray" onclick="openClientModal('${c.id}')">Edit</button><button class="btn btn-red" onclick="deleteClient('${c.id}')">Del</button></div>
      </div>
      <div style="font-size:13px;color:#64748b;margin-bottom:8px;">Practitioner: <strong style="color:#1e293b;">${c.practitioner}</strong></div>
      ${members.length?'<div style="font-size:12px;color:#64748b;margin-bottom:4px;">Members:</div><div style="display:flex;flex-wrap:wrap;gap:4px;">'+members.map(m=>'<span class="member-tag">'+m+'</span>').join('')+'</div>':'<div style="font-size:12px;color:#94a3b8;">No members linked</div>'}
    </div>`;
  }).join('')||'<div style="padding:20px;text-align:center;color:#94a3b8;">No clients found.</div>';
}
window.filterClients=function(){renderClients();};

window.openClientModal=function(id){
  const c=id?clients.find(x=>x.id===id):null;
  document.getElementById('clientModalTitle').textContent=c?'Edit Client':'Add Client';
  document.getElementById('clientId').value=c?c.id:'';
  document.getElementById('clName').value=c?c.relationship_name:'';
  document.getElementById('clRole').value=c?c.role:'';
  document.getElementById('clStatus').value=c?c.status:'Active';
  document.getElementById('clPractitioner').value=c?c.practitioner:'Cath';
  document.getElementById('clNotes').value=c?c.notes:'';
  tempMembers=c?[...(c.members||[])]:[];
  renderMemberSelect();
  renderTempMembers();
  document.getElementById('clientModal').classList.add('open');
};

function renderMemberSelect(){
  document.getElementById('clMemberSelect').innerHTML='<option value="">-- Select contact --</option>'+
    contacts.map(c=>`<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('');
}

function renderTempMembers(){
  document.getElementById('clMembers').innerHTML=tempMembers.map(mid=>
    `<span class="member-tag">${getContactName(mid)} <span class="remove" onclick="removeTempMember('${mid}')">&times;</span></span>`
  ).join('');
}

window.addMemberToClient=function(){
  const sel=document.getElementById('clMemberSelect');
  const val=sel.value;
  if(!val||tempMembers.includes(val))return;
  tempMembers.push(val);
  sel.value='';
  renderTempMembers();
};

window.removeTempMember=function(mid){
  tempMembers=tempMembers.filter(m=>m!==mid);
  renderTempMembers();
};

window.saveClient=async function(){
  const id=document.getElementById('clientId').value;
  const data={
    relationship_name:document.getElementById('clName').value.trim(),
    role:document.getElementById('clRole').value.trim(),
    status:document.getElementById('clStatus').value,
    practitioner:document.getElementById('clPractitioner').value,
    notes:document.getElementById('clNotes').value.trim()
  };
  if(!data.relationship_name){toast('Client name required','error');return;}
  let clientId=id;
  if(id){
    const {error}=await supabase.from('clients').update(data).eq('id',id);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Client updated','success');
  }else{
    const {data:inserted,error}=await supabase.from('clients').insert(data).select();
    if(error){toast('Error: '+error.message,'error');return;}
    clientId=inserted[0].id;
    toast('Client added','success');
  }
  // Sync members
  await supabase.from('client_members').delete().eq('client_id',clientId);
  if(tempMembers.length){
    await supabase.from('client_members').insert(tempMembers.map(cid=>({client_id:clientId,contact_id:cid})));
  }
  closeModal('clientModal');
  await loadClients();
  renderClients();
  renderDashboard();
};

window.deleteClient=async function(id){
  if(!confirm('Delete this client?'))return;
  const {error}=await supabase.from('clients').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Client deleted','success');
  await loadClients();
  renderClients();
  renderDashboard();
};

// ── STRENGTHS HUB ──
function renderStrengths(){
  const q=document.getElementById('shSearch').value.toLowerCase();
  const filtered=contacts.filter(c=>c.strengths&&(c.first_name+' '+c.last_name+' '+c.strengths).toLowerCase().includes(q));
  document.getElementById('shCards').innerHTML=filtered.map(c=>{
    const strengths=(c.strengths||'').split(',').map(s=>s.trim()).filter(Boolean);
    return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <strong style="font-size:16px;">${c.first_name} ${c.last_name}</strong>
        <span class="badge badge-${c.contact_type==='Individual'?'blue':c.contact_type==='Organisation'?'green':'amber'}">${c.contact_type}</span>
      </div>
      <div style="font-size:12px;color:#64748b;margin-bottom:10px;">${c.email||''}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">${strengths.map((s,i)=>
        `<span style="background:${i===0?'#3b82f6':i<3?'#60a5fa':'#93c5fd'};color:#fff;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;">${s}</span>`
      ).join('')}</div>
    </div>`;
  }).join('')||'<div style="padding:20px;text-align:center;color:#94a3b8;">No contacts with strengths found.</div>';
}
window.filterStrengths=function(){renderStrengths();};

// ── TASKS ──
function renderTasks(){
  const q=document.getElementById('tkSearch').value.toLowerCase();
  const fs=document.getElementById('tkFilterStatus').value;
  const fp=document.getElementById('tkFilterPriority').value;
  const filtered=tasks.filter(t=>{
    if(fs&&t.status!==fs)return false;
    if(fp&&t.priority!==fp)return false;
    return(t.title+' '+t.owner+' '+t.description).toLowerCase().includes(q);
  });
  document.getElementById('tkCards').innerHTML=filtered.map(t=>{
    const overdue=t.due_date&&t.status!=='Done'&&new Date(t.due_date)<new Date();
    return `<div style="background:#fff;border:1px solid ${overdue?'#fca5a5':'#e2e8f0'};border-radius:10px;padding:20px;${overdue?'border-left:4px solid #ef4444;':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div style="font-weight:700;font-size:15px;${t.status==='Done'?'text-decoration:line-through;color:#94a3b8;':''}">${t.title}</div>
        <div class="actions"><button class="btn btn-gray" onclick="openTaskModal('${t.id}')">Edit</button>${t.status!=='Done'?'<button class="btn btn-green" onclick="completeTask(\''+t.id+'\')">Done</button>':''}<button class="btn btn-red" onclick="deleteTask('${t.id}')">Del</button></div>
      </div>
      ${t.description?'<div style="font-size:13px;color:#64748b;margin-bottom:8px;">'+t.description+'</div>':''}
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <span class="badge badge-${t.priority==='High'?'red':t.priority==='Medium'?'amber':'gray'}">${t.priority}</span>
        <span class="badge badge-${t.status==='Done'?'green':t.status==='In Progress'?'blue':'gray'}">${t.status}</span>
        <span style="font-size:12px;color:#64748b;">${t.owner}</span>
        ${t.due_date?'<span style="font-size:12px;font-weight:600;color:'+(overdue?'#ef4444':'#1e293b')+';">Due: '+t.due_date+'</span>':''}
      </div>
    </div>`;
  }).join('')||'<div style="padding:20px;text-align:center;color:#94a3b8;">No tasks found.</div>';
}
window.filterTasks=function(){renderTasks();};

window.openTaskModal=function(id){
  const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('taskModalTitle').textContent=t?'Edit Task':'Add Task';
  document.getElementById('taskId').value=t?t.id:'';
  document.getElementById('tkTitle').value=t?t.title:'';
  document.getElementById('tkDesc').value=t?t.description:'';
  document.getElementById('tkOwner').value=t?t.owner:'Cath';
  document.getElementById('tkPriority').value=t?t.priority:'Medium';
  document.getElementById('tkStatus').value=t?t.status:'To Do';
  document.getElementById('tkDue').value=t?t.due_date:'';
  document.getElementById('taskModal').classList.add('open');
};

window.saveTask=async function(){
  const id=document.getElementById('taskId').value;
  const data={title:document.getElementById('tkTitle').value.trim(),description:document.getElementById('tkDesc').value.trim(),owner:document.getElementById('tkOwner').value,priority:document.getElementById('tkPriority').value,status:document.getElementById('tkStatus').value,due_date:document.getElementById('tkDue').value||null};
  if(!data.title){toast('Task title required','error');return;}
  if(id){
    const {error}=await supabase.from('tasks').update(data).eq('id',id);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Task updated','success');
  }else{
    const {error}=await supabase.from('tasks').insert(data);
    if(error){toast('Error: '+error.message,'error');return;}
    toast('Task added','success');
  }
  closeModal('taskModal');await loadTasks();renderTasks();
};

window.completeTask=async function(id){
  const {error}=await supabase.from('tasks').update({status:'Done'}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Task completed','success');await loadTasks();renderTasks();
};

window.deleteTask=async function(id){
  if(!confirm('Delete this task?'))return;
  const {error}=await supabase.from('tasks').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Task deleted','success');await loadTasks();renderTasks();
};

// ── REFERRALS ──

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
      <div>
        <div style="font-weight:700;font-size:16px;">${r.name}</div>
        ${r.organisation?'<div style="font-size:13px;color:#64748b;">'+r.organisation+'</div>':''}
      </div>
      <div class="actions"><button class="btn btn-gray" onclick="openReferralModal('${r.id}')">Edit</button><button class="btn btn-red" onclick="deleteReferral('${r.id}')">Del</button></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;">

    </div>
  </div>`).join('')||'<div style="padding:20px;text-align:center;color:#94a3b8;">No referrers found.</div>';
}
window.filterReferrals=function(){renderReferrals();};

window.openReferralModal=function(id){
  const r=id?referrals.find(x=>x.id===id):null;
  document.getElementById('referralModalTitle').textContent=r?'Edit Referrer':'Add Referrer';
  document.getElementById('refId').value=r?r.id:'';
  document.getElementById('refName').value=r?r.name:'';
  document.getElementById('refOrg').value=r?r.organisation:'';
  document.getElementById('refEmail').value=r?r.email:'';
  document.getElementById('refPhone').value=r?r.phone:'';
  document.getElementById('refNotes').value=r?r.notes:'';
  document.getElementById('referralModal').classList.add('open');
};

window.saveReferral=function(){
  const id=document.getElementById('refId').value;
  const data={name:document.getElementById('refName').value.trim(),organisation:document.getElementById('refOrg').value.trim(),email:document.getElementById('refEmail').value.trim(),phone:document.getElementById('refPhone').value.trim(),notes:document.getElementById('refNotes').value.trim()};
  if(!data.name){toast('Referrer name required','error');return;}
  if(id){Object.assign(referrals.find(x=>x.id===id),data);toast('Referrer updated','success');}
  else{data.id=String(nextRefId++);referrals.push(data);toast('Referrer added','success');}
  closeModal('referralModal');renderReferrals();
};

window.deleteReferral=function(id){
  if(!confirm('Delete this referrer?'))return;
  referrals=referrals.filter(r=>r.id!==id);toast('Referrer deleted','success');renderReferrals();
};
