<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach4U CRM</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Coach4U">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f6ff;color:#1e293b;min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{width:240px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
.sidebar-logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e2e8f0;}
.sidebar-logo img{width:40px;height:40px;border-radius:8px;}
.sidebar-logo span{font-size:18px;font-weight:700;color:#3b82f6;}
.nav-section{padding:16px 12px 8px;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;font-size:14px;color:#475569;cursor:pointer;border-radius:8px;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:all .15s;font-family:inherit;}
.nav-item:hover{background:#eff6ff;color:#3b82f6;}
.nav-item.active{background:#3b82f6;color:#fff;}
.nav-item .icon{width:20px;text-align:center;font-size:16px;}
.nav-group-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;margin:2px 8px;font-size:14px;color:#475569;cursor:pointer;border-radius:8px;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:all .15s;font-family:inherit;}
.nav-group-btn:hover{background:#eff6ff;color:#3b82f6;}
.nav-group-btn .arrow{font-size:10px;transition:transform .2s;}
.nav-group-btn.open .arrow{transform:rotate(90deg);}
.nav-group-items{display:none;padding-left:20px;}
.nav-group-items.open{display:block;}
.sidebar-footer{margin-top:auto;padding:16px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;}

/* ── MAIN AREA ── */
.main{margin-left:240px;flex:1;min-height:100vh;}

/* ── HEADER ── */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.header h2{font-size:20px;font-weight:700;color:#1e293b;}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#64748b;}

/* ── CONTENT ── */
.content{padding:24px 28px;}
.screen{display:none;}
.screen.active{display:block;}

/* ── DASHBOARD ── */
.dash-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px;}
.dash-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;display:flex;align-items:center;gap:14px;}
.dash-card .dc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.dc-icon.blue{background:#eff6ff;color:#3b82f6;}
.dc-icon.green{background:#f0fdf4;color:#16a34a;}
.dc-icon.amber{background:#fefce8;color:#ca8a04;}
.dash-card .dc-info h4{font-size:24px;font-weight:700;color:#1e293b;line-height:1.2;}
.dash-card .dc-info p{font-size:12px;color:#94a3b8;}
.dash-section{margin-bottom:24px;}
.dash-section h3{font-size:16px;font-weight:600;margin-bottom:12px;color:#1e293b;}
.recent-list{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;}
.recent-item{padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;font-size:14px;}
.recent-item:last-child{border-bottom:none;}
.recent-item:hover{background:#f8fafc;}
.recent-item .ri-name{font-weight:600;}
.recent-item .ri-meta{font-size:12px;color:#94a3b8;}

/* ── SEARCH BAR ── */
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.search-input{padding:8px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;width:280px;background:#fff;}
.search-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-blue{background:#3b82f6;color:#fff;}.btn-blue:hover{background:#2563eb;}
.btn-green{background:#16a34a;color:#fff;}.btn-green:hover{background:#15803d;}
.btn-red{background:#ef4444;color:#fff;}.btn-red:hover{background:#dc2626;}
.btn-gray{background:#f1f5f9;color:#1e293b;border:1px solid #e2e8f0;}.btn-gray:hover{background:#e2e8f0;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;}
th{background:#f8fafc;text-align:left;padding:12px 16px;font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f1f5f9;}
tr:hover td{background:#f8fafc;}
td .actions{display:flex;gap:6px;}
td .actions button{padding:4px 10px;font-size:12px;}

/* ── BADGES ── */
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;display:inline-block;}
.badge-green{background:#f0fdf4;color:#16a34a;}
.badge-amber{background:#fefce8;color:#ca8a04;}
.badge-red{background:#fef2f2;color:#ef4444;}
.badge-blue{background:#eff6ff;color:#2563eb;}
.badge-gray{background:#f1f5f9;color:#64748b;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;padding:28px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:#64748b;margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.form-group textarea{height:80px;resize:vertical;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
.toast.success{background:#16a34a;}
.toast.error{background:#ef4444;}

/* ── LINKED MEMBERS ── */
.member-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.member-tag{background:#eff6ff;color:#2563eb;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.member-tag .remove{cursor:pointer;font-weight:700;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .sidebar.mobile-open{display:flex;width:260px;z-index:60;}
  .main{margin-left:0;}
  .mobile-toggle{display:block!important;}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:55;}
  .mobile-overlay.show{display:block;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="C4U.png" alt="Coach4U">
    <span>Coach4U</span>
  </div>
  <div class="nav-section">Main</div>
  <button class="nav-item active" onclick="navTo('dashboard',this)"><span class="icon">&#9776;</span> Dashboard</button>
  <div class="nav-section">CRM</div>
  <button class="nav-group-btn open" onclick="toggleGroup(this)">
    <span><span class="icon">&#128202;</span> Manage</span>
    <span class="arrow">&#9654;</span>
  </button>
  <div class="nav-group-items open">
    <button class="nav-item" onclick="navTo('masterlist',this)"><span class="icon">&#128209;</span> Master List</button>
    <button class="nav-item" onclick="navTo('clients',this)"><span class="icon">&#129309;</span> Clients</button>
  </div>
  <div class="sidebar-footer">Coach4U CRM v1.0</div>
</nav>

<!-- MOBILE OVERLAY -->
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobile()"></div>

<!-- MAIN -->
<div class="main">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="btn btn-gray" style="display:none;padding:6px 10px;" id="mobileToggle" onclick="openMobile()">&#9776;</button>
      <h2 id="pageTitle">Dashboard</h2>
    </div>
    <div class="header-right">
      <span id="headerDate"></span>
    </div>
  </div>
  <div class="content">

    <!-- DASHBOARD -->
    <div class="screen active" id="screen-dashboard">
      <div class="dash-cards">
        <div class="dash-card">
          <div class="dc-icon blue">&#128100;</div>
          <div class="dc-info"><h4 id="dcContacts">5</h4><p>Total Contacts</p></div>
        </div>
        <div class="dash-card">
          <div class="dc-icon green">&#129309;</div>
          <div class="dc-info"><h4 id="dcClients">3</h4><p>Active Clients</p></div>
        </div>
        <div class="dash-card">
          <div class="dc-icon amber">&#128200;</div>
          <div class="dc-info"><h4 id="dcOnHold">1</h4><p>On Hold</p></div>
        </div>
      </div>
      <div class="dash-section">
        <h3>Recent Clients</h3>
        <div class="recent-list" id="recentClients"></div>
      </div>
      <div class="dash-section">
        <h3>Recent Contacts</h3>
        <div class="recent-list" id="recentContacts"></div>
      </div>
    </div>

    <!-- MASTER LIST -->
    <div class="screen" id="screen-masterlist">
      <div class="toolbar">
        <input class="search-input" id="mlSearch" placeholder="Search contacts..." oninput="filterMasterList()">
        <button class="btn btn-blue" onclick="openContactModal()">+ Add Contact</button>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Type</th><th>Strengths</th><th>Actions</th></tr></thead>
        <tbody id="mlBody"></tbody>
      </table>
    </div>

    <!-- CLIENTS -->
    <div class="screen" id="screen-clients">
      <div class="toolbar">
        <input class="search-input" id="clSearch" placeholder="Search clients..." oninput="filterClients()">
        <button class="btn btn-blue" onclick="openClientModal()">+ Add Client</button>
      </div>
      <table>
        <thead><tr><th>Client Name</th><th>Role</th><th>Status</th><th>Practitioner</th><th>Members</th><th>Actions</th></tr></thead>
        <tbody id="clBody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- CONTACT MODAL -->
<div class="modal-overlay" id="contactModal">
  <div class="modal">
    <h3 id="contactModalTitle">Add Contact</h3>
    <input type="hidden" id="contactId">
    <div class="form-group"><label>First Name</label><input id="cFirst"></div>
    <div class="form-group"><label>Last Name</label><input id="cLast"></div>
    <div class="form-group"><label>Email</label><input id="cEmail" type="email"></div>
    <div class="form-group"><label>Phone</label><input id="cPhone"></div>
    <div class="form-group"><label>Type</label>
      <select id="cType"><option>Individual</option><option>Organisation</option><option>Referrer</option></select>
    </div>
    <div class="form-group"><label>Strengths (Top 5)</label><textarea id="cStrengths" placeholder="e.g. Achiever, Learner, Strategic..."></textarea></div>
    <div class="form-group"><label>Notes</label><textarea id="cNotes"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal('contactModal')">Cancel</button>
      <button class="btn btn-green" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<!-- CLIENT MODAL -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <h3 id="clientModalTitle">Add Client</h3>
    <input type="hidden" id="clientId">
    <div class="form-group"><label>Client / Relationship Name</label><input id="clName"></div>
    <div class="form-group"><label>Role</label><input id="clRole" placeholder="e.g. Coaching Client, Workshop"></div>
    <div class="form-group"><label>Status</label>
      <select id="clStatus"><option>Active</option><option>On Hold</option><option>Completed</option></select>
    </div>
    <div class="form-group"><label>Practitioner</label>
      <select id="clPractitioner"><option>Cath</option><option>Lou</option></select>
    </div>
    <div class="form-group"><label>Link Members from Master List</label>
      <select id="clMemberSelect"><option value="">-- Select contact --</option></select>
      <button class="btn btn-gray" style="margin-top:6px;" onclick="addMemberToClient()">+ Link</button>
      <div class="member-list" id="clMembers"></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="clNotes"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal('clientModal')">Cancel</button>
      <button class="btn btn-green" onclick="saveClient()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
(function(){

// ── DUMMY DATA ──
let contacts = [
  {id:'1',first_name:'Sarah',last_name:'Mitchell',email:'sarah@example.com',phone:'0412 345 678',contact_type:'Individual',strengths:'Achiever, Learner, Strategic, Relator, Input',notes:''},
  {id:'2',first_name:'James',last_name:'Chen',email:'james@techcorp.com',phone:'0423 456 789',contact_type:'Organisation',strengths:'Command, Competition, Activator, Self-Assurance, Significance',notes:''},
  {id:'3',first_name:'Emma',last_name:'Williams',email:'emma@williams.au',phone:'0434 567 890',contact_type:'Individual',strengths:'Empathy, Developer, Harmony, Includer, Positivity',notes:''},
  {id:'4',first_name:'Tom',last_name:'Baker',email:'tom@bakerco.com',phone:'0445 678 901',contact_type:'Referrer',strengths:'Analytical, Deliberative, Intellection, Context, Futuristic',notes:''},
  {id:'5',first_name:'Priya',last_name:'Sharma',email:'priya@sharma.com',phone:'0456 789 012',contact_type:'Individual',strengths:'Communication, Woo, Maximizer, Arranger, Adaptability',notes:''},
];

let clients = [
  {id:'1',relationship_name:'Mitchell Coaching',role:'1:1 Coaching',status:'Active',practitioner:'Cath',members:['1'],notes:''},
  {id:'2',relationship_name:'TechCorp Leadership',role:'Team Workshop',status:'Active',practitioner:'Cath',members:['2','3'],notes:''},
  {id:'3',relationship_name:'Baker Referral Partnership',role:'Referral Partner',status:'On Hold',practitioner:'Lou',members:['4'],notes:''},
];

let nextContactId = 6;
let nextClientId = 4;
let tempMembers = [];

// ── DATE DISPLAY ──
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ── NAVIGATION ──
window.navTo = function(tab,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const titles={dashboard:'Dashboard',masterlist:'Master List',clients:'Clients'};
  document.getElementById('pageTitle').textContent=titles[tab]||'Coach4U';
  if(tab==='dashboard') renderDashboard();
  if(tab==='masterlist') renderMasterList();
  if(tab==='clients') renderClients();
  closeMobile();
};

// ── SIDEBAR DROPDOWN ──
window.toggleGroup = function(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
};

// ── MOBILE NAV ──
window.openMobile = function(){
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('mobileOverlay').classList.add('show');
};
window.closeMobile = function(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('mobileOverlay').classList.remove('show');
};

// ── TOAST ──
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── MODAL ──
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};

// ── DASHBOARD ──
function renderDashboard(){
  document.getElementById('dcContacts').textContent=contacts.length;
  document.getElementById('dcClients').textContent=clients.filter(c=>c.status==='Active').length;
  document.getElementById('dcOnHold').textContent=clients.filter(c=>c.status==='On Hold').length;
  document.getElementById('recentClients').innerHTML=clients.slice(0,5).map(c=>
    `<div class="recent-item"><div><span class="ri-name">${c.relationship_name}</span></div><div><span class="badge badge-${c.status==='Active'?'green':c.status==='On Hold'?'amber':'gray'}">${c.status}</span> <span class="ri-meta">${c.practitioner}</span></div></div>`
  ).join('');
  document.getElementById('recentContacts').innerHTML=contacts.slice(0,5).map(c=>
    `<div class="recent-item"><div><span class="ri-name">${c.first_name} ${c.last_name}</span> <span class="ri-meta">${c.email}</span></div><span class="badge badge-${c.contact_type==='Individual'?'blue':c.contact_type==='Organisation'?'green':'amber'}">${c.contact_type}</span></div>`
  ).join('');
}

// ── MASTER LIST ──
function renderMasterList(){
  const q=document.getElementById('mlSearch').value.toLowerCase();
  const filtered=contacts.filter(c=>(c.first_name+' '+c.last_name+' '+c.email+' '+c.contact_type+' '+c.strengths).toLowerCase().includes(q));
  document.getElementById('mlBody').innerHTML=filtered.map(c=>`<tr>
    <td><strong>${c.first_name} ${c.last_name}</strong></td>
    <td>${c.email||''}</td>
    <td>${c.phone||''}</td>
    <td><span class="badge badge-${c.contact_type==='Individual'?'blue':c.contact_type==='Organisation'?'green':'amber'}">${c.contact_type}</span></td>
    <td style="max-width:200px;font-size:12px;">${c.strengths||''}</td>
    <td><div class="actions">
      <button class="btn btn-gray" onclick="openContactModal('${c.id}')">Edit</button>
      <button class="btn btn-red" onclick="deleteContact('${c.id}')">Del</button>
    </div></td>
  </tr>`).join('');
}
window.filterMasterList=function(){renderMasterList();};

window.openContactModal=function(id){
  const c=id?contacts.find(x=>x.id===id):null;
  document.getElementById('contactModalTitle').textContent=c?'Edit Contact':'Add Contact';
  document.getElementById('contactId').value=c?c.id:'';
  document.getElementById('cFirst').value=c?c.first_name:'';
  document.getElementById('cLast').value=c?c.last_name:'';
  document.getElementById('cEmail').value=c?c.email:'';
  document.getElementById('cPhone').value=c?c.phone:'';
  document.getElementById('cType').value=c?c.contact_type:'Individual';
  document.getElementById('cStrengths').value=c?c.strengths:'';
  document.getElementById('cNotes').value=c?c.notes:'';
  document.getElementById('contactModal').classList.add('open');
};

window.saveContact=function(){
  const id=document.getElementById('contactId').value;
  const data={
    first_name:document.getElementById('cFirst').value.trim(),
    last_name:document.getElementById('cLast').value.trim(),
    email:document.getElementById('cEmail').value.trim(),
    phone:document.getElementById('cPhone').value.trim(),
    contact_type:document.getElementById('cType').value,
    strengths:document.getElementById('cStrengths').value.trim(),
    notes:document.getElementById('cNotes').value.trim()
  };
  if(!data.first_name||!data.last_name){toast('First and last name required','error');return;}
  if(id){
    const c=contacts.find(x=>x.id===id);
    Object.assign(c,data);
    toast('Contact updated','success');
  }else{
    data.id=String(nextContactId++);
    contacts.push(data);
    toast('Contact added','success');
  }
  closeModal('contactModal');
  renderMasterList();
  renderDashboard();
};

window.deleteContact=function(id){
  if(!confirm('Delete this contact?'))return;
  contacts=contacts.filter(c=>c.id!==id);
  toast('Contact deleted','success');
  renderMasterList();
  renderDashboard();
};

// ── CLIENTS ──
function getContactName(id){
  const c=contacts.find(x=>x.id===id);
  return c?c.first_name+' '+c.last_name:'Unknown';
}

function renderClients(){
  const q=document.getElementById('clSearch').value.toLowerCase();
  const filtered=clients.filter(c=>(c.relationship_name+' '+c.role+' '+c.status+' '+c.practitioner).toLowerCase().includes(q));
  document.getElementById('clBody').innerHTML=filtered.map(c=>`<tr>
    <td><strong>${c.relationship_name}</strong></td>
    <td>${c.role||''}</td>
    <td><span class="badge badge-${c.status==='Active'?'green':c.status==='On Hold'?'amber':'gray'}">${c.status}</span></td>
    <td>${c.practitioner}</td>
    <td style="font-size:12px;">${(c.members||[]).map(mid=>getContactName(mid)).join(', ')||'—'}</td>
    <td><div class="actions">
      <button class="btn btn-gray" onclick="openClientModal('${c.id}')">Edit</button>
      <button class="btn btn-red" onclick="deleteClient('${c.id}')">Del</button>
    </div></td>
  </tr>`).join('');
}
window.filterClients=function(){renderClients();};

window.openClientModal=function(id){
  const c=id?clients.find(x=>x.id===id):null;
  document.getElementById('clientModalTitle').textContent=c?'Edit Client':'Add Client';
  document.getElementById('clientId').value=c?c.id:'';
  document.getElementById('clName').value=c?c.relationship_name:'';
  document.getElementById('clRole').value=c?c.role:'';
  document.getElementById('clStatus').value=c?c.status:'Active';
  document.getElementById('clPractitioner').value=c?c.practitioner:'Cath';
  document.getElementById('clNotes').value=c?c.notes:'';
  tempMembers=c?[...(c.members||[])]:[];
  renderMemberSelect();
  renderTempMembers();
  document.getElementById('clientModal').classList.add('open');
};

function renderMemberSelect(){
  document.getElementById('clMemberSelect').innerHTML='<option value="">-- Select contact --</option>'+
    contacts.map(c=>`<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('');
}

function renderTempMembers(){
  document.getElementById('clMembers').innerHTML=tempMembers.map(mid=>
    `<span class="member-tag">${getContactName(mid)} <span class="remove" onclick="removeTempMember('${mid}')">&times;</span></span>`
  ).join('');
}

window.addMemberToClient=function(){
  const sel=document.getElementById('clMemberSelect');
  const val=sel.value;
  if(!val||tempMembers.includes(val))return;
  tempMembers.push(val);
  sel.value='';
  renderTempMembers();
};

window.removeTempMember=function(mid){
  tempMembers=tempMembers.filter(m=>m!==mid);
  renderTempMembers();
};

window.saveClient=function(){
  const id=document.getElementById('clientId').value;
  const data={
    relationship_name:document.getElementById('clName').value.trim(),
    role:document.getElementById('clRole').value.trim(),
    status:document.getElementById('clStatus').value,
    practitioner:document.getElementById('clPractitioner').value,
    notes:document.getElementById('clNotes').value.trim(),
    members:[...tempMembers]
  };
  if(!data.relationship_name){toast('Client name required','error');return;}
  if(id){
    const c=clients.find(x=>x.id===id);
    Object.assign(c,data);
    toast('Client updated','success');
  }else{
    data.id=String(nextClientId++);
    clients.push(data);
    toast('Client added','success');
  }
  closeModal('clientModal');
  renderClients();
  renderDashboard();
};

window.deleteClient=function(id){
  if(!confirm('Delete this client?'))return;
  clients=clients.filter(c=>c.id!==id);
  toast('Client deleted','success');
  renderClients();
  renderDashboard();
};

// ── BOOT ──
renderDashboard();

// ── MOBILE CHECK ──
if(window.innerWidth<=768) document.getElementById('mobileToggle').style.display='inline-block';
window.addEventListener('resize',()=>{
  document.getElementById('mobileToggle').style.display=window.innerWidth<=768?'inline-block':'none';
});

})();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
