<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1240" viewBox="0 0 1040 1240"><rect width="1040" height="1240" fill="#ffffff"/><text x="40" y="52" font-family="Inter,Arial" font-size="30" font-weight="800" fill="#1e3a5f" text-anchor="start">Calendar Partner — Build Roadmap</text><text x="40" y="80" font-family="Inter,Arial" font-size="16" font-weight="400" fill="#475569" text-anchor="start">Each phase ships value on its own. You can stop after any phase.</text><rect x="40" y="120" width="960" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0"/><rect x="40" y="120" width="8" height="190" rx="4" fill="#64748b"/><rect x="70" y="146" width="150" height="34" rx="17" fill="#64748b"/><text x="145" y="169" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">PHASE 0</text><text x="240" y="170" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#1e3a5f" text-anchor="start">Access &amp; setup</text><circle cx="252" cy="207" r="3.5" fill="#64748b"/><text x="266" y="212" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Register an Azure app for Microsoft Graph</text><circle cx="252" cy="231" r="3.5" fill="#64748b"/><text x="266" y="236" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Confirm GoDaddy-managed M365 lets us register / consent</text><circle cx="252" cy="255" r="3.5" fill="#64748b"/><text x="266" y="260" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">You sign in once per mailbox → tokens stored</text><circle cx="252" cy="279" r="3.5" fill="#64748b"/><text x="266" y="284" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">RISK: GoDaddy-managed tenants can restrict admin — we verify first</text><rect x="40" y="324" width="960" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0"/><rect x="40" y="324" width="8" height="190" rx="4" fill="#0d9488"/><rect x="70" y="350" width="150" height="34" rx="17" fill="#0d9488"/><text x="145" y="373" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">PHASE 1</text><text x="240" y="374" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#1e3a5f" text-anchor="start">Read-only week view</text><circle cx="252" cy="411" r="3.5" fill="#0d9488"/><text x="266" y="416" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Pull both calendars into Supabase</text><circle cx="252" cy="435" r="3.5" fill="#0d9488"/><text x="266" y="440" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">New Calendar space + colour-coded week view</text><circle cx="252" cy="459" r="3.5" fill="#0d9488"/><text x="266" y="464" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Auto-link events to clients by email</text><circle cx="252" cy="483" r="3.5" fill="#0d9488"/><text x="266" y="488" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">This alone replaces your Outlook calendar view</text><rect x="40" y="528" width="960" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0"/><rect x="40" y="528" width="8" height="190" rx="4" fill="#d97706"/><rect x="70" y="554" width="150" height="34" rx="17" fill="#d97706"/><text x="145" y="577" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">PHASE 2</text><text x="240" y="578" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#1e3a5f" text-anchor="start">Book from the app + AI box</text><circle cx="252" cy="615" r="3.5" fill="#d97706"/><text x="266" y="620" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Type 'book Sarah Tue 2pm 90min' → AI parses it</text><circle cx="252" cy="639" r="3.5" fill="#d97706"/><text x="266" y="644" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Matches the client, shows a confirm card</text><circle cx="252" cy="663" r="3.5" fill="#d97706"/><text x="266" y="668" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">On approve: writes the event into Outlook</text><circle cx="252" cy="687" r="3.5" fill="#d97706"/><text x="266" y="692" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Reschedule / cancel from the app too</text><rect x="40" y="732" width="960" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0"/><rect x="40" y="732" width="8" height="190" rx="4" fill="#7c3aed"/><rect x="70" y="758" width="150" height="34" rx="17" fill="#7c3aed"/><text x="145" y="781" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">PHASE 3</text><text x="240" y="782" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#1e3a5f" text-anchor="start">True two-way live sync</text><circle cx="252" cy="819" r="3.5" fill="#7c3aed"/><text x="266" y="824" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Graph webhooks: Outlook changes flow back in</text><circle cx="252" cy="843" r="3.5" fill="#7c3aed"/><text x="266" y="848" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Auto-renew subscriptions (cron)</text><circle cx="252" cy="867" r="3.5" fill="#7c3aed"/><text x="266" y="872" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Loop-guard so edits don't echo</text><circle cx="252" cy="891" r="3.5" fill="#7c3aed"/><text x="266" y="896" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Conflict handling + delete semantics</text><rect x="40" y="936" width="960" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0"/><rect x="40" y="936" width="8" height="190" rx="4" fill="#15803d"/><rect x="70" y="962" width="150" height="34" rx="17" fill="#15803d"/><text x="145" y="985" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">PHASE 4</text><text x="240" y="986" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#1e3a5f" text-anchor="start">Smart PA polish</text><circle cx="252" cy="1023" r="3.5" fill="#15803d"/><text x="266" y="1028" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">'When am I free Tuesday?' free-busy suggestions</text><circle cx="252" cy="1047" r="3.5" fill="#15803d"/><text x="266" y="1052" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Recurring sessions, reminders, request log</text><circle cx="252" cy="1071" r="3.5" fill="#15803d"/><text x="266" y="1076" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Ask me in a Claude session to manage it too</text><circle cx="252" cy="1095" r="3.5" fill="#15803d"/><text x="266" y="1100" font-family="Inter,Arial" font-size="15" font-weight="500" fill="#475569" text-anchor="start">Weekly summary to Teams / WhatsApp</text></svg>