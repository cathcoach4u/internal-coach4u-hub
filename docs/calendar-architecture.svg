</defs><rect x="0" y="0" width="1040" height="1400" fill="#ffffff"/><text x="40" y="52" font-family="Inter,Arial" font-size="30" font-weight="800" fill="#1e3a5f" text-anchor="start">Coach4U Calendar Partner — System Map</text><text x="40" y="80" font-family="Inter,Arial" font-size="16" font-weight="400" fill="#475569" text-anchor="start">Two-way sync (work + bookings) · personal calendar read for availability only</text><text x="40" y="128" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#64748b" text-anchor="start">1  ·  HOW YOU ASK</text><rect x="40" y="142" width="300" height="96" rx="14" fill="url(#navyg)" stroke="#1e3a5f" stroke-width="1.5"/><text x="190.0" y="186.0" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">In-app booking box</text><text x="190.0" y="208.0" font-family="Inter,Arial" font-size="13" fill="#e2e8f0" text-anchor="middle">Type: “book Sarah Tue 2pm 90min”</text><rect x="370" y="142" width="300" height="96" rx="14" fill="url(#navyg)" stroke="#1e3a5f" stroke-width="1.5"/><text x="520.0" y="186.0" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Week view</text><text x="520.0" y="208.0" font-family="Inter,Arial" font-size="13" fill="#e2e8f0" text-anchor="middle">See &amp; drag both calendars</text><rect x="700" y="142" width="300" height="96" rx="14" fill="url(#navyg)" stroke="#1e3a5f" stroke-width="1.5"/><text x="850.0" y="186.0" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Your AI VA (me)</text><text x="850.0" y="208.0" font-family="Inter,Arial" font-size="13" fill="#e2e8f0" text-anchor="middle">Books like your VA · already wired</text><text x="40" y="290" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#64748b" text-anchor="start">2  ·  YOUR CRM APP  (index.html — new “Calendar” space)</text><rect x="40" y="306" width="960" height="118" rx="16" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="520.0" y="372.0" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#0f172a" text-anchor="middle"></text><text x="64" y="338" font-family="Inter,Arial" font-size="17" font-weight="800" fill="#1e3a5f" text-anchor="start">New Calendar area</text><rect x="64" y="352" width="290" height="56" rx="14" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/><rect x="64" y="352" width="6" height="56" rx="3" fill="#0d9488"/><text x="209.0" y="387.0" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">AI parses your request</text><rect x="370" y="352" width="290" height="56" rx="14" fill="#ffffff" stroke="#b87a90" stroke-width="1.5"/><rect x="370" y="352" width="6" height="56" rx="3" fill="#b87a90"/><text x="515.0" y="387.0" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Matches to a client / contact</text><rect x="676" y="352" width="300" height="56" rx="14" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/><rect x="676" y="352" width="6" height="56" rx="3" fill="#d97706"/><text x="826.0" y="387.0" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Confirm card → you approve</text><text x="40" y="478" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#64748b" text-anchor="start">3  ·  SUPABASE BACKEND  (secure middle layer — holds keys &amp; tokens)</text><rect x="40" y="494" width="960" height="206" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/><text x="520.0" y="604.0" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#0f172a" text-anchor="middle"></text><rect x="64" y="520" width="280" height="72" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/><rect x="64" y="520" width="6" height="72" rx="3" fill="#7c3aed"/><text x="204.0" y="552.0" font-family="Inter,Arial" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Edge Functions</text><text x="204.0" y="574.0" font-family="Inter,Arial" font-size="12" fill="#475569" text-anchor="middle">Talk to Graph + AI</text><rect x="360" y="520" width="270" height="72" rx="12" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/><rect x="360" y="520" width="6" height="72" rx="3" fill="#0d9488"/><text x="495.0" y="552.0" font-family="Inter,Arial" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">Anthropic AI</text><text x="495.0" y="574.0" font-family="Inter,Arial" font-size="12" fill="#475569" text-anchor="middle">Reads dates + client list</text><rect x="648" y="520" width="328" height="72" rx="12" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/><rect x="648" y="520" width="6" height="72" rx="3" fill="#64748b"/><text x="812.0" y="552.0" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Sync engine</text><text x="812.0" y="574.0" font-family="Inter,Arial" font-size="12" fill="#475569" text-anchor="middle">Webhooks + de-dupe loop guard</text><text x="64" y="632" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#1e3a5f" text-anchor="start">New tables:</text><rect x="168" y="612" width="240" height="40" rx="8" fill="#eef2ff" stroke="#7c3aed" stroke-width="1.5"/><rect x="168" y="612" width="6" height="40" rx="3" fill="#7c3aed"/><text x="288.0" y="639.0" font-family="Inter,Arial" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">calendar_accounts</text><rect x="420" y="612" width="230" height="40" rx="8" fill="#ecfeff" stroke="#0d9488" stroke-width="1.5"/><rect x="420" y="612" width="6" height="40" rx="3" fill="#0d9488"/><text x="535.0" y="639.0" font-family="Inter,Arial" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">calendar_events</text><rect x="662" y="612" width="210" height="40" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/><rect x="662" y="612" width="6" height="40" rx="3" fill="#d97706"/><text x="767.0" y="639.0" font-family="Inter,Arial" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">calendar_requests</text><text x="64" y="690" font-family="Inter,Arial" font-size="13" font-weight="500" fill="#475569" text-anchor="start">Links to existing  contacts  &amp;  clients  tables (by attendee email)</text><text x="40" y="752" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#64748b" text-anchor="start">4  ·  MICROSOFT GRAPH API  (OAuth sign-in once per mailbox + change webhooks)</text><rect x="40" y="768" width="960" height="72" rx="14" fill="url(#tealg)" stroke="#0d9488" stroke-width="1.5"/><text x="520.0" y="811.0" font-family="Inter,Arial" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Microsoft Graph  ·  Calendars.ReadWrite  ·  offline_access</text><text x="40" y="892" font-family="Inter,Arial" font-size="14" font-weight="700" fill="#64748b" text-anchor="start">5  ·  YOUR CALENDARS  —  3 sources across 2 logins (M365 under GoDaddy)</text><rect x="40" y="908" width="300" height="108" rx="14" fill="url(#navyg)" stroke="#1e3a5f" stroke-width="1.5"/><text x="190.0" y="958.0" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">cath@coach4u.com.au</text><text x="190.0" y="980.0" font-family="Inter,Arial" font-size="13" fill="#e2e8f0" text-anchor="middle">WORK · sessions &amp; tasks</text><rect x="370" y="908" width="300" height="108" rx="14" fill="url(#tealg)" stroke="#0d9488" stroke-width="1.5"/><text x="520.0" y="958.0" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Coach4U@ Bookings</text><text x="520.0" y="980.0" font-family="Inter,Arial" font-size="13" fill="#e2e8f0" text-anchor="middle">CLIENT-FACING · VA books here · “team”</text><rect x="700" y="908" width="300" height="108" rx="14" fill="#475569" stroke="#334155" stroke-width="1.5"/><text x="850.0" y="958.0" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">coachingwithcath.com.au</text><text x="850.0" y="980.0" font-family="Inter,Arial" font-size="13" fill="#e2e8f0" text-anchor="middle">PERSONAL · viewable &amp; bookable · private</text><text x="520" y="1052" font-family="Inter,Arial" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Availability = all three · personal stays private (never client-facing)</text><line x1="520" y1="260" x2="520" y2="304" stroke="#64748b" stroke-width="2.5"  marker-end="url(#ah)" marker-start="url(#ahs)"/><line x1="520" y1="424" x2="520" y2="492" stroke="#0d9488" stroke-width="3"  marker-end="url(#ah)" marker-start="url(#ahs)"/><text x="540" y="468" font-family="Inter,Arial" font-size="12" font-weight="700" fill="#0d9488" text-anchor="start">two-way</text><line x1="520" y1="700" x2="520" y2="766" stroke="#0d9488" stroke-width="3"  marker-end="url(#ah)" marker-start="url(#ahs)"/><text x="540" y="742" font-family="Inter,Arial" font-size="12" font-weight="700" fill="#0d9488" text-anchor="start">two-way</text><line x1="190" y1="840" x2="190" y2="906" stroke="#0d9488" stroke-width="3"  marker-end="url(#ah)" marker-start="url(#ahs)"/><line x1="520" y1="840" x2="520" y2="906" stroke="#0d9488" stroke-width="3"  marker-end="url(#ah)" marker-start="url(#ahs)"/><line x1="850" y1="840" x2="850" y2="906" stroke="#0d9488" stroke-width="3"  marker-end="url(#ah)" marker-start="url(#ahs)"/></svg>