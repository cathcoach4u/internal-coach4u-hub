name: Patch activity URL to local copy

on:
  push:
    paths:
      - '.github/workflows/patch-activity-url.yml'

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Patch Issue Clarifier URL and remove external link attributes
        run: |
          sed -i \
            "s|url:'https://cathcoach4u.github.io/yourcoachingportal/resources/issue-clarifier.html'|url:'activities/issue-clarifier.html'|g" \
            index.html
          sed -i \
            's|target="_blank" rel="noopener noreferrer" style="display:inline-block;margin-top:4px;background:#1e3a5f;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;text-align:center;">Open &#8599;</a>|style="display:inline-block;margin-top:4px;background:#1e3a5f;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;text-align:center;">Open</a>|g' \
            index.html

      - name: Bump sw.js cache version to v531
        run: sed -i "s|coach4u-crm-v530|coach4u-crm-v531|g" sw.js

      - name: Remove this workflow
        run: rm .github/workflows/patch-activity-url.yml

      - name: Commit changes
        run: |
          git config user.name "cathcoach4u"
          git config user.email "cath@coach4u.com.au"
          git add index.html sw.js
          git rm .github/workflows/patch-activity-url.yml
          git commit -m "Use local Issue Clarifier copy in ThriveHQ Activities; bump cache to v531"
          git push
