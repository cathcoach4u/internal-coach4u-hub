name: Fix activity open (replace window.open with location.href)

on:
  push:
    paths:
      - '.github/workflows/fix-activity-open.yml'

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Replace window.open with location.href
        run: |
          sed -i "s|window.open(url,'_blank','noopener');|window.location.href=url;|g" index.html

      - name: Bump sw.js cache version to v533
        run: sed -i "s|coach4u-crm-v532|coach4u-crm-v533|g" sw.js

      - name: Remove this workflow
        run: rm .github/workflows/fix-activity-open.yml

      - name: Commit changes
        run: |
          git config user.name "cathcoach4u"
          git config user.email "cath@coach4u.com.au"
          git add index.html sw.js
          git rm .github/workflows/fix-activity-open.yml
          git commit -m "Fix activity open: use location.href instead of window.open; bump cache to v533"
          git push
