<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>C4U Bot</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="bot-icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="bot-icon-192.svg">
<meta name="theme-color" content="#003366">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="C4U Bot">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',system-ui,sans-serif;background:#f0f6ff;color:#1e293b;display:flex;flex-direction:column;height:100vh;}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#234b78 100%);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.header img{width:40px;height:40px;border-radius:10px;background:#fff;padding:2px;}
.header-text h1{font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;color:#fff;}
.header-text p{font-size:12px;color:rgba(255,255,255,.7);}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;}
.msg{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6;word-wrap:break-word;animation:fadeIn .25s ease;}
.msg.bot{background:#fff;color:#1e293b;border:1px solid #e2e8f0;border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.msg.user{background:#3b82f6;color:#fff;border-bottom-right-radius:4px;align-self:flex-end;}
.msg.typing{color:#94a3b8;font-style:italic;border:1px solid #e2e8f0;background:#fff;}
.msg.action{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-bottom-left-radius:4px;align-self:flex-start;font-size:12px;font-weight:500;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.input-area{flex-shrink:0;background:#fff;border-top:1px solid #e2e8f0;padding:12px 16px;display:flex;gap:10px;align-items:flex-end;}
.input-area textarea{flex:1;padding:12px 16px;border:1px solid #e2e8f0;border-radius:24px;font-size:14px;font-family:inherit;resize:none;max-height:120px;line-height:1.4;outline:none;transition:border-color .2s;}
.input-area textarea:focus{border-color:#3b82f6;}
.send-btn{width:44px;height:44px;border-radius:50%;background:#3b82f6;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.send-btn:hover{background:#2563eb;}
.send-btn:disabled{background:#94a3b8;cursor:not-allowed;}
.loading-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#64748b;font-size:14px;}
.loading-screen .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#dc2626;font-size:14px;padding:20px;text-align:center;}
.msg p{margin:0 0 8px 0;}.msg p:last-child{margin-bottom:0;}
.msg ul,.msg ol{margin:4px 0 8px 20px;}.msg li{margin:2px 0;}
.msg code{background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:13px;}
.msg pre{background:#1e293b;color:#e2e8f0;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:13px;}
.msg pre code{background:none;padding:0;color:inherit;}
.msg strong{font-weight:600;}
.msg a{color:#2563eb;text-decoration:underline;}
.msg.bot a{color:#2563eb;}.msg.user a{color:#bfdbfe;}
.prompt-chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 12px;align-self:flex-start;}
.prompt-chip{background:#fff;border:1px solid #cbd5e1;border-radius:20px;padding:8px 14px;font-size:12px;font-weight:500;color:#334155;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.prompt-chip:hover{background:#3b82f6;color:#fff;border-color:#3b82f6;}
.prompt-section{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;width:100%;margin-top:4px;}
</style>
</head>
<body>

<div class="header">
  <img src="bot-icon-192.svg" alt="C4U Bot">
  <div class="header-text">
    <h1 id="botTitle">Coach4U Assistant</h1>
    <p id="botSubtitle">Ask me anything</p>
  </div>
</div>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <span>Loading...</span>
</div>

<div id="errorScreen" class="error-screen" style="display:none;">
  <span style="font-size:28px;">&#9888;</span>
  <span id="errorMsg">Unable to load the assistant. Please try again later.</span>
</div>

<div id="chatArea" class="chat-area" style="display:none;"></div>

<div id="inputArea" class="input-area" style="display:none;">
  <textarea id="userInput" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#10148;</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://uoixetfvboevjxlkfyqy.supabase.co';
const SB_KEY='sb_publishable_m3qgSGvWF0n2TePf6vhqMw_9obUvJEJ';
let sb=null;
function getSB(){if(!sb&&window.supabase)sb=window.supabase.createClient(SB_URL,SB_KEY);return sb;}

let botConfig=null;
let conversationHistory=[];

// ── CRM TOOLS ──
// Interest values must match coach4u-shared/templates/PROFILE.md > CRM Interest Field Values
const crmTools=[
  {type:'function',function:{name:'add_prospect',description:'Add a new prospect to the CRM. Use when the user wants to add/create a prospect or lead.',parameters:{type:'object',properties:{name:{type:'string',description:'Full name of the prospect'},email:{type:'string',description:'Email address'},phone:{type:'string',description:'Phone number'},source:{type:'string',description:'How they found Coach4U (e.g. referral, social media, website)'},interest:{type:'string',description:'What they are interested in',enum:['Couples Coaching/Counselling','Individual Coaching/Counselling','ADHD Coaching/Counselling','ThriveHQ (ADHD Group)','CliftonStrengths Assessment','Business/Leadership Coaching','Career Coaching','Change Management','NDIS Support','Not specified']},status:{type:'string',description:'Prospect status',enum:['New','Warm','Hot'],default:'New'},notes:{type:'string',description:'Any additional notes'}},required:['name']}}},
  {type:'function',function:{name:'search_prospects',description:'Search existing prospects by name, email, or phone. Use to check if someone already exists or to look up prospect details.',parameters:{type:'object',properties:{query:{type:'string',description:'Search term — name, email, or phone number'}},required:['query']}}},
  {type:'function',function:{name:'add_prospect_note',description:'Add an activity note to an existing prospect. Use when the user wants to log a call, email, message, meeting, or follow-up note for a prospect.',parameters:{type:'object',properties:{prospect_name:{type:'string',description:'Name of the prospect to add the note to'},note:{type:'string',description:'The note content'},note_type:{type:'string',description:'Type of activity',enum:['Called','Emailed','Messaged','Met','Follow-up','Note'],default:'Note'}},required:['prospect_name','note']}}},
  {type:'function',function:{name:'add_contact',description:'Add a new contact to the master contact list. Use when the user wants to add someone as a contact (not a prospect).',parameters:{type:'object',properties:{first_name:{type:'string',description:'First name'},last_name:{type:'string',description:'Last name'},email:{type:'string',description:'Email address'},phone:{type:'string',description:'Phone number'},type:{type:'string',description:'Contact type',enum:['Individual','Organisation'],default:'Individual'}},required:['first_name','last_name']}}},
  {type:'function',function:{name:'search_contacts',description:'Search the master contact list by name, email, or phone.',parameters:{type:'object',properties:{query:{type:'string',description:'Search term'}},required:['query']}}},
  {type:'function',function:{name:'add_task',description:'Create a new task in the task management system.',parameters:{type:'object',properties:{title:{type:'string',description:'Task title/description'},priority:{type:'string',description:'Priority level',enum:['Low','Medium','High','Urgent'],default:'Medium'},due_date:{type:'string',description:'Due date in YYYY-MM-DD format'},category:{type:'string',description:'Task category',enum:['Admin','Client Work','Marketing','Finance','ThriveHQ','IT','Other'],default:'Admin'}},required:['title']}}},
  {type:'function',function:{name:'get_prospect_summary',description:'Get a summary of all prospects including counts by status, overdue follow-ups, and recent activity. Use when the user asks about prospect pipeline, overview, or status.',parameters:{type:'object',properties:{}}}},
  {type:'function',function:{name:'get_tasks_summary',description:'Get a summary of open tasks, overdue tasks, and tasks by priority. Use when the user asks about tasks, to-do list, or what needs to be done.',parameters:{type:'object',properties:{}}}},
  {type:'function',function:{name:'search_clients',description:'Search active clients/relationships by name.',parameters:{type:'object',properties:{query:{type:'string',description:'Search term'}},required:['query']}}},
  {type:'function',function:{name:'get_thrivehq_summary',description:'Get a summary of ThriveHQ members, trials, and recent intake submissions.',parameters:{type:'object',properties:{}}}},
  {type:'function',function:{name:'update_prospect_status',description:'Update the status of an existing prospect. Use when the user wants to change a prospect to Hot, Warm, Cold, etc.',parameters:{type:'object',properties:{prospect_name:{type:'string',description:'Name of the prospect'},status:{type:'string',description:'New status',enum:['New','Warm','Hot','Cold','Converted','Lost']}},required:['prospect_name','status']}}},
  {type:'function',function:{name:'set_prospect_followup',description:'Set or update the follow-up date for a prospect.',parameters:{type:'object',properties:{prospect_name:{type:'string',description:'Name of the prospect'},follow_up_date:{type:'string',description:'Follow-up date in YYYY-MM-DD format'}},required:['prospect_name','follow_up_date']}}}
];

// ── EXECUTE TOOL CALLS ──
async function executeTool(name,args){
  const client=getSB();
  switch(name){
    case 'add_prospect':{
      const {data,error}=await client.from('prospects').insert({
        name:args.name,email:args.email||null,phone:args.phone||null,
        source:args.source||null,interest:args.interest||null,
        status:args.status||'New',notes:args.notes||null
      }).select().single();
      if(error) return {success:false,error:error.message};
      return {success:true,message:'Prospect "'+args.name+'" added successfully.',id:data.id};
    }
    case 'search_prospects':{
      const q=args.query.toLowerCase();
      const {data,error}=await client.from('prospects').select('*').order('created_at',{ascending:false});
      if(error) return {success:false,error:error.message};
      const matches=data.filter(p=>(p.name+' '+(p.email||'')+' '+(p.phone||'')+' '+(p.notes||'')).toLowerCase().includes(q));
      if(!matches.length) return {success:true,message:'No prospects found matching "'+args.query+'".',results:[]};
      return {success:true,message:'Found '+matches.length+' prospect(s).',results:matches.slice(0,10).map(p=>({id:p.id,name:p.name,email:p.email,phone:p.phone,status:p.status,interest:p.interest,source:p.source,created:p.created_at}))};
    }
    case 'add_prospect_note':{
      // Find prospect by name
      const {data:prospects}=await client.from('prospects').select('id,name').ilike('name','%'+args.prospect_name+'%');
      if(!prospects||!prospects.length) return {success:false,error:'No prospect found with name "'+args.prospect_name+'".' };
      const prospect=prospects[0];
      const {error}=await client.from('prospect_notes').insert({
        prospect_id:prospect.id,note:args.note,note_type:args.note_type||'Note'
      });
      if(error) return {success:false,error:error.message};
      return {success:true,message:args.note_type+' note added to '+prospect.name+'.'};
    }
    case 'add_contact':{
      const {data,error}=await client.from('contacts').insert({
        first_name:args.first_name,last_name:args.last_name,
        email:args.email||null,phone:args.phone||null,
        type:args.type||'Individual'
      }).select().single();
      if(error) return {success:false,error:error.message};
      return {success:true,message:'Contact "'+args.first_name+' '+args.last_name+'" added to master list.',id:data.id};
    }
    case 'search_contacts':{
      const q=args.query.toLowerCase();
      const {data,error}=await client.from('contacts').select('*').order('created_at',{ascending:false});
      if(error) return {success:false,error:error.message};
      const matches=data.filter(c=>((c.first_name||'')+' '+(c.last_name||'')+' '+(c.email||'')+' '+(c.phone||'')).toLowerCase().includes(q));
      if(!matches.length) return {success:true,message:'No contacts found matching "'+args.query+'".',results:[]};
      return {success:true,message:'Found '+matches.length+' contact(s).',results:matches.slice(0,10).map(c=>({id:c.id,name:(c.first_name||'')+' '+(c.last_name||''),email:c.email,phone:c.phone,type:c.type}))};
    }
    case 'add_task':{
      const {data,error}=await client.from('tasks').insert({
        title:args.title,priority:args.priority||'Medium',
        due_date:args.due_date||null,category:args.category||'Admin',
        status:'To Do'
      }).select().single();
      if(error) return {success:false,error:error.message};
      return {success:true,message:'Task "'+args.title+'" created.'};
    }
    case 'get_prospect_summary':{
      const {data:prx}=await client.from('prospects').select('*').order('created_at',{ascending:false});
      const {data:notes}=await client.from('prospect_notes').select('*').order('created_at',{ascending:false}).limit(10);
      if(!prx) return {success:false,error:'Could not load prospects.'};
      const active=prx.filter(p=>p.status!=='Lost'&&p.status!=='Converted');
      const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
      const overdue=active.filter(p=>p.follow_up_date&&new Date(p.follow_up_date)<today);
      const noFollowUp=active.filter(p=>!p.follow_up_date);
      return {success:true,total:prx.length,active:active.length,
        byStatus:{hot:prx.filter(p=>p.status==='Hot').length,warm:prx.filter(p=>p.status==='Warm').length,new:prx.filter(p=>p.status==='New'||!p.status).length,converted:prx.filter(p=>p.status==='Converted').length,lost:prx.filter(p=>p.status==='Lost').length},
        overdueFollowUps:overdue.map(p=>({name:p.name,date:p.follow_up_date})),
        noFollowUpSet:noFollowUp.length,
        recentActivity:(notes||[]).slice(0,5).map(n=>{const p=prx.find(x=>x.id===n.prospect_id);return {prospect:p?p.name:'Unknown',type:n.note_type,note:n.note,date:n.created_at};})
      };
    }
    case 'get_tasks_summary':{
      const {data:tasks}=await client.from('tasks').select('*').order('created_at',{ascending:false});
      if(!tasks) return {success:false,error:'Could not load tasks.'};
      const open=tasks.filter(t=>t.status!=='Complete');
      const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
      const overdue=open.filter(t=>t.due_date&&new Date(t.due_date)<today);
      return {success:true,total:tasks.length,open:open.length,
        byPriority:{urgent:open.filter(t=>t.priority==='Urgent').length,high:open.filter(t=>t.priority==='High').length,medium:open.filter(t=>t.priority==='Medium').length,low:open.filter(t=>t.priority==='Low').length},
        byStatus:{notStarted:open.filter(t=>t.status==='Not Started'||t.status==='To Do').length,inProgress:open.filter(t=>t.status==='In Progress').length,blocked:open.filter(t=>t.status==='Blocked').length},
        overdueTasks:overdue.slice(0,5).map(t=>({title:t.title,due:t.due_date,priority:t.priority})),
        recentTasks:open.slice(0,5).map(t=>({title:t.title,status:t.status,priority:t.priority,due:t.due_date}))
      };
    }
    case 'search_clients':{
      const q=args.query.toLowerCase();
      const {data,error}=await client.from('clients').select('*').order('created_at',{ascending:false});
      if(error) return {success:false,error:error.message};
      const matches=data.filter(c=>(c.relationship_name||'').toLowerCase().includes(q));
      if(!matches.length) return {success:true,message:'No clients found matching "'+args.query+'".',results:[]};
      return {success:true,message:'Found '+matches.length+' client(s).',results:matches.slice(0,10).map(c=>({id:c.id,name:c.relationship_name,role:c.role,status:c.status,practitioner:c.practitioner}))};
    }
    case 'get_thrivehq_summary':{
      const {data:contacts}=await client.from('contacts').select('id,first_name,last_name,membership_start_date,renewal_date').not('membership_start_date','is',null);
      const {data:trials}=await client.from('thrivehq_trials').select('*').order('created_at',{ascending:false});
      const {data:intakes}=await client.from('intake_submissions').select('*').eq('status','new').order('submitted_at',{ascending:false});
      return {success:true,
        members:(contacts||[]).length,
        activeTrials:(trials||[]).filter(t=>t.status==='Active').length,
        totalTrials:(trials||[]).length,
        pendingIntakes:(intakes||[]).length,
        recentIntakes:(intakes||[]).slice(0,5).map(i=>({name:i.first_name+' '+i.last_name,email:i.email,submitted:i.submitted_at}))
      };
    }
    case 'update_prospect_status':{
      const {data:prospects}=await client.from('prospects').select('id,name').ilike('name','%'+args.prospect_name+'%');
      if(!prospects||!prospects.length) return {success:false,error:'No prospect found with name "'+args.prospect_name+'".' };
      const p=prospects[0];
      const {error}=await client.from('prospects').update({status:args.status}).eq('id',p.id);
      if(error) return {success:false,error:error.message};
      return {success:true,message:p.name+' updated to '+args.status+'.'};
    }
    case 'set_prospect_followup':{
      const {data:prospects}=await client.from('prospects').select('id,name').ilike('name','%'+args.prospect_name+'%');
      if(!prospects||!prospects.length) return {success:false,error:'No prospect found with name "'+args.prospect_name+'".' };
      const p=prospects[0];
      const {error}=await client.from('prospects').update({follow_up_date:args.follow_up_date}).eq('id',p.id);
      if(error) return {success:false,error:error.message};
      return {success:true,message:'Follow-up for '+p.name+' set to '+args.follow_up_date+'.'};
    }
    default:
      return {success:false,error:'Unknown tool: '+name};
  }
}

// ── CALL AI API (with tool loop) ──
async function callAPI(messages){
  const headers={
    'Content-Type':'application/json',
    'Authorization':'Bearer '+botConfig.api_key
  };
  if(botConfig.api_endpoint&&botConfig.api_endpoint.includes('openrouter')){
    headers['HTTP-Referer']=window.location.origin;
    headers['X-Title']=botConfig.bot_name||'Coach4U';
  }

  const res=await fetch(botConfig.api_endpoint,{
    method:'POST',
    headers:headers,
    body:JSON.stringify({
      model:botConfig.model,
      messages:messages,
      tools:crmTools,
      max_tokens:botConfig.max_tokens||1024,
      temperature:botConfig.temperature!=null?botConfig.temperature:0.7
    })
  });

  if(!res.ok){
    const errBody=await res.text();
    console.error('API error:',res.status,errBody);
    let errMsg='Sorry, something went wrong. ';
    if(res.status===401) errMsg+='API key is invalid — check your key in the bot_config table.';
    else if(res.status===402) errMsg+='No credits on your OpenRouter account.';
    else if(res.status===403) errMsg+='Access denied by the API.';
    else if(res.status===429) errMsg+='Rate limited — wait a moment and try again.';
    else{try{const j=JSON.parse(errBody);errMsg+=(j.error?.message||j.message||'Error '+res.status);}catch(_){errMsg+='Error '+res.status;}}
    return {error:errMsg};
  }

  return await res.json();
}

async function init(){
  const client=getSB();
  if(!client){showError('Failed to connect. Please refresh.');return;}

  const {data,error}=await client.from('bot_config').select('*').eq('active',true).limit(1).single();
  if(error||!data){showError('No active bot configured. Please set up the bot_config table in Supabase.');return;}

  botConfig=data;
  document.title=data.bot_name?data.bot_name+' — Coach4U':'Coach4U — Chat';
  document.getElementById('botTitle').textContent=data.bot_name||'Coach4U Assistant';
  document.getElementById('botSubtitle').textContent=data.subtitle||'Ask me anything';

  conversationHistory=[];

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('chatArea').style.display='flex';
  document.getElementById('inputArea').style.display='flex';

  if(data.welcome_message){
    addMessage('bot',data.welcome_message);
  }

  showPromptChips();
  document.getElementById('userInput').focus();
}

function showPromptChips(){
  const area=document.getElementById('chatArea');
  const container=document.createElement('div');
  container.className='prompt-chips';
  container.id='promptChips';
  const chips=[
    {section:'Quick Actions'},
    {label:'Add a prospect',prompt:'Add a new prospect'},
    {label:'Add a task',prompt:'Create a new task'},
    {label:'Add a contact',prompt:'Add a new contact to the master list'},
    {section:'Dashboards'},
    {label:'Prospect pipeline',prompt:'Show me a summary of all prospects — how many are hot, warm, new, and any overdue follow-ups'},
    {label:'Open tasks',prompt:'What tasks are open? Show me overdue and high priority ones'},
    {label:'ThriveHQ overview',prompt:'Give me a ThriveHQ summary — members, active trials, and pending intake forms'},
    {section:'Search'},
    {label:'Find a prospect',prompt:'Search for a prospect named '},
    {label:'Find a contact',prompt:'Search for a contact named '},
    {label:'Find a client',prompt:'Search for a client named '},
    {section:'Prospect Actions'},
    {label:'Log a call',prompt:'Log that I called '},
    {label:'Log an email',prompt:'Log that I emailed '},
    {label:'Set follow-up',prompt:'Set a follow-up date for '},
    {label:'Mark prospect hot',prompt:'Mark prospect as Hot: '},
  ];
  chips.forEach(c=>{
    if(c.section){
      const sec=document.createElement('div');
      sec.className='prompt-section';
      sec.textContent=c.section;
      container.appendChild(sec);
    } else {
      const btn=document.createElement('button');
      btn.className='prompt-chip';
      btn.textContent=c.label;
      btn.onclick=()=>usePromptChip(c.prompt,c.label);
      container.appendChild(btn);
    }
  });
  area.appendChild(container);
  area.scrollTop=area.scrollHeight;
}

function usePromptChip(prompt,label){
  const chips=document.getElementById('promptChips');
  if(chips)chips.remove();
  const input=document.getElementById('userInput');
  // If prompt ends with space, put in input for user to finish
  if(prompt.endsWith(' ')){
    input.value=prompt;
    input.focus();
    return;
  }
  input.value=prompt;
  sendMessage();
}

function showError(msg){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('errorScreen').style.display='flex';
  document.getElementById('errorMsg').textContent=msg;
}

function addMessage(role,content){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML=role==='bot'?formatMarkdown(content):escapeHtml(content);
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
  return div;
}

function addActionMessage(text){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg action';
  div.textContent=text;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function showTyping(){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg typing';
  div.id='typingIndicator';
  div.textContent='Thinking...';
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}
function updateTyping(text){
  const el=document.getElementById('typingIndicator');
  if(el)el.textContent=text;
}
function removeTyping(){
  const el=document.getElementById('typingIndicator');
  if(el)el.remove();
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function formatMarkdown(text){
  let html=text;
  html=html.replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,lang,code){return '<pre><code>'+escapeHtml(code.trim())+'</code></pre>';});
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>');
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  html=html.split(/\n{2,}/).map(block=>{
    block=block.trim();
    if(block.startsWith('<pre'))return block;
    if(/^[-*]\s/.test(block)){
      const items=block.split(/\n/).map(l=>l.replace(/^[-*]\s+/,''));
      return '<ul>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ul>';
    }
    if(/^\d+\.\s/.test(block)){
      const items=block.split(/\n/).map(l=>l.replace(/^\d+\.\s+/,''));
      return '<ol>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ol>';
    }
    return '<p>'+block.replace(/\n/g,'<br>')+'</p>';
  }).join('');
  return html;
}

async function sendMessage(){
  const input=document.getElementById('userInput');
  const msg=input.value.trim();
  if(!msg||!botConfig)return;

  input.value='';
  input.style.height='auto';
  document.getElementById('sendBtn').disabled=true;

  addMessage('user',msg);
  conversationHistory.push({role:'user',content:msg});

  showTyping();

  try{
    let messages=[
      {role:'system',content:botConfig.system_prompt},
      ...conversationHistory
    ];

    // Tool call loop — keep going until we get a text response
    let maxLoops=5;
    while(maxLoops-->0){
      const result=await callAPI(messages);

      if(result.error){
        removeTyping();
        addMessage('bot',result.error);
        conversationHistory.pop();
        break;
      }

      const choice=result.choices?.[0];
      if(!choice){
        removeTyping();
        addMessage('bot','Sorry, I didn\'t get a response. Please try again.');
        conversationHistory.pop();
        break;
      }

      const assistantMsg=choice.message;

      // Check for tool calls
      if(assistantMsg.tool_calls&&assistantMsg.tool_calls.length>0){
        // Add assistant message with tool calls to history
        conversationHistory.push(assistantMsg);
        messages=[{role:'system',content:botConfig.system_prompt},...conversationHistory];

        // Execute each tool call
        for(const tc of assistantMsg.tool_calls){
          const fnName=tc.function.name;
          let fnArgs={};
          try{fnArgs=JSON.parse(tc.function.arguments);}catch(_){}

          updateTyping('Working on it...');

          const toolResult=await executeTool(fnName,fnArgs);

          // Show action indicator
          if(toolResult.success){
            const actionLabels={add_prospect:'Added prospect',search_prospects:'Searched prospects',add_prospect_note:'Added note',add_contact:'Added contact',search_contacts:'Searched contacts',add_task:'Created task',get_prospect_summary:'Loaded prospect pipeline',get_tasks_summary:'Loaded task summary',search_clients:'Searched clients',get_thrivehq_summary:'Loaded ThriveHQ data',update_prospect_status:'Updated prospect status',set_prospect_followup:'Set follow-up date'};
            addActionMessage('✓ '+(actionLabels[fnName]||fnName));
          }

          // Add tool result to conversation
          const toolMsg={role:'tool',tool_call_id:tc.id,content:JSON.stringify(toolResult)};
          conversationHistory.push(toolMsg);
          messages=[{role:'system',content:botConfig.system_prompt},...conversationHistory];
        }

        updateTyping('Thinking...');
        // Loop back to get the final text response
        continue;
      }

      // Normal text response — done
      removeTyping();
      const reply=assistantMsg.content||'Done.';
      addMessage('bot',reply);
      conversationHistory.push({role:'assistant',content:reply});
      break;
    }
  }catch(e){
    removeTyping();
    console.error('Chat error:',e);
    addMessage('bot','Connection error. Please check your internet and try again.');
    conversationHistory.pop();
  }

  document.getElementById('sendBtn').disabled=false;
  document.getElementById('userInput').focus();
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function autoGrow(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
